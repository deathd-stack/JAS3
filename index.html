<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>JAS MEMO VER 5.2</title>

<style>
  :root{
    --bg1:#ffd36a;
    --bg2:#ff9200;
    --blue:#2f7df6;
    --red:#e20000;
    --line:#cfcfcf;
    --ui:.8;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:-apple-system, system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-weight:700;
    background:
      radial-gradient(1200px 700px at 50% -10%, #ffe9aa 0%, transparent 55%),
      linear-gradient(180deg,var(--bg1),var(--bg2));
    min-height:100vh;
    overflow-x:hidden;
    color:#111;
  }

  header{
    text-align:center;
    padding:22px 14px 10px;
    user-select:none;
    cursor:pointer;
  }

  .titleWrap{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }

  .titleMain{
    font-size:42px;
    font-weight:1000;
    letter-spacing:-1px;
    text-transform:uppercase;
    line-height:1;
    color:#111;
  }

  .titleVer{
    font-size:18px;
    font-weight:1000;
    opacity:.95;
    text-transform:uppercase;
    color:#111;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:calc(14px * var(--ui));
    padding:calc(8px * var(--ui)) calc(14px * var(--ui)) calc(6px * var(--ui));
    flex-wrap:wrap;
  }

  button{
    border:none;
    border-radius:calc(22px * var(--ui));
    background:#fff;
    padding:calc(14px * var(--ui)) calc(22px * var(--ui));
    font-weight:1000;
    color:var(--blue);
    font-size:calc(18px * var(--ui));
    box-shadow:0 10px 20px rgba(0,0,0,.18);
    text-transform:uppercase;
    cursor:pointer;
  }

  button:active{transform:scale(.99)}

  .dayBar{
    width:min(780px, calc(100% - 28px));
    margin:0 auto calc(10px * var(--ui));
    display:flex;
    align-items:center;
    justify-content:center;
    gap:calc(8px * var(--ui));
    flex-wrap:wrap;
  }

  .dayBtn{
    padding:calc(8px * var(--ui)) calc(12px * var(--ui));
    font-size:calc(14px * var(--ui));
    border-radius:calc(14px * var(--ui));
    box-shadow:none;
  }

  .dayLabel{
    background:rgba(255,255,255,.92);
    border-radius:calc(14px * var(--ui));
    padding:calc(9px * var(--ui)) calc(14px * var(--ui));
    font-size:calc(14px * var(--ui));
    font-weight:1000;
    color:#111;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
    text-transform:uppercase;
  }

  #memoList{
    padding:calc(10px * var(--ui)) calc(14px * var(--ui)) calc(220px * var(--ui));
    max-width:780px;
    margin:0 auto;
  }

  .emptyDay{
    background:rgba(255,255,255,.22);
    border-radius:calc(20px * var(--ui));
    padding:calc(18px * var(--ui));
    color:#111;
    text-align:center;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    margin-bottom:calc(40px * var(--ui));
  }

  .memoCard{
    background:rgba(246,231,215,.92);
    border-radius:calc(24px * var(--ui));
    padding:calc(14px * var(--ui)) calc(12px * var(--ui));
    margin:calc(12px * var(--ui)) 0;
    box-shadow:0 16px 26px rgba(0,0,0,.18);
    border:2px solid rgba(255,255,255,.45);
    overflow:hidden;
  }

  .memoRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:flex-start;
  }

  .selBox{
    width:calc(30px * var(--ui));
    height:calc(30px * var(--ui));
    border-radius:calc(10px * var(--ui));
    border:2px solid rgba(0,0,0,.28);
    background:#fff;
    appearance:none;
    margin-top:calc(8px * var(--ui));
    flex:0 0 auto;
    position:relative;
  }

  .selBox:checked{
    background:#fff;
    border-color:#1e63d8;
    box-shadow:0 0 0 calc(4px * var(--ui)) rgba(47,125,246,.14);
  }

  .selBox:checked::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:calc(10px * var(--ui));
    height:calc(16px * var(--ui));
    border-right:calc(3px * var(--ui)) solid #1e63d8;
    border-bottom:calc(3px * var(--ui)) solid #1e63d8;
    transform:translate(-50%,-60%) rotate(45deg);
  }

  .lines{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:calc(10px * var(--ui));
    cursor:pointer;
    min-width:0;
  }

  .line{
    display:flex;
    align-items:flex-start;
    gap:calc(10px * var(--ui));
    min-width:0;
  }

  .tagPill{
    background:#111;
    color:#fff;
    border-radius:999px;
    padding:calc(9px * var(--ui)) calc(12px * var(--ui));
    font-weight:1000;
    font-size:calc(16px * var(--ui));
    min-width:calc(70px * var(--ui));
    text-align:center;
    flex:0 0 auto;
    text-transform:uppercase;
  }

  .textPill{
    background:rgba(210,199,188,.45);
    border-radius:999px;
    padding:calc(10px * var(--ui)) calc(14px * var(--ui));
    font-weight:1000;
    font-size:calc(18px * var(--ui));
    color:#111;
    flex:1;
    min-width:0;
    white-space:normal;
    overflow:visible;
    word-break:break-word;
    text-transform:uppercase;
  }

  .datePill{
    margin-top:calc(6px * var(--ui));
    margin-left:calc(40px * var(--ui));
    font-size:calc(12px * var(--ui));
    color:#5a5147;
    font-weight:1000;
    text-transform:uppercase;
  }

  .flash{animation:flash .55s;}
  @keyframes flash{50%{transform:scale(1.01); filter:brightness(1.05)}}

  .bottomAppButtons{
    position:fixed;
    left:calc(14px * var(--ui));
    bottom:calc(18px * var(--ui));
    z-index:30;
    display:flex;
    flex-direction:column;
    gap:calc(12px * var(--ui));
  }

  .itMemoBtn,
  .akMemoBtn,
  .equipBtn{
    width:calc(144px * var(--ui));
    height:calc(48px * var(--ui));
    border-radius:calc(24px * var(--ui));
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    box-shadow:0 12px 22px rgba(0,0,0,.20);
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .itMemoBtn{
    background:#ffd400;
    color:#111;
  }

  .akMemoBtn{
    background:#e60023;
    color:#fff;
  }

  .equipBtn{
    background:#fff;
    color:#2f6fd1;
  }

  #equipBadge{
    position:fixed;
    right:calc(14px * var(--ui));
    bottom:calc(18px * var(--ui));
    z-index:20;
    background:rgba(0,0,0,.86);
    color:#fff;
    border-radius:calc(20px * var(--ui));
    padding:calc(12px * var(--ui)) calc(14px * var(--ui));
    font-weight:1000;
    line-height:1.15;
    text-align:right;
    box-shadow:0 14px 26px rgba(0,0,0,.22);
    display:none;
    text-transform:uppercase;
  }

  #equipBadge .b1{font-size:calc(18px * var(--ui));}
  #equipBadge .b2{font-size:calc(18px * var(--ui)); opacity:.95;}

  .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    justify-content:center;
    align-items:flex-end;
    z-index:50;
    overscroll-behavior:contain;
    pointer-events:none;
  }

  .box{
    width:100%;
    max-width:820px;
    background:#fff;
    border-radius:calc(26px * var(--ui)) calc(26px * var(--ui)) 0 0;
    padding:0 calc(14px * var(--ui)) calc(16px * var(--ui));
    max-height:92vh;
    overflow:auto;
    transform:translateY(0);
    will-change:transform;
    -webkit-overflow-scrolling:touch;
    pointer-events:auto;
  }

  .dragArea{
    padding:calc(6px * var(--ui)) 0 calc(8px * var(--ui));
    position:sticky;
    top:0;
    background:#fff;
    z-index:5;
  }

  .drag-handle{
    width:calc(60px * var(--ui));
    height:calc(7px * var(--ui));
    background:#cfcfcf;
    border-radius:999px;
    margin:0 auto calc(8px * var(--ui));
  }

  .topActionBar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:calc(10px * var(--ui));
  }

  .topMiniBtn{
    padding:calc(9px * var(--ui)) calc(14px * var(--ui));
    font-size:calc(15px * var(--ui));
    border-radius:calc(14px * var(--ui));
    box-shadow:none;
  }

  .modalTitleTap{
    text-align:center;
    font-weight:1000;
    color:#111;
    padding:calc(6px * var(--ui)) 0 calc(10px * var(--ui));
    cursor:pointer;
    user-select:none;
    text-transform:uppercase;
  }

  .modalTitleTap .m1{font-size:calc(18px * var(--ui));}
  .modalTitleTap .m2{font-size:calc(12px * var(--ui)); opacity:.55; margin-top:2px;}

  .dateLine{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:calc(8px * var(--ui));
    margin-bottom:calc(8px * var(--ui));
  }

  .dateLine .dateLab{
    font-size:calc(15px * var(--ui));
    font-weight:1000;
    color:#111;
    text-transform:uppercase;
  }

  .dateInput{
    width:auto !important;
    min-width:calc(180px * var(--ui));
    text-align:center;
    padding:0 calc(10px * var(--ui));
  }

  .pickRow{
    display:flex;
    justify-content:center;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
    margin:calc(6px * var(--ui)) 0 calc(12px * var(--ui));
  }

  .pickPill{
    display:flex;
    align-items:center;
    gap:calc(8px * var(--ui));
    background:#f3f3f3;
    border:2px solid #e1e1e1;
    border-radius:999px;
    padding:calc(10px * var(--ui)) calc(14px * var(--ui));
    font-size:calc(15px * var(--ui));
    font-weight:1000;
    text-transform:uppercase;
    user-select:none;
  }

  .pickPill input{
    width:calc(20px * var(--ui));
    height:calc(20px * var(--ui));
    margin:0;
    accent-color:#2f7df6;
  }

  .section{
    background:#f2f2f2;
    border-radius:calc(16px * var(--ui));
    padding:calc(12px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    overflow:hidden;
    border:1px solid #e6e6e6;
  }

  .sectionHead{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:calc(10px * var(--ui));
    gap:calc(10px * var(--ui));
  }

  .sectionTitle{
    font-size:calc(24px * var(--ui));
    font-weight:1000;
    letter-spacing:.3px;
    text-transform:uppercase;
  }

  .headRight{
    display:flex;
    align-items:flex-start;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .staStdWrap{
    display:flex;
    align-items:center;
    gap:calc(8px * var(--ui));
    white-space:nowrap;
  }

  .staStdLab{
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    color:#111;
    text-transform:uppercase;
  }

  .staStdInput{
    width:calc(92px * var(--ui)) !important;
    min-width:calc(92px * var(--ui));
    text-align:center;
  }

  .timeWrap{
    display:flex;
    align-items:baseline;
    gap:calc(10px * var(--ui));
    white-space:nowrap;
    text-transform:uppercase;
  }

  .timeBtn{
    border:none;
    background:transparent;
    box-shadow:none;
    padding:calc(4px * var(--ui)) calc(8px * var(--ui));
    margin:0;
    font-weight:1000;
    font-size:calc(16px * var(--ui));
    color:#111;
    border-radius:calc(10px * var(--ui));
    text-transform:uppercase;
  }

  .timeBtn:active{background:rgba(226,27,27,.08);}
  .timeVal{
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    color:var(--red);
    min-width:calc(64px * var(--ui));
    text-align:right;
    font-variant-numeric:tabular-nums;
    cursor:pointer;
  }

  .row{
    display:flex;
    align-items:center;
    gap:calc(10px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    flex-wrap:nowrap;
    min-width:0;
  }

  .lab{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    min-width:calc(46px * var(--ui));
    color:#111;
    white-space:nowrap;
    text-transform:uppercase;
  }

  input, textarea, select{
    font-family:inherit;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    border:2px solid var(--line);
    border-radius:calc(16px * var(--ui));
    outline:none;
    background:#fff;
    -webkit-text-size-adjust:100%;
    font-variant-numeric:tabular-nums;
    text-transform:uppercase;
  }

  input{
    width:100%;
    height:calc(54px * var(--ui));
    line-height:calc(54px * var(--ui));
    padding:0 calc(10px * var(--ui));
    text-align:center;
  }

  textarea{
    width:100%;
    height:calc(76px * var(--ui));
    resize:none;
    font-weight:800;
    padding:calc(10px * var(--ui));
    text-transform:none;
  }

  select{
    height:calc(54px * var(--ui));
    padding:0 calc(10px * var(--ui));
  }

  .numBox{
    font-size:calc(18px * var(--ui));
    letter-spacing:.6px;
  }

  .long{
    flex:1;
    min-width:0;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    padding-left:calc(14px * var(--ui));
    text-align:left;
  }

  .extraBox{
    background:#fff;
    border:2px solid #e2e2e2;
    border-radius:calc(16px * var(--ui));
    padding:calc(12px * var(--ui));
    margin-top:calc(10px * var(--ui));
  }

  .extraHead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:calc(10px * var(--ui));
    text-transform:uppercase;
  }

  .extraTitle{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    letter-spacing:.4px;
  }

  .iconBtn{
    width:calc(48px * var(--ui));
    height:calc(48px * var(--ui));
    border-radius:calc(16px * var(--ui));
    border:none;
    background:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.10);
    color:var(--blue);
    font-size:calc(28px * var(--ui));
    font-weight:1000;
    text-transform:uppercase;
  }

  .extraRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin-top:calc(10px * var(--ui));
  }

  .extraRow select{
    width:calc(130px * var(--ui));
    font-size:calc(16px * var(--ui));
    font-weight:1000;
  }

  .extraRow input{
    width:calc(130px * var(--ui));
    font-size:calc(18px * var(--ui));
  }

  .minusBtn{
    width:calc(60px * var(--ui));
    height:calc(54px * var(--ui));
    border-radius:calc(16px * var(--ui));
    border:none;
    background:#eef1f7;
    color:var(--blue);
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    box-shadow:none;
    text-transform:uppercase;
  }

  .lirRow{
    display:flex;
    align-items:center;
    gap:calc(10px * var(--ui));
    margin:calc(12px * var(--ui)) 0 calc(4px * var(--ui));
    flex-wrap:wrap;
  }

  .lirBtn{
    padding:calc(10px * var(--ui)) calc(16px * var(--ui));
    font-size:calc(14px * var(--ui));
    border-radius:calc(14px * var(--ui));
    box-shadow:none;
  }

  .lirCalcRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:calc(10px * var(--ui));
    margin:calc(12px * var(--ui)) 0 calc(4px * var(--ui));
    flex-wrap:nowrap;
  }

  .lirBtns{
    display:flex;
    align-items:center;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
  }

  .calcCircleBtn{
    width:calc(48px * var(--ui));
    height:calc(48px * var(--ui));
    min-width:calc(48px * var(--ui));
    border-radius:999px;
    border:none;
    background:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.10);
    color:var(--blue);
    font-size:calc(22px * var(--ui));
    font-weight:1000;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }

  .calcIconBtn{
    position:relative;
  }

  .calcIcon{
    position:relative;
    display:block;
    width:calc(22px * var(--ui));
    height:calc(26px * var(--ui));
    border:2px solid var(--blue);
    border-radius:calc(6px * var(--ui));
  }

  .calcIcon::before{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:calc(3px * var(--ui));
    width:calc(12px * var(--ui));
    height:calc(4px * var(--ui));
    background:var(--blue);
    border-radius:calc(2px * var(--ui));
  }

  .calcIcon::after{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:calc(4px * var(--ui));
    width:calc(12px * var(--ui));
    height:calc(10px * var(--ui));
    background:
      radial-gradient(circle, var(--blue) 58%, transparent 60%) 0 0 / calc(4px * var(--ui)) calc(4px * var(--ui)) repeat;
    opacity:.95;
  }

  .calcFloatingWrap{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.22);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:120;
    padding:calc(18px * var(--ui));
  }

  .calcFloatingWrap.show{
    display:flex;
  }

  .calcFloating{
    width:min(420px, 100%);
    background:#fff;
    border-radius:calc(24px * var(--ui));
    box-shadow:0 22px 46px rgba(0,0,0,.28);
    padding:calc(12px * var(--ui));
    animation:calcUp .16s ease;
  }

  @keyframes calcUp{
    from{transform:translateY(18px); opacity:.75}
    to{transform:translateY(0); opacity:1}
  }

  .calcTopBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:calc(10px * var(--ui));
    margin-bottom:calc(10px * var(--ui));
  }

  .calcTitle{
    font-size:calc(15px * var(--ui));
    font-weight:1000;
    color:#111;
    text-transform:uppercase;
    letter-spacing:.4px;
  }

  .calcCloseBtn{
    border:none;
    background:#eef1f7;
    color:var(--blue);
    width:calc(42px * var(--ui));
    height:calc(42px * var(--ui));
    border-radius:calc(14px * var(--ui));
    box-shadow:none;
    padding:0;
    font-size:calc(18px * var(--ui));
    font-weight:1000;
  }

  .calcDisplay{
    width:100%;
    height:calc(60px * var(--ui));
    border:2px solid var(--line);
    border-radius:calc(16px * var(--ui));
    background:#f9f9f9;
    padding:0 calc(12px * var(--ui));
    display:flex;
    align-items:center;
    justify-content:flex-end;
    font-size:calc(24px * var(--ui));
    font-weight:1000;
    color:#111;
    overflow:hidden;
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }

  .calcGrid{
    margin-top:calc(10px * var(--ui));
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:calc(8px * var(--ui));
  }

  .calcKey{
    height:calc(52px * var(--ui));
    border:none;
    border-radius:calc(14px * var(--ui));
    background:#f3f3f3;
    color:#111;
    font-size:calc(18px * var(--ui));
    font-weight:1000;
    box-shadow:none;
    padding:0;
  }

  .calcKey.op{
    background:#eef4ff;
    color:#2f7df6;
  }

  .calcKey.eq{
    background:#2f7df6;
    color:#fff;
  }

  .calcKey.wide{
    grid-column:span 2;
  }

  #photoLayer{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:90;
  }

  #photoLayer img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
  }

  .rowGrid3{
    display:grid;
    grid-template-columns:
      calc(26px * var(--ui)) .9fr
      calc(26px * var(--ui)) .9fr
      calc(14px * var(--ui)) .9fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  .rowGridTDBB{
    display:grid;
    grid-template-columns:
      calc(18px * var(--ui)) 1fr
      calc(18px * var(--ui)) .9fr
      calc(26px * var(--ui)) .9fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  .rowGridTTTB{
    display:grid;
    grid-template-columns:
      calc(26px * var(--ui)) 1fr
      calc(26px * var(--ui)) 1fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  @media (max-width:520px){
    .bottomAppButtons{
      left:12px;
      bottom:14px;
      gap:10px;
    }

    .itMemoBtn,
    .akMemoBtn,
    .equipBtn{
      width:120px;
      height:42px;
      font-size:14px;
    }

    .topMiniBtn{
      padding:8px 12px;
      font-size:14px;
    }
  }
</style>
</head>

<body>

<header id="homeHeader" onclick="openPhoto()" ondblclick="openPhoto()">

<div id="memoList"></div>

<div class="bottomAppButtons">
  <button class="itMemoBtn" onclick="location.href='https://deathd-stack.github.io/JAS2/'">IT MEMO</button>
  <button class="akMemoBtn" onclick="location.href='https://deathd-stack.github.io/JAS1/'">AK MEMO</button>

<input type="file" id="photoInput" accept="image/*" hidden />
<input type="file" id="lirPhotoInput" accept="image/*" hidden />

<div class="modal" id="modal" aria-hidden="true">
  <div class="box" id="sheet" role="dialog" aria-modal="true">
    <div class="dragArea" id="dragArea">

      <div class="topActionBar">
        <button type="button" class="topMiniBtn" onclick="saveMemo()">SAVE</button>

      </div>
    </div>

    <div class="modalTitleTap" onclick="openPhoto()">
      <div class="m1">JAS MEMO</div>
      <div class="m2">TAP TO OPEN PHOTO</div>

    <div class="dateLine">

    <div class="pickRow">

        <input type="checkbox" id="pickOutbound" checked>

<div class="modal" id="equipModal" aria-hidden="true">
  <div class="box" style="max-height:70vh" onclick="event.stopPropagation()">
    <div class="dragArea">

      <div class="topActionBar">
        <button type="button" class="topMiniBtn" onclick="saveEquip()">SAVE</button>
        <button type="button" class="topMiniBtn" onclick="closeEquip()">CLOSE</button>
      </div>

    <div style="font-weight:1000;font-size:20px;margin:6px 0 12px; text-transform:uppercase;">EQUIPMENT</div>

    <div class="row">
      <div class="lab" style="min-width:72px;">TUG</div>
      <input id="tug1" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
      <input id="tug2" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">

    <div class="row">
      <div class="lab" style="min-width:72px;">BELT</div>
      <input id="belt" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">

<div id="calcWrap" class="calcFloatingWrap" aria-hidden="true">
  <div class="calcFloating" onclick="event.stopPropagation()">
    <div class="calcTopBar">
      <div class="calcTitle">CALCULATOR</div>
      <button type="button" class="calcCloseBtn" onclick="closeCalc()">✕</button>
    </div>
    <div class="calcDisplay" id="globalCalcDisplay">0</div>
    <div class="calcGrid">
      <button type="button" class="calcKey op" data-global-calc="C">C</button>
      <button type="button" class="calcKey op" data-global-calc="⌫">⌫</button>
      <button type="button" class="calcKey op" data-global-calc="%">%</button>
      <button type="button" class="calcKey op" data-global-calc="/">÷</button>

      <button type="button" class="calcKey" data-global-calc="7">7</button>
      <button type="button" class="calcKey" data-global-calc="8">8</button>
      <button type="button" class="calcKey" data-global-calc="9">9</button>
      <button type="button" class="calcKey op" data-global-calc="*">×</button>

      <button type="button" class="calcKey" data-global-calc="4">4</button>
      <button type="button" class="calcKey" data-global-calc="5">5</button>
      <button type="button" class="calcKey" data-global-calc="6">6</button>
      <button type="button" class="calcKey op" data-global-calc="-">−</button>

      <button type="button" class="calcKey" data-global-calc="1">1</button>
      <button type="button" class="calcKey" data-global-calc="2">2</button>
      <button type="button" class="calcKey" data-global-calc="3">3</button>
      <button type="button" class="calcKey op" data-global-calc="+">+</button>

      <button type="button" class="calcKey wide" data-global-calc="0">0</button>
      <button type="button" class="calcKey" data-global-calc=".">.</button>
      <button type="button" class="calcKey eq" data-global-calc="=">=</button>
    </div>
  </div>
</div>

<script>
  const MEMO_KEY = "jas_memos_v5";
  const PHOTO_KEY = "jas_photo_v5";
  const EQUIP_KEY = "jas_equipment_v5";

  const modal = document.getElementById("modal");
  const sheet = document.getElementById("sheet");
  const dragArea = document.getElementById("dragArea");
  const sections = document.getElementById("sections");
  const memoList = document.getElementById("memoList");
  const photoInput = document.getElementById("photoInput");
  const lirPhotoInput = document.getElementById("lirPhotoInput");
  const photoLayer = document.getElementById("photoLayer");
  const photoImg = document.getElementById("photoImg");
  const memoDate = document.getElementById("memoDate");
  const dayLabel = document.getElementById("dayLabel");
  const pickInbound = document.getElementById("pickInbound");
  const pickOutbound = document.getElementById("pickOutbound");

  const equipBadge = document.getElementById("equipBadge");
  const equipModal = document.getElementById("equipModal");
  const tug1 = document.getElementById("tug1");
  const tug2 = document.getElementById("tug2");
  const belt = document.getElementById("belt");

  const calcWrap = document.getElementById("calcWrap");
  const globalCalcDisplay = document.getElementById("globalCalcDisplay");

  let memos = JSON.parse(localStorage.getItem(MEMO_KEY) || "[]");
  let photo = localStorage.getItem(PHOTO_KEY) || "";
  let editId = null;
  let dayOffset = 0;
  let activeLirType = null;
  let currentLirPhotos = { INBOUND:"", OUTBOUND:"" };
  let globalCalcExpr = "";

  const EXTRA_KEYS = ["W","C","COB","GB","TS","EMS","RUSH","CARSEAT","COMAT","STRAP","LONGFIN","CYCLE","CREW"];

  function onlyNum(val, len){
    return (val || "").replace(/[^0-9]/g, "").slice(0, len);
  }

  function pad(val, len){
    const v = onlyNum(val, len);
    return v ? v.padStart(len, "0") : "";
  }

  function cleanTextUpper(val){
    return (val || "").toUpperCase().trim();
  }

  function defaultF(val){
    const v = cleanTextUpper(val);
    return v ? v : "F";
  }

  function nowTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }

  function normalizeTimeText(val){
    const raw = (val || "").trim();
    if(!raw) return "";
    const digits = raw.replace(/[^0-9]/g, "");
    if(digits.length === 3) return digits.slice(0,1) + ":" + digits.slice(1,3);
    if(digits.length >= 4) return digits.slice(0,2) + ":" + digits.slice(2,4);
    return raw.slice(0,5);
  }

  function askTime(currentValue=""){
    const t = prompt("TIME (HH:MM 24H)", currentValue || nowTime());
    if(t === null) return null;
    return normalizeTimeText(t);
  }

  function todayStr(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  function dateToStr(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  function getViewingDate(){
    const d = new Date();
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() + dayOffset);
    return d;
  }

  function getViewingDayKey(){
    return dateToStr(getViewingDate());
  }

  function updateDayLabel(){
    dayLabel.textContent = getViewingDayKey();
  }

  function calcDayOffsetFromDate(dateStr){
    const base = new Date(todayStr());
    const target = new Date(dateStr);
    base.setHours(0,0,0,0);
    target.setHours(0,0,0,0);
    return Math.round((target - base) / 86400000);
  }

  function moveDay(n){
    dayOffset += n;
    updateDayLabel();
    renderList();
  }

  function goToday(){
    dayOffset = 0;
    updateDayLabel();
    renderList();
  }

  function deleteCurrentDay(){
    const dk = getViewingDayKey();
    const target = memos.filter(m => (m.dayKey || m.memoDate) === dk);
    if(!target.length){
      alert("NO MEMO IN THIS DAY");
      return;
    }
    if(!confirm("DELETE ALL MEMOS IN THIS DAY?")) return;
    memos = memos.filter(m => (m.dayKey || m.memoDate) !== dk);
    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
    renderList();
  }

  document.addEventListener("input", (e)=>{
    const t = e.target;
    if(!(t instanceof HTMLInputElement)) return;
    const k = t.dataset.k || "";
    if(!k) return;

    if(k === "SHARED-HL"){
      t.value = onlyNum(t.value, 4);
      document.querySelectorAll('input[data-k="SHARED-HL"]').forEach(el=>{
        if(el !== t) el.value = t.value;
      });
      return;
    }

    if(k === "SHARED-HASH"){
      t.value = onlyNum(t.value, 3);
      document.querySelectorAll('input[data-k="SHARED-HASH"]').forEach(el=>{
        if(el !== t) el.value = t.value;
      });
      return;
    }

    if(k.endsWith("-7C")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-STA")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-STD")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-t")) t.value = onlyNum(t.value, 3);
    if(k.endsWith("-d")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-bb")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-tt")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-tb")) t.value = onlyNum(t.value, 4);
    if(k.startsWith("extraVal-")) t.value = onlyNum(t.value, 3);
  });

  function makeExtraRow(type, key="CREW", val=""){
    const row = document.createElement("div");
    row.className = "extraRow";
    row.innerHTML = `
      <select>
        ${EXTRA_KEYS.map(k => `<option value="${k}" ${k===key ? "selected" : ""}>${k}</option>`).join("")}
      </select>
      <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="extraVal-${type}" value="${onlyNum(val,3)}">
      <button type="button" class="minusBtn" onclick="this.parentElement.remove()">-</button>
    `;
    return row;
  }

  function addExtraRow(type){
    const root = sections.querySelector(`.section[data-type="${type}"]`);
    const box = root ? root.querySelector(`#${type}-EXTRAS`) : null;
    if(!box) return;
    box.appendChild(makeExtraRow(type, "CREW", ""));
  }

  function bindEditableTime(el, initialValue){
    el.textContent = initialValue || "";
    el.addEventListener("click", ()=>{
      const t = askTime(el.textContent || "");
      if(t !== null) el.textContent = t;
    });
  }

  function openLirPicker(type){
    activeLirType = type;
    lirPhotoInput.value = "";
    lirPhotoInput.click();
  }

  function viewLirPhoto(type){
    const src = currentLirPhotos[type] || "";
    if(!src){
      alert("NO LIR PHOTO");
      return;
    }
    photoImg.src = src;
    photoLayer.style.display = "flex";
  }

  function openCalc(){
    calcWrap.classList.add("show");
    calcWrap.setAttribute("aria-hidden","false");
  }

  function closeCalc(){
    calcWrap.classList.remove("show");
    calcWrap.setAttribute("aria-hidden","true");
  }

  function updateGlobalCalcDisplay(val){
    globalCalcDisplay.textContent = val || "0";
  }

  function safeEval(expr){
    if(!expr) return "0";
    const cleaned = expr.replace(/[^0-9+\-*/%.()]/g, "");
    if(!cleaned) return "0";
    try{
      const result = Function("return (" + cleaned + ")")();
      if(result === undefined || result === null || Number.isNaN(result) || !Number.isFinite(result)){
        return "ERROR";
      }
      return String(result);
    }catch(e){
      return "ERROR";
    }
  }

  function makeSection(type, memoData){
    const d = document.createElement("div");
    d.className = "section";
    d.dataset.type = type;

    const savedTime = memoData ? (memoData[type+"-TIME"] || "") : "";
    const local7C = memoData ? (memoData[type+"-7C"] || "") : "";
    const sharedHL = memoData ? (memoData.sharedHL || "") : "";
    const sharedHASH = memoData ? (memoData.sharedHASH || "") : "";
    const v = (k)=> memoData ? (memoData[type+"-"+k] || "") : "";
    const noteV = memoData ? (memoData[type+"-note"] || "") : "";

    const cmpt1Val = memoData ? defaultF(memoData[type+"-cmpt1"]) : "F";
    const cmpt2Val = memoData ? defaultF(memoData[type+"-cmpt2"]) : "F";

    const staStdLabel = type === "INBOUND" ? "STA" : "STD";
    const staStdKey = type === "INBOUND" ? "STA" : "STD";

    d.innerHTML = `
      <div class="sectionHead">
        <div class="sectionTitle">${type}</div>
        <div class="headRight">
          <div class="staStdWrap">
            <div class="staStdLab">${staStdLabel}</div>
            <input class="numBox staStdInput" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-${staStdKey}" value="${v(staStdKey)}">
          </div>
          <div class="timeWrap">
            <button type="button" class="timeBtn" data-timebtn="${type}">TIME</button>
            <div class="timeVal" id="${type}-TIMESHOWN"></div>
          </div>
        </div>
      </div>

      <div class="rowGrid3">
        <div class="lab">7C</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-7C" value="${local7C}">
        <div class="lab">HL</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="SHARED-HL" value="${sharedHL}">
        <div class="lab">#</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="SHARED-HASH" value="${sharedHASH}">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 1</div>
        <input class="long" data-k="${type}-cmpt1" value="${cmpt1Val}" placeholder="TEXT">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 2</div>
        <input class="long" data-k="${type}-cmpt2" value="${cmpt2Val}" placeholder="TEXT">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 3</div>
        <input class="long" data-k="${type}-cmpt3" placeholder="TEXT" value="${memoData ? (memoData[type+'-cmpt3'] || '') : ''}">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 4</div>
        <input class="long" data-k="${type}-cmpt4" placeholder="TEXT" value="${memoData ? (memoData[type+'-cmpt4'] || '') : ''}">
      </div>

      <div class="rowGridTDBB">
        <div class="lab">T</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="${type}-t" value="${v("t")}">
        <div class="lab">D</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-d" value="${v("d")}">
        <div class="lab">BB</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-bb" value="${v("bb")}">
      </div>

      ${type === "OUTBOUND" ? `
      <div class="rowGridTTTB">
        <div class="lab">T/T</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tt" value="${v("tt")}">
        <div class="lab">T/B</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tb" value="${v("tb")}">
      </div>

      <div class="lirCalcRow">
        <div class="lirBtns">
          <button type="button" class="lirBtn" data-lir-add="${type}">LIR</button>
          <button type="button" class="lirBtn" data-lir-view="${type}">VIEW</button>
        </div>
        <button type="button" class="calcCircleBtn calcIconBtn" data-calc-toggle="${type}">
          <span class="calcIcon"></span>
        </button>
      </div>
      ` : ""}

      <div class="extraBox">
        <div class="extraHead">
          <div class="extraTitle">EXTRA</div>
          <button type="button" class="iconBtn" onclick="addExtraRow('${type}')">+</button>
        </div>
        <div id="${type}-EXTRAS"></div>
      </div>

      <textarea data-k="${type}-note" placeholder="NOTE (${type})">${noteV}</textarea>
    `;

    const timeBtn = d.querySelector(`[data-timebtn="${type}"]`);
    const timeShown = d.querySelector(`#${type}-TIMESHOWN`);
    bindEditableTime(timeShown, savedTime);

    timeBtn.addEventListener("click", ()=>{
      timeShown.textContent = nowTime();
    });

    timeBtn.addEventListener("dblclick", ()=>{
      const t = askTime(timeShown.textContent || "");
      if(t !== null) timeShown.textContent = t;
    });

    const lirAddBtn = d.querySelector(`[data-lir-add="${type}"]`);
    const lirViewBtn = d.querySelector(`[data-lir-view="${type}"]`);
    const calcToggleBtn = d.querySelector(`[data-calc-toggle="${type}"]`);

    if(lirAddBtn){
      lirAddBtn.addEventListener("click", ()=>{
        openLirPicker(type);
      });
    }

    if(lirViewBtn){
      lirViewBtn.addEventListener("click", ()=>{
        viewLirPhoto(type);
      });
    }

    if(calcToggleBtn){
      calcToggleBtn.addEventListener("click", ()=>{
        openCalc();
      });
    }

    const extrasBox = d.querySelector(`#${type}-EXTRAS`);
    const extras = memoData ? (memoData[type+"-EXTRAS"] || []) : [];
    extras.forEach(ex => extrasBox.appendChild(makeExtraRow(type, ex.key, ex.val)));

    return d;
  }

  function buildSectionsBlank(){
    sections.innerHTML = "";
    if(pickInbound.checked) sections.appendChild(makeSection("INBOUND", null));
    if(pickOutbound.checked) sections.appendChild(makeSection("OUTBOUND", null));
  }

  function rebuildSectionsFromMemo(memoData){
    sections.innerHTML = "";
    if(pickInbound.checked) sections.appendChild(makeSection("INBOUND", memoData));
    if(pickOutbound.checked) sections.appendChild(makeSection("OUTBOUND", memoData));
  }

  function newMemo(){
    editId = null;
    memoDate.value = getViewingDayKey();
    pickInbound.checked = true;
    pickOutbound.checked = true;
    currentLirPhotos = { INBOUND:"", OUTBOUND:"" };
    buildSectionsBlank();
    openModal();
  }

  function openModal(){
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden","false");
    sheet.style.transform = "translateY(0)";
    currentTranslate = 0;
  }

  function closeModal(){
    modal.style.display = "none";
    modal.setAttribute("aria-hidden","true");
    editId = null;
    activeLirType = null;
    closeCalc();
    updateEquipBadge();
  }

  function ensureAtLeastOnePick(changed){
    if(!pickInbound.checked && !pickOutbound.checked){
      changed.checked = true;
      alert("INBOUND OR OUTBOUND SELECT");
      return false;
    }
    return true;
  }

  pickInbound.addEventListener("change", ()=>{
    if(!ensureAtLeastOnePick(pickInbound)) return;
    if(editId){
      const m = memos.find(x=>x.id===editId);
      rebuildSectionsFromMemo(m || null);
    }else{
      buildSectionsBlank();
    }
  });

  pickOutbound.addEventListener("change", ()=>{
    if(!ensureAtLeastOnePick(pickOutbound)) return;
    if(editId){
      const m = memos.find(x=>x.id===editId);
      rebuildSectionsFromMemo(m || null);
    }else{
      buildSectionsBlank();
    }
  });

  function saveMemo(){
    if(!pickInbound.checked && !pickOutbound.checked){
      alert("INBOUND OR OUTBOUND SELECT");
      return;
    }

    const data = { id: editId ?? Date.now(), hasIn:pickInbound.checked, hasOut:pickOutbound.checked };
    data.memoDate = memoDate.value || getViewingDayKey();
    data.dayKey = data.memoDate;

    data.sharedHL = pad(document.querySelector('input[data-k="SHARED-HL"]')?.value || "", 4);
    data.sharedHASH = pad(document.querySelector('input[data-k="SHARED-HASH"]')?.value || "", 3);

    ["INBOUND","OUTBOUND"].forEach(type=>{
      const root = sections.querySelector(`.section[data-type="${type}"]`);

      if(!root){
        data[type+"-7C"] = "";
        data[type+"-STA"] = "";
        data[type+"-STD"] = "";
        data[type+"-t"] = "";
        data[type+"-d"] = "";
        data[type+"-bb"] = "";
        data[type+"-tt"] = "";
        data[type+"-tb"] = "";
        data[type+"-cmpt1"] = "F";
        data[type+"-cmpt2"] = "F";
        data[type+"-cmpt3"] = "";
        data[type+"-cmpt4"] = "";
        data[type+"-note"] = "";
        data[type+"-TIME"] = "";
        data[type+"-EXTRAS"] = [];
        data[type+"-LIRPHOTO"] = currentLirPhotos[type] || "";
        return;
      }

      const gi = (k)=> root.querySelector(`input[data-k="${type}-${k}"]`);
      const cm = (n)=> root.querySelector(`input[data-k="${type}-cmpt${n}"]`);
      const note = root.querySelector(`textarea[data-k="${type}-note"]`);

      data[type+"-7C"] = pad(gi("7C")?.value || "", 4);
      data[type+"-STA"] = type==="INBOUND" ? pad(gi("STA")?.value, 4) : "";
      data[type+"-STD"] = type==="OUTBOUND" ? pad(gi("STD")?.value, 4) : "";
      data[type+"-t"] = pad(gi("t")?.value, 3);
      data[type+"-d"] = pad(gi("d")?.value, 2);
      data[type+"-bb"] = pad(gi("bb")?.value, 2);
      data[type+"-tt"] = type==="OUTBOUND" ? pad(gi("tt")?.value, 4) : "";
      data[type+"-tb"] = type==="OUTBOUND" ? pad(gi("tb")?.value, 4) : "";

      data[type+"-cmpt1"] = defaultF(cm(1)?.value || "");
      data[type+"-cmpt2"] = defaultF(cm(2)?.value || "");
      data[type+"-cmpt3"] = cleanTextUpper(cm(3)?.value || "");
      data[type+"-cmpt4"] = cleanTextUpper(cm(4)?.value || "");
      data[type+"-note"] = note ? (note.value || "") : "";

      const shown = document.getElementById(type+"-TIMESHOWN");
      data[type+"-TIME"] = shown ? normalizeTimeText(shown.textContent || "") : "";

      const extras = [];
      const box = root.querySelector(`#${type}-EXTRAS`);
      if(box){
        [...box.querySelectorAll(".extraRow")].forEach(r=>{
          const key = (r.querySelector("select")?.value || "").toUpperCase();
          const val = pad(r.querySelector("input")?.value || "", 3);
          if(key && val) extras.push({key, val});
        });
      }
      data[type+"-EXTRAS"] = extras;
      data[type+"-LIRPHOTO"] = currentLirPhotos[type] || "";
    });

    if(editId){
      const idx = memos.findIndex(m=>m.id===editId);
      if(idx >= 0) memos[idx] = data;
    }else{
      memos.push(data);
    }

    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
    dayOffset = calcDayOffsetFromDate(data.memoDate);
    updateDayLabel();
    closeModal();
    renderList(data.id);
  }

  function formatCombinedLine(m){
    const v7cIn = (m["INBOUND-7C"] || "").trim();
    const v7cOut = (m["OUTBOUND-7C"] || "").trim();
    const v7c = v7cIn || v7cOut || "";
    const vhl = (m.sharedHL || "").trim();
    const hash = (m.sharedHASH || "").trim();
    return `7C[${v7c}] HL[${vhl}] #[${hash}]`;
  }

  function formatSplitLine(m, type){
    const v7c = (m[type+"-7C"] || "").trim();
    const vhl = (m.sharedHL || "").trim();
    const hash = (m.sharedHASH || "").trim();

    if(type === "INBOUND"){
      return `7C[${v7c}] HL[${vhl}]`;
    }
    return `7C[${v7c}] #[${hash}]`;
  }

  function renderList(flashId){
    memoList.innerHTML = "";

    const viewingDay = getViewingDayKey();
    const dayMemos = memos
      .filter(m => (m.dayKey || m.memoDate || todayStr()) === viewingDay)
      .sort((a,b)=> Number(a.id) - Number(b.id));

    if(!dayMemos.length){
      memoList.innerHTML = `<div class="emptyDay">NO MEMO IN THIS DAY</div>`;
      return;
    }

    dayMemos.forEach(m=>{
      const hasIn = m.hasIn !== false;
      const hasOut = m.hasOut !== false;

      let linesHtml = "";

      if(hasIn && hasOut){
        linesHtml = `
          <div class="line"><div class="tagPill">IN</div><div class="textPill">${formatSplitLine(m, "INBOUND")}</div></div>
          <div class="line"><div class="tagPill">OUT</div><div class="textPill">${formatSplitLine(m, "OUTBOUND")}</div></div>
        `;
      }else{
        const singleTag = hasIn ? "IN" : "OUT";
        linesHtml = `
          <div class="line"><div class="tagPill">${singleTag}</div><div class="textPill">${formatCombinedLine(m)}</div></div>
        `;
      }

      const card = document.createElement("div");
      card.className = "memoCard" + (m.id===flashId ? " flash" : "");
      card.innerHTML = `
        <div class="memoRow">
          <input class="selBox" type="checkbox" data-id="${m.id}">
          <div class="lines" data-open="${m.id}">
            ${linesHtml}
          </div>
        </div>
        <div class="datePill">${m.memoDate || ""}</div>
      `;
      memoList.appendChild(card);
    });

    memoList.querySelectorAll("[data-open]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const id = Number(el.getAttribute("data-open"));
        editMemo(id);
      });
    });
  }

  function editMemo(id){
    const m = memos.find(x=>x.id===id);
    if(!m) return;

    editId = id;
    memoDate.value = m.memoDate || getViewingDayKey();
    pickInbound.checked = m.hasIn !== false;
    pickOutbound.checked = m.hasOut !== false;
    currentLirPhotos = {
      INBOUND: m["INBOUND-LIRPHOTO"] || "",
      OUTBOUND: m["OUTBOUND-LIRPHOTO"] || ""
    };
    rebuildSectionsFromMemo(m);

    document.querySelectorAll('input[data-k="SHARED-HL"]').forEach(el => el.value = m.sharedHL || "");
    document.querySelectorAll('input[data-k="SHARED-HASH"]').forEach(el => el.value = m.sharedHASH || "");

    openModal();
  }

  function deleteSelected(){
    const checks = document.querySelectorAll('.selBox:checked');
    const ids = [...checks].map(c=>Number(c.dataset.id));
    if(!ids.length){
      alert("SELECT MEMO");
      return;
    }
    memos = memos.filter(m=>!ids.includes(m.id));
    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
    renderList();
  }

  function addPhoto(){
    photoInput.value = "";
    photoInput.click();
  }

  function loadImageFromFile(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=> resolve(img);
        img.onerror = ()=> reject(new Error("IMAGE LOAD FAIL"));
        img.src = String(reader.result || "");
      };
      reader.onerror = ()=> reject(new Error("FILE READ FAIL"));
      reader.readAsDataURL(file);
    });
  }

  function compressImageToDataUrl(img, maxW = 1600, maxH = 1600, quality = 0.82){
    const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
    const w = Math.max(1, Math.round(img.width * ratio));
    const h = Math.max(1, Math.round(img.height * ratio));

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext("2d");
    if(!ctx) throw new Error("CANVAS FAIL");
    ctx.drawImage(img, 0, 0, w, h);

    return canvas.toDataURL("image/jpeg", quality);
  }

  async function makeStablePhotoData(file){
    const img = await loadImageFromFile(file);

    const tries = [
      { maxW:1600, maxH:1600, quality:0.82 },
      { maxW:1600, maxH:1600, quality:0.70 },
      { maxW:1440, maxH:1440, quality:0.60 },
      { maxW:1280, maxH:1280, quality:0.52 },
      { maxW:1080, maxH:1080, quality:0.48 }
    ];

    for(const t of tries){
      const dataUrl = compressImageToDataUrl(img, t.maxW, t.maxH, t.quality);
      if(dataUrl.length < 3500000) return dataUrl;
    }

    return compressImageToDataUrl(img, 960, 960, 0.42);
  }

  function syncPhotoFromStorage(forceDraw = false){
    const savedPhoto = localStorage.getItem(PHOTO_KEY) || "";
    photo = savedPhoto;

    if(forceDraw || photoLayer.style.display === "flex"){
      if(photo){
        photoImg.src = photo;
      }else{
        photoImg.removeAttribute("src");
      }
    }
  }

  async function savePhotoFile(file){
    try{
      const stableDataUrl = await makeStablePhotoData(file);
      localStorage.setItem(PHOTO_KEY, stableDataUrl);
      photo = stableDataUrl;
      photoImg.src = stableDataUrl;
      alert("PHOTO SAVED");
    }catch(err){
      console.error(err);
      alert("PHOTO SAVE FAIL");
    }
  }

  async function saveLirPhotoFile(file, type){
    try{
      const stableDataUrl = await makeStablePhotoData(file);
      currentLirPhotos[type] = stableDataUrl;
      alert("LIR PHOTO SAVED");
    }catch(err){
      console.error(err);
      alert("LIR PHOTO SAVE FAIL");
    }
  }

  photoInput.onchange = async (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    await savePhotoFile(f);
  };

  lirPhotoInput.onchange = async (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f || !activeLirType) return;
    await saveLirPhotoFile(f, activeLirType);
  };

  function openPhoto(){
    syncPhotoFromStorage(true);
    if(!photo) return;
    photoLayer.style.display = "flex";
  }

  function closePhoto(){
    photoLayer.style.display = "none";
  }

  window.addEventListener("pageshow", ()=>{
    syncPhotoFromStorage(true);
  });

  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState === "visible"){
      syncPhotoFromStorage(true);
    }
  });

  function openEquip(){
    const eq = JSON.parse(localStorage.getItem(EQUIP_KEY) || "{}");
    tug1.value = pad(eq.tug1,2);
    tug2.value = pad(eq.tug2,2);
    belt.value = pad(eq.belt,2);
    equipModal.style.display = "flex";
    equipModal.setAttribute("aria-hidden","false");
  }

  function closeEquip(){
    equipModal.style.display = "none";
    equipModal.setAttribute("aria-hidden","true");
  }

  function saveEquip(){
    const eq = {
      tug1: pad(tug1.value,2),
      tug2: pad(tug2.value,2),
      belt: pad(belt.value,2)
    };
    localStorage.setItem(EQUIP_KEY, JSON.stringify(eq));
    updateEquipBadge();
    closeEquip();
  }

  function updateEquipBadge(){
    const eq = JSON.parse(localStorage.getItem(EQUIP_KEY) || "{}");
    if(!eq.tug1 && !eq.tug2 && !eq.belt){
      equipBadge.style.display = "none";
      return;
    }
    const t1 = eq.tug1 || "00";
    const t2 = eq.tug2 || "00";
    const b = eq.belt || "00";
    equipBadge.innerHTML = `
      <div class="b1">TUG ${t1}/${t2}</div>
      <div class="b2">BELT ${b}</div>
    `;
    equipBadge.style.display = "block";
  }

  equipModal.addEventListener("click",(e)=>{
    if(e.target === equipModal) closeEquip();
  });

  calcWrap.addEventListener("click", (e)=>{
    if(e.target === calcWrap) closeCalc();
  });

  document.querySelectorAll("[data-global-calc]").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const val = btn.dataset.globalCalc || "";

      if(val === "C"){
        globalCalcExpr = "";
        updateGlobalCalcDisplay("0");
        return;
      }

      if(val === "⌫"){
        globalCalcExpr = globalCalcExpr.slice(0, -1);
        updateGlobalCalcDisplay(globalCalcExpr || "0");
        return;
      }

      if(val === "="){
        globalCalcExpr = safeEval(globalCalcExpr);
        updateGlobalCalcDisplay(globalCalcExpr);
        if(globalCalcExpr === "ERROR") globalCalcExpr = "";
        return;
      }

      if(globalCalcExpr === "ERROR") globalCalcExpr = "";
      globalCalcExpr += val;
      updateGlobalCalcDisplay(globalCalcExpr);
    });
  });

  let startY = 0;
  let currentTranslate = 0;
  let dragging = false;

  function onStart(y){
    dragging = true;
    startY = y;
    sheet.style.transition = "none";
  }

  function onMove(y){
    if(!dragging) return;
    const dy = Math.max(0, y - startY);
    currentTranslate = dy;
    sheet.style.transform = `translateY(${dy}px)`;
  }

  function onEnd(){
    if(!dragging) return;
    dragging = false;
    sheet.style.transition = "transform .18s ease";
    if(currentTranslate > 140){
      closeModal();
    }else{
      sheet.style.transform = "translateY(0)";
      currentTranslate = 0;
    }
  }

  dragArea.addEventListener("touchstart", (e)=> onStart(e.touches[0].clientY), {passive:true});
  dragArea.addEventListener("touchmove",  (e)=> onMove(e.touches[0].clientY),  {passive:true});
  dragArea.addEventListener("touchend",   ()=> onEnd());

  dragArea.addEventListener("mousedown", (e)=> onStart(e.clientY));
  window.addEventListener("mousemove", (e)=> onMove(e.clientY));
  window.addEventListener("mouseup", ()=> onEnd());

  memoDate.value = getViewingDayKey();
  updateDayLabel();
  renderList();
  updateEquipBadge();
  syncPhotoFromStorage(false);
  updateGlobalCalcDisplay("0");
</script>

</body>
</html>
