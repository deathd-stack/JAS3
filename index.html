<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>JAS MEMO VER.3</title>

<style>
:root{
  --card:rgba(255,255,255,.92);
  --card2:rgba(255,255,255,.85);
  --text:#111;
  --muted:rgba(0,0,0,.55);
  --shadow:0 10px 28px rgba(0,0,0,.25);
  --shadow2:0 6px 18px rgba(0,0,0,.18);
  --radius:18px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
  margin:0;
  font-family:system-ui,-apple-system;

  /* ✅ 배경 이미지 적용 */
  background:
    linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)),
    url("bg.jpg") center/cover no-repeat fixed;

  color:var(--text);
  font-weight:650;
  padding-bottom:22px;
}

header{
  text-align:center;
  padding:20px 14px 14px;
  font-size:2.2rem;
  font-weight:950;
  letter-spacing:.5px;
  color:#fff;
  text-shadow:0 3px 10px rgba(0,0,0,.6);
}

/* ===== 상단 버튼 ===== */

.controls{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:12px;
  backdrop-filter: blur(10px);
  background:rgba(0,0,0,.35);
}

button{
  padding:12px 18px;
  border:none;
  border-radius:16px;
  background:var(--card);
  box-shadow:var(--shadow2);
  font-weight:950;
  font-size:1.05rem;
  transition:transform .08s ease;
}
button:active{ transform:scale(.96); }

#memoList{ padding:14px; }

/* ===== 메모 카드 ===== */

.memo{
  background:var(--card);
  border-radius:var(--radius);
  padding:14px;
  margin-bottom:12px;
  display:flex;
  gap:10px;
  align-items:center;
  box-shadow:var(--shadow);
}

.memo input[type="checkbox"]{
  width:22px;
  height:22px;
}

.memo-title{
  font-weight:950;
  cursor:pointer;
  width:100%;
}

.memo-title .line{
  display:flex;
  justify-content:space-between;
  white-space:nowrap;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.08);
  font-weight:950;
  font-size:.95rem;
}

.badge .tag{
  padding:2px 8px;
  border-radius:999px;
  font-size:.75rem;
  font-weight:1000;
  background:#000;
  color:#fff;
}

/* ===== MODAL ===== */

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:flex-end;
  padding:10px;
}

.box{
  background:var(--card);
  width:min(720px, 100%);
  max-height:92vh;
  overflow:auto;
  border-radius:22px;
  padding:16px;
  box-shadow:var(--shadow);
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
  flex-wrap:wrap;
}

.row.center{
  justify-content:center;
  flex-wrap:nowrap;
}

.section{
  margin-top:14px;
  background:var(--card2);
  border-radius:18px;
  padding:12px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  font-weight:1000;
  margin-bottom:8px;
}

.time{
  color:#c00;
  font-weight:1000;
  cursor:pointer;
  padding:4px 10px;
  border-radius:999px;
  background:rgba(255,0,0,.1);
}

input{
  width:72px;
  padding:8px;
  border-radius:12px;
  border:1px solid #ccc;
  font-weight:900;
  text-align:center;
}
input[data-long]{ width:100%; }

textarea{
  width:100%;
  height:80px;
  padding:10px;
  border-radius:14px;
  border:1px solid #ccc;
  font-weight:800;
  resize:none;
}

/* ===== PHOTO ===== */

#photoLayer{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
}

#photoLayer img{
  position:absolute;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:contain;
  background:#000;
}

</style>
</head>

<body>

<header>JAS MEMO VER.3</header>

<div class="controls" id="controls">
  <button onclick="newMemo()">ADD</button>
  <button onclick="deleteSelected()">DELETE</button>
  <button onclick="addPhoto()">PHOTO</button>
</div>

<div id="memoList"></div>
<input type="file" id="photoInput" accept="image/*" hidden>

<div class="modal" id="modal">
  <div class="box">
    <div class="row center">
      <label><input type="checkbox" id="inChk"> INBOUND</label>
      <label><input type="checkbox" id="outChk"> OUTBOUND</label>
    </div>
    <div id="sections"></div>
    <div class="row">
      <button style="flex:1" onclick="saveMemo()">SAVE</button>
      <button style="flex:1" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<div id="photoLayer">
  <img id="photoImg">
</div>

<script>

/* === 기존 JS 그대로 유지 === */
/* (이전 네 코드와 동일, 기능 삭제 없음) */

</script>

</body>
</html>
