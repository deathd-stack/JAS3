<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>JAS MEMO VER.3</title>

<style>
:root{
  --card:rgba(255,255,255,.92);
  --card2:rgba(255,255,255,.82);
  --text:#111;
  --shadow:0 10px 28px rgba(0,0,0,.18);
  --shadow2:0 6px 18px rgba(0,0,0,.14);
  --radius:18px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
  margin:0;
  font-family:system-ui,-apple-system;

  /* ✅ bg.jpg 있으면 이미지, 없으면 당근색 */
  background:#ff7a00 url("bg.jpg") center/cover no-repeat fixed;

  color:var(--text);
  font-weight:650;
  padding-bottom:22px;
}

header{
  text-align:center;
  padding:18px 14px 10px;
  font-size:2.05rem;
  font-weight:950;
  cursor:pointer; /* 제목 누르면 사진 열기 */
  letter-spacing:.5px;
  color:#111;
  user-select:none;
}

.controls{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px 12px 12px;
}

button{
  padding:12px 16px;
  border:none;
  border-radius:16px;
  background:var(--card);
  box-shadow:var(--shadow2);
  font-weight:950;
  font-size:1.05rem;
}

#memoList{ padding:10px 12px; }

.memo{
  background:var(--card);
  border-radius:var(--radius);
  padding:12px;
  margin-bottom:10px;
  display:flex;
  gap:10px;
  align-items:flex-start;
  box-shadow:var(--shadow);
}

.memo input[type="checkbox"]{
  width:22px;
  height:22px;
  accent-color:#111;
  flex:0 0 auto;
}

.memo-title{
  font-weight:950;
  cursor:pointer;
  width:100%;
}

.memo-title .line{ margin:4px 0; white-space:nowrap; }

.badge{
  display:inline-flex;
  gap:6px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.06);
  font-weight:950;
}

.badge .tag{
  padding:2px 8px;
  border-radius:999px;
  font-size:.78rem;
  font-weight:1000;
  background:#111;
  color:#fff;
}

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  justify-content:center;
  align-items:flex-end;
  padding:10px;
}

.box{
  background:var(--card);
  width:100%;
  max-height:92vh;
  overflow:auto;
  border-radius:22px;
  padding:14px;
  box-shadow:var(--shadow);
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.row.center{
  justify-content:center;
  flex-wrap:nowrap;
}

.section{
  margin-top:14px;
  background:var(--card2);
  border-radius:18px;
  padding:12px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:1000;
  margin-bottom:8px;
}

.time{
  color:#d20000;
  font-weight:1000;
  cursor:pointer;
  user-select:none;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(210,0,0,.08);
}

input{
  width:72px;
  padding:8px;
  border-radius:12px;
  border:1px solid #ccc;
  font-weight:900;
  text-align:center;
}
input[data-long]{ flex:1; min-width:0; }

textarea{
  width:100%;
  height:78px;
  margin-top:8px;
  padding:10px;
  border-radius:14px;
  border:1px solid #ccc;
  font-weight:800;
  resize:none;
}

/* ✅ CMPT 전부 왼쪽 시작 */
.cmpt-row{
  justify-content:flex-start;
  flex-wrap:nowrap;
}
.cmpt-row .lbl{
  font-weight:1000;
  width:90px;
  text-align:left;
}

/* PHOTO */
#photoLayer{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
  overflow:hidden;
  touch-action:none; /* 핀치 줌 우리가 처리 */
}
#photoLayer img{
  position:absolute;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:contain;
  transform:scale(1);
  transform-origin:center center;
  touch-action:none;
}
</style>
</head>

<body>

<header id="titleBtn">JAS MEMO VER.3</header>

<div class="controls">
  <button onclick="newMemo()">ADD</button>
  <button onclick="deleteSelected()">DELETE</button>
  <button onclick="addPhoto()">PHOTO</button>
</div>

<div id="memoList"></div>
<input type="file" id="photoInput" accept="image/*" hidden>

<div class="modal" id="modal">
  <div class="box">
    <div class="row center">
      <label><input type="checkbox" id="inChk"> INBOUND</label>
      <label><input type="checkbox" id="outChk"> OUTBOUND</label>
    </div>

    <div id="sections"></div>

    <div class="row">
      <button style="flex:1" onclick="saveMemo()">SAVE</button>
      <button style="flex:1" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<div id="photoLayer">
  <img id="photoImg" alt="photo">
</div>

<script>
const modal = document.getElementById("modal");
const sections = document.getElementById("sections");
const memoList = document.getElementById("memoList");
const photoInput = document.getElementById("photoInput");
const photoLayer = document.getElementById("photoLayer");
const photoImg = document.getElementById("photoImg");
const titleBtn = document.getElementById("titleBtn");

let memos = JSON.parse(localStorage.getItem("jas_memos")||"[]");
let editId=null;
let photo = localStorage.getItem("jas_photo");

/* 사진 줌 */
let scale=1;
let pinchStartDist=null;
let pinchStartScale=1;

function now(){
  const d=new Date();
  return d.toLocaleTimeString("ko-KR",{hour12:false,hour:"2-digit",minute:"2-digit"});
}

/* --------- MEMO --------- */
function newMemo(){
  editId=null;
  inChk.checked=false;
  outChk.checked=false;
  sections.innerHTML="";
  modal.style.display="flex";
}

function closeModal(){ modal.style.display="none"; }

inChk.onchange = outChk.onchange = renderSections;

function renderSections(){
  sections.innerHTML="";
  if(inChk.checked) sections.append(makeSection("INBOUND"));
  if(outChk.checked) sections.append(makeSection("OUTBOUND"));
}

function makeSection(type){
  const d=document.createElement("div");
  d.className="section";
  d.innerHTML=`
    <div class="section-title">
      ${type}
      <span class="time"
        data-k="${type}-time"
        onclick="this.textContent=now()"
        ondblclick="this.textContent=prompt('TIME',this.textContent)||this.textContent"
      >--:--</span>
    </div>

    <div class="row">
      7C <input maxlength="4" inputmode="numeric" data-k="${type}-c7">
      HL <input maxlength="4" inputmode="numeric" data-k="HL">
      # <input maxlength="3" inputmode="numeric" data-k="NUM">
    </div>

    ${[1,2,3,4].map(i=>`
      <div class="row cmpt-row">
        <div class="lbl">CMPT ${i}</div>
        <input data-long data-k="${type}-cmpt${i}" ${i<=2 ? `value="F"` : ""}>
      </div>`).join("")}

    <div class="row">
      T <input maxlength="3" inputmode="numeric" data-k="${type}-t">
      D <input maxlength="2" inputmode="numeric" data-k="${type}-d">
      BB <input maxlength="2" inputmode="numeric" data-k="${type}-bb">
    </div>

    <div class="row">
      W <input maxlength="2" inputmode="numeric" data-k="${type}-w">
      C <input maxlength="3" inputmode="numeric" data-k="${type}-c">
      COB <input maxlength="3" inputmode="numeric" data-k="${type}-cob">
    </div>

    ${type==="OUTBOUND" ? `
      <div class="row">
        T/T <input maxlength="4" inputmode="numeric" data-k="OUTBOUND-tt">
        T/B <input maxlength="4" inputmode="numeric" data-k="OUTBOUND-tb">
      </div>
    ` : ""}

    <textarea data-k="${type}-note" placeholder="특이사항 (${type})"></textarea>
  `;
  return d;
}

/* HL + # 동기화 */
document.addEventListener("input",e=>{
  const k = e.target?.dataset?.k;
  if(k==="HL" || k==="NUM"){
    document.querySelectorAll(`[data-k="${k}"]`).forEach(i=>{
      if(i!==e.target) i.value=e.target.value;
    });
  }
});

/* SAVE */
function saveMemo(){
  const data={id:editId??Date.now()};

  document.querySelectorAll("[data-k]").forEach(el=>{
    const k=el.dataset.k;
    if(el.tagName==="SPAN") data[k]=el.textContent;
    else data[k]=el.value;
  });

  if(editId){
    memos[memos.findIndex(m=>m.id===editId)]=data;
  }else{
    memos.push(data);
  }

  localStorage.setItem("jas_memos",JSON.stringify(memos));
  closeModal();
  renderList();
}

function renderList(){
  memoList.innerHTML="";
  memos.forEach(m=>{
    const hasIN  = !!m["INBOUND-c7"];
    const hasOUT = !!m["OUTBOUND-c7"];
    const hl  = m.HL  || "";
    const num = m.NUM || "";

    // ✅ IN+OUT 둘 다면 #은 OUT에만
    const inText = hasIN
      ? (hasOUT
          ? `7C[${m["INBOUND-c7"]||""}] HL[${hl}]`
          : `7C[${m["INBOUND-c7"]||""}] HL[${hl}] #[${num}]`)
      : "";

    const outText = hasOUT
      ? `7C[${m["OUTBOUND-c7"]||""}] #[${num}]`
      : "";

    memoList.innerHTML += `
      <div class="memo">
        <input type="checkbox">
        <div class="memo-title" onclick="editMemo(${m.id})">
          ${hasIN ? `<div class="line"><span class="badge"><span class="tag">IN</span> ${inText}</span></div>` : ``}
          ${hasOUT? `<div class="line"><span class="badge"><span class="tag">OUT</span> ${outText}</span></div>` : ``}
        </div>
      </div>
    `;
  });
}

function editMemo(id){
  editId=id;
  const m=memos.find(x=>x.id===id);

  modal.style.display="flex";
  inChk.checked=!!m["INBOUND-c7"];
  outChk.checked=!!m["OUTBOUND-c7"];
  renderSections();

  document.querySelectorAll("[data-k]").forEach(el=>{
    const k = el.dataset.k;
    let v = m[k];

    if(el.tagName==="SPAN"){
      el.textContent = (v!=null && v!=="") ? v : "--:--";
    }else{
      // ✅ CMPT 1,2는 저장값 없으면 기본 F
      if((v==null || v==="") && (k.endsWith("-cmpt1") || k.endsWith("-cmpt2"))) v="F";
      el.value = (v!=null) ? v : "";
    }
  });
}

/* DELETE */
function deleteSelected(){
  const c=[...document.querySelectorAll(".memo input")];
  memos=memos.filter((_,i)=>!c[i].checked);
  localStorage.setItem("jas_memos",JSON.stringify(memos));
  renderList();
}

/* --------- PHOTO --------- */
function addPhoto(){ photoInput.click(); }
photoInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    photo=r.result;
    localStorage.setItem("jas_photo",photo);
  };
  r.readAsDataURL(f);
};

titleBtn.onclick = openPhoto;

function openPhoto(){
  if(!photo) return;
  scale=1;
  pinchStartDist=null;
  photoImg.src=photo;
  photoImg.style.transform=`scale(${scale})`;
  photoLayer.style.display="block";
}

/* 더블탭 닫기(iOS) */
let lastTap=0;
photoImg.addEventListener("touchend",(e)=>{
  if(photoLayer.style.display!=="block") return;
  e.stopPropagation();
  const t=Date.now();
  if(t-lastTap<=350){
    lastTap=0;
    photoLayer.style.display="none";
  }else{
    lastTap=t;
  }
},{passive:true});
photoImg.addEventListener("dblclick",()=>{
  if(photoLayer.style.display!=="block") return;
  photoLayer.style.display="none";
});

/* 휠 줌 */
photoLayer.addEventListener("wheel",(e)=>{
  if(photoLayer.style.display!=="block") return;
  e.preventDefault();
  scale += e.deltaY < 0 ? 0.1 : -0.1;
  scale = Math.max(1, Math.min(scale, 4));
  photoImg.style.transform = `scale(${scale})`;
},{passive:false});

/* 핀치 줌 */
function dist(t1,t2){
  const dx=t1.clientX-t2.clientX;
  const dy=t1.clientY-t2.clientY;
  return Math.hypot(dx,dy);
}
photoLayer.addEventListener("touchstart",(e)=>{
  if(photoLayer.style.display!=="block") return;
  if(e.touches.length===2){
    pinchStartDist = dist(e.touches[0], e.touches[1]);
    pinchStartScale = scale;
  }
},{passive:true});

photoLayer.addEventListener("touchmove",(e)=>{
  if(photoLayer.style.display!=="block") return;
  if(e.touches.length===2 && pinchStartDist){
    e.preventDefault();
    const d = dist(e.touches[0], e.touches[1]);
    const factor = d / pinchStartDist;
    scale = Math.max(1, Math.min(pinchStartScale * factor, 4));
    photoImg.style.transform = `scale(${scale})`;
  }
},{passive:false});

photoLayer.addEventListener("touchend",(e)=>{
  if(e.touches.length<2) pinchStartDist=null;
},{passive:true});

/* 초기 */
renderList();
</script>

</body>
</html>
