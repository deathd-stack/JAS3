<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>JAS MEMO VER 6.4.13</title>

<style>
  :root{
    --bgSolid:#ff6a00;
    --orange1:#ffb347;
    --orange2:#ff7a00;
    --orange3:#ff5a00;
    --blue:#4c8dff;
    --red:#ff4d4f;
    --line:#2e2e32;
    --text:#f5f5f7;
    --muted:#b4b4bc;
    --shadow:0 20px 44px rgba(0,0,0,.34);
    --shadow-soft:0 10px 24px rgba(0,0,0,.26);
    --ui:0.715;
    --dayUi:0.65;
  }

  *{box-sizing:border-box}

  html, body{
    margin:0;
    padding:0;
  }

  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    font-weight:800;
    color:var(--text);
    min-height:100vh;
    overflow-x:hidden;
    background:var(--bgSolid);
  }

  header{
    text-align:center;
    padding:calc(24px * var(--ui)) calc(14px * var(--ui)) calc(10px * var(--ui));
    user-select:none;
    cursor:pointer;
  }

  .titleWrap{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
  }

  .titleMain{
    font-size:calc(46.2px * var(--ui));
    font-weight:1000;
    letter-spacing:-1.2px;
    text-transform:uppercase;
    line-height:1;
    color:#fff;
    text-shadow:0 0 18px rgba(0,0,0,.14);
  }

  .titleVer{
    font-size:calc(18.7px * var(--ui));
    font-weight:1000;
    opacity:.92;
    text-transform:uppercase;
    color:#fff2d8;
    letter-spacing:.4px;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:calc(10px * var(--ui));
    padding:calc(8px * var(--ui)) calc(14px * var(--ui)) calc(8px * var(--ui));
    flex-wrap:wrap;
  }

  button{
    border:none;
    border-radius:999px;
    background:linear-gradient(180deg, rgba(40,40,44,.96), rgba(27,27,30,.96));
    padding:calc(14px * var(--ui)) calc(22px * var(--ui));
    font-weight:1000;
    color:var(--orange1);
    font-size:calc(16px * var(--ui));
    box-shadow:var(--shadow-soft);
    text-transform:uppercase;
    cursor:pointer;
    transition:transform .14s ease, box-shadow .14s ease, filter .14s ease, opacity .14s ease;
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }

  button:hover{
    transform:translateY(-1px);
    box-shadow:0 16px 30px rgba(0,0,0,.30);
    filter:brightness(1.04);
  }

  button:active{
    transform:scale(.985);
  }

  .dayBar{
    width:min(calc(780px * var(--dayUi) / .65), calc(100% - 24px));
    margin:calc(2px * var(--dayUi)) auto calc(10px * var(--dayUi));
    display:flex;
    align-items:center;
    justify-content:center;
    gap:calc(8px * var(--dayUi));
    flex-wrap:wrap;
  }

  .dayBtn{
    padding:calc(10px * var(--dayUi)) calc(14px * var(--dayUi));
    font-size:calc(13px * var(--dayUi));
    border-radius:999px;
    box-shadow:none;
    background:rgba(34,34,38,.92);
    color:var(--orange1);
    border:1px solid rgba(255,255,255,.05);
  }

  .dayLabel{
    background:rgba(34,34,38,.96);
    border:1px solid rgba(255,255,255,.06);
    border-radius:999px;
    padding:calc(10px * var(--dayUi)) calc(16px * var(--dayUi));
    font-size:calc(13px * var(--dayUi));
    font-weight:1000;
    color:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.20);
    text-transform:uppercase;
    letter-spacing:.3px;
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }

  #memoList{
    padding:calc(10px * var(--ui)) calc(14px * var(--ui)) calc(220px * var(--ui));
    max-width:calc(780px * var(--ui) / .65);
    margin:0 auto;
  }

  .emptyDay{
    background:rgba(28,28,31,.70);
    border:1px solid rgba(255,255,255,.06);
    border-radius:calc(30px * var(--ui));
    padding:calc(22px * var(--ui));
    color:#fff;
    text-align:center;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    margin-bottom:calc(42px * var(--ui));
    box-shadow:0 14px 28px rgba(0,0,0,.22);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
  }

  .memoCard{
    background:linear-gradient(180deg, rgba(34,34,38,.96), rgba(24,24,27,.96));
    border-radius:calc(32px * var(--ui));
    padding:calc(16px * var(--ui)) calc(14px * var(--ui));
    margin:calc(12px * var(--ui)) 0;
    box-shadow:var(--shadow);
    border:1px solid rgba(255,255,255,.06);
    overflow:hidden;
    position:relative;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
  }

  .memoCard::before{
    content:"";
    position:absolute;
    left:0;
    top:0;
    bottom:0;
    width:calc(6px * var(--ui));
    background:linear-gradient(180deg,var(--orange1),var(--orange2),var(--orange3));
    box-shadow:0 0 20px rgba(255,122,0,.25);
  }

  .memoRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:flex-start;
    padding-left:calc(4px * var(--ui));
  }

  .selBox{
    width:calc(30px * var(--ui));
    height:calc(30px * var(--ui));
    border-radius:calc(12px * var(--ui));
    border:2px solid rgba(255,255,255,.18);
    background:#131316;
    appearance:none;
    margin-top:calc(8px * var(--ui));
    flex:0 0 auto;
    position:relative;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  }

  .selBox:checked{
    background:#1a1a1d;
    border-color:var(--orange2);
    box-shadow:0 0 0 calc(4px * var(--ui)) rgba(255,122,0,.12);
  }

  .selBox:checked::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:calc(10px * var(--ui));
    height:calc(16px * var(--ui));
    border-right:calc(3px * var(--ui)) solid var(--orange2);
    border-bottom:calc(3px * var(--ui)) solid var(--orange2);
    transform:translate(-50%,-60%) rotate(45deg);
  }

  .lines{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:calc(10px * var(--ui));
    cursor:pointer;
    min-width:0;
  }

  .line{
    display:flex;
    align-items:flex-start;
    gap:calc(10px * var(--ui));
    min-width:0;
  }

  .tagPill{
    background:linear-gradient(180deg,#ff9a2f,#ff6a00);
    color:#fff;
    border-radius:999px;
    padding:calc(10px * var(--ui)) calc(14px * var(--ui));
    font-weight:1000;
    font-size:calc(15px * var(--ui));
    min-width:calc(70px * var(--ui));
    text-align:center;
    flex:0 0 auto;
    text-transform:uppercase;
    box-shadow:0 8px 16px rgba(255,122,0,.20);
  }

  .textPill{
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.05);
    border-radius:999px;
    padding:calc(11px * var(--ui)) calc(16px * var(--ui));
    font-weight:1000;
    font-size:calc(18px * var(--ui));
    color:#fff;
    flex:1;
    min-width:0;
    white-space:normal;
    overflow:visible;
    word-break:break-word;
    text-transform:uppercase;
  }

  .datePill{
    margin-top:calc(8px * var(--ui));
    margin-left:calc(42px * var(--ui));
    font-size:calc(12px * var(--ui));
    color:var(--muted);
    font-weight:1000;
    text-transform:uppercase;
    letter-spacing:.2px;
  }

  .flash{animation:flash .55s;}
  @keyframes flash{
    50%{transform:scale(1.01); filter:brightness(1.06)}
  }

  .bottomLeftButtons{
    position:fixed;
    left:calc(14px * var(--ui));
    bottom:calc(18px * var(--ui));
    z-index:30;
    display:flex;
    flex-direction:column;
    gap:calc(12px * var(--ui));
  }

  .bottomRightButtons{
    position:fixed;
    right:calc(14px * var(--ui));
    bottom:calc(18px * var(--ui));
    z-index:30;
    display:flex;
    flex-direction:column;
    gap:calc(12px * var(--ui));
    align-items:flex-end;
  }

  .itMemoBtn,
  .akMemoBtn,
  .equipBtn{
    width:calc(148px * var(--ui));
    height:calc(50px * var(--ui));
    border-radius:999px;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    padding:0;
    display:flex;
    align-items:center;
    justify-content:center;
    border:1px solid rgba(255,255,255,.08);
    box-shadow:
      0 12px 24px rgba(0,0,0,.22),
      inset 0 1px 0 rgba(255,255,255,.06);
    letter-spacing:.2px;
  }

  .itMemoBtn{
    background:linear-gradient(180deg,#ffe063,#ffc61a);
    color:#111;
  }

  .akMemoBtn{
    background:linear-gradient(180deg,#ff3953,#d80024);
    color:#fff;
  }

  .equipBtn{
    background:linear-gradient(180deg,#2d2d33,#1c1c20);
    color:var(--orange1);
  }

  #equipBadge{
    position:relative;
    min-width:calc(148px * var(--ui));
    background:rgba(18,18,20,.92);
    color:#fff;
    border-radius:calc(24px * var(--ui));
    padding:calc(12px * var(--ui)) calc(14px * var(--ui));
    font-weight:1000;
    line-height:1.15;
    text-align:right;
    box-shadow:
      0 14px 28px rgba(0,0,0,.24),
      inset 0 1px 0 rgba(255,255,255,.05);
    display:none;
    text-transform:uppercase;
    border:1px solid rgba(255,255,255,.06);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
  }

  #equipBadge .b1{font-size:calc(18px * var(--ui));}
  #equipBadge .b2{font-size:calc(18px * var(--ui)); opacity:.95;}

  .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.58);
    display:none;
    justify-content:center;
    align-items:flex-end;
    z-index:50;
    overscroll-behavior:contain;
    pointer-events:none;
  }

  .box{
    width:100%;
    max-width:calc(820px * var(--ui) / .65);
    background:#17171a;
    border-radius:calc(34px * var(--ui)) calc(34px * var(--ui)) 0 0;
    padding:0 calc(14px * var(--ui)) calc(18px * var(--ui));
    max-height:92vh;
    overflow:auto;
    transform:translateY(0);
    will-change:transform;
    -webkit-overflow-scrolling:touch;
    pointer-events:auto;
    box-shadow:0 -10px 30px rgba(0,0,0,.28);
    border-top:1px solid rgba(255,255,255,.05);
  }

  .dragArea{
    padding:calc(7px * var(--ui)) 0 calc(8px * var(--ui));
    position:sticky;
    top:0;
    background:#17171a;
    z-index:40;
  }

  .drag-handle{
    width:calc(62px * var(--ui));
    height:calc(8px * var(--ui));
    background:#494952;
    border-radius:999px;
    margin:0 auto calc(8px * var(--ui));
  }

  .topActionBar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:calc(10px * var(--ui));
  }

  .topMiniBtn{
    padding:calc(10px * var(--ui)) calc(16px * var(--ui));
    font-size:calc(14px * var(--ui));
    border-radius:999px;
    box-shadow:none;
    background:#242429;
    color:var(--orange1);
  }

  /* 네가 원하는 고정 영역 */
  .modalTitleTap{
    position:sticky;
    top:calc(72px * var(--ui));
    z-index:34;
    text-align:center;
    font-weight:1000;
    color:#fff;
    padding:calc(10px * var(--ui)) 0 calc(12px * var(--ui));
    cursor:pointer;
    user-select:none;
    text-transform:uppercase;
    background:linear-gradient(180deg, rgba(23,23,26,1) 0%, rgba(23,23,26,.98) 78%, rgba(23,23,26,.90) 100%);
    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
    margin:0 calc(-14px * var(--ui));
  }

  .modalTitleTap .m1{font-size:calc(18px * var(--ui));}
  .modalTitleTap .m2{font-size:calc(12px * var(--ui)); opacity:.58; margin-top:2px;}

  .dateLine{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:calc(8px * var(--ui));
    margin-bottom:calc(8px * var(--ui));
    margin-top:calc(6px * var(--ui));
  }

  .dateLine .dateLab{
    font-size:calc(15px * var(--ui));
    font-weight:1000;
    color:#fff;
    text-transform:uppercase;
  }

  .dateInput{
    width:auto !important;
    min-width:calc(180px * var(--ui));
    text-align:center;
    padding:0 calc(12px * var(--ui));
  }

  .pickRow{
    display:flex;
    justify-content:center;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
    margin:calc(6px * var(--ui)) 0 calc(12px * var(--ui));
  }

  .pickPill{
    display:flex;
    align-items:center;
    gap:calc(8px * var(--ui));
    background:#222226;
    border:2px solid #2d2d32;
    border-radius:999px;
    padding:calc(11px * var(--ui)) calc(16px * var(--ui));
    font-size:calc(15px * var(--ui));
    font-weight:1000;
    text-transform:uppercase;
    user-select:none;
    color:#fff;
  }

  .pickPill input{
    width:calc(20px * var(--ui));
    height:calc(20px * var(--ui));
    margin:0;
    accent-color:var(--orange2);
  }

  .section{
    background:#1f1f23;
    border-radius:calc(28px * var(--ui));
    padding:calc(14px * var(--ui));
    margin:calc(12px * var(--ui)) 0;
    overflow:hidden;
    border:1px solid rgba(255,255,255,.05);
  }

  .sectionHead{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:calc(10px * var(--ui));
    gap:calc(10px * var(--ui));
  }

  .sectionTitle{
    font-size:calc(24px * var(--ui));
    font-weight:1000;
    letter-spacing:.3px;
    text-transform:uppercase;
    color:#fff;
  }

  .headRight{
    display:flex;
    align-items:flex-start;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
    justify-content:flex-end;
  }

  .staStdWrap{
    display:flex;
    align-items:center;
    gap:calc(8px * var(--ui));
    white-space:nowrap;
  }

  .staStdLab{
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    color:#fff;
    text-transform:uppercase;
  }

  .staStdInput{
    width:calc(92px * var(--ui)) !important;
    min-width:calc(92px * var(--ui));
    text-align:center;
  }

  .timeWrap{
    display:flex;
    align-items:baseline;
    gap:calc(10px * var(--ui));
    white-space:nowrap;
    text-transform:uppercase;
  }

  .timeBtn{
    border:none;
    background:transparent;
    box-shadow:none;
    padding:calc(4px * var(--ui)) calc(8px * var(--ui));
    margin:0;
    font-weight:1000;
    font-size:calc(16px * var(--ui));
    color:#fff;
    border-radius:999px;
    text-transform:uppercase;
  }

  .timeBtn:active{background:rgba(255,122,0,.08);}

  .timeVal{
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    color:var(--orange1);
    min-width:calc(64px * var(--ui));
    text-align:right;
    font-variant-numeric:tabular-nums;
    cursor:pointer;
  }

  .row{
    display:flex;
    align-items:center;
    gap:calc(10px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    flex-wrap:nowrap;
    min-width:0;
  }

  .lab{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    min-width:calc(46px * var(--ui));
    color:#fff;
    white-space:nowrap;
    text-transform:uppercase;
  }

  input, textarea, select{
    font-family:inherit;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    border:2px solid var(--line);
    border-radius:calc(22px * var(--ui));
    outline:none;
    background:#121214;
    color:#fff;
    -webkit-text-size-adjust:100%;
    font-variant-numeric:tabular-nums;
    text-transform:uppercase;
    transition:border-color .14s ease, box-shadow .14s ease;
  }

  input::placeholder, textarea::placeholder{
    color:#8e8e96;
  }

  input:focus, textarea:focus, select:focus{
    border-color:rgba(255,122,0,.7);
    box-shadow:0 0 0 calc(4px * var(--ui)) rgba(255,122,0,.12);
  }

  input{
    width:100%;
    height:calc(54px * var(--ui));
    line-height:calc(54px * var(--ui));
    padding:0 calc(12px * var(--ui));
    text-align:center;
  }

  textarea{
    width:100%;
    height:calc(82px * var(--ui));
    resize:none;
    font-weight:800;
    padding:calc(12px * var(--ui));
    text-transform:none;
    border-radius:calc(24px * var(--ui));
  }

  select{
    height:calc(54px * var(--ui));
    padding:0 calc(12px * var(--ui));
  }

  .numBox{
    font-size:calc(18px * var(--ui));
    letter-spacing:.6px;
  }

  .long{
    flex:1;
    min-width:0;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    padding-left:calc(16px * var(--ui));
    text-align:left;
  }

  .extraBox{
    background:#18181b;
    border:2px solid #27272c;
    border-radius:calc(26px * var(--ui));
    padding:calc(14px * var(--ui));
    margin-top:calc(10px * var(--ui));
  }

  .extraHead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:calc(10px * var(--ui));
    text-transform:uppercase;
  }

  .extraTitle{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    letter-spacing:.4px;
    color:#fff;
  }

  .iconBtn{
    width:calc(48px * var(--ui));
    height:calc(48px * var(--ui));
    border-radius:calc(18px * var(--ui));
    border:none;
    background:#242429;
    box-shadow:0 8px 18px rgba(0,0,0,.16);
    color:var(--orange1);
    font-size:calc(28px * var(--ui));
    font-weight:1000;
    text-transform:uppercase;
  }

  .extraRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin-top:calc(10px * var(--ui));
  }

  .extraRow select{
    width:calc(130px * var(--ui));
    font-size:calc(16px * var(--ui));
    font-weight:1000;
  }

  .extraRow input{
    width:calc(130px * var(--ui));
    font-size:calc(18px * var(--ui));
  }

  .minusBtn{
    width:calc(60px * var(--ui));
    height:calc(54px * var(--ui));
    border-radius:calc(20px * var(--ui));
    border:none;
    background:#242429;
    color:var(--orange1);
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    box-shadow:none;
    text-transform:uppercase;
  }

  .lirBtn{
    padding:calc(10px * var(--ui)) calc(16px * var(--ui));
    font-size:calc(14px * var(--ui));
    border-radius:999px;
    box-shadow:none;
    background:#242429;
    color:var(--orange1);
  }

  .lirCalcRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:calc(10px * var(--ui));
    margin:calc(12px * var(--ui)) 0 calc(4px * var(--ui));
    flex-wrap:nowrap;
  }

  .lirBtns{
    display:flex;
    align-items:center;
    gap:calc(10px * var(--ui));
    flex-wrap:wrap;
  }

  .calcCircleBtn{
    width:calc(48px * var(--ui));
    height:calc(48px * var(--ui));
    min-width:calc(48px * var(--ui));
    border-radius:999px;
    border:none;
    background:#242429;
    box-shadow:0 8px 18px rgba(0,0,0,.16);
    color:var(--orange1);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
  }

  .calcIconBtn{
    position:relative;
  }

  .calcIcon{
    position:relative;
    display:block;
    width:calc(22px * var(--ui));
    height:calc(26px * var(--ui));
    border:2px solid var(--orange2);
    border-radius:calc(8px * var(--ui));
  }

  .calcIcon::before{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top:calc(3px * var(--ui));
    width:calc(12px * var(--ui));
    height:calc(4px * var(--ui));
    background:var(--orange2);
    border-radius:calc(3px * var(--ui));
  }

  .calcIcon::after{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom:calc(4px * var(--ui));
    width:calc(12px * var(--ui));
    height:calc(10px * var(--ui));
    background:
      radial-gradient(circle, var(--orange2) 58%, transparent 60%) 0 0 / calc(4px * var(--ui)) calc(4px * var(--ui)) repeat;
    opacity:.95;
  }

  .calcFloatingWrap{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.42);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:120;
    padding:calc(16px * var(--ui));
  }

  .calcFloatingWrap.show{
    display:flex;
  }

  .calcFloating{
    width:min(calc(430px * var(--ui) / .65), 100%);
    background:#18181b;
    border-radius:calc(30px * var(--ui));
    box-shadow:0 22px 46px rgba(0,0,0,.34);
    padding:calc(14px * var(--ui));
    animation:calcUp .16s ease;
    border:1px solid rgba(255,255,255,.05);
  }

  @keyframes calcUp{
    from{transform:translateY(18px); opacity:.75}
    to{transform:translateY(0); opacity:1}
  }

  .calcTopBar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:calc(10px * var(--ui));
    margin-bottom:calc(10px * var(--ui));
  }

  .calcTitle{
    font-size:calc(15px * var(--ui));
    font-weight:1000;
    color:#fff;
    text-transform:uppercase;
    letter-spacing:.4px;
  }

  .calcCloseBtn{
    border:none;
    background:#242429;
    color:var(--orange1);
    width:calc(42px * var(--ui));
    height:calc(42px * var(--ui));
    border-radius:calc(16px * var(--ui));
    box-shadow:none;
    padding:0;
    font-size:calc(18px * var(--ui));
    font-weight:1000;
  }

  .calcDisplay{
    width:100%;
    height:calc(60px * var(--ui));
    border:2px solid #2b2b31;
    border-radius:calc(24px * var(--ui));
    background:#101012;
    padding:0 calc(14px * var(--ui));
    display:flex;
    align-items:center;
    justify-content:flex-end;
    font-size:calc(24px * var(--ui));
    font-weight:1000;
    color:#fff;
    overflow:hidden;
    white-space:nowrap;
    font-variant-numeric:tabular-nums;
  }

  .calcGrid{
    margin-top:calc(10px * var(--ui));
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:calc(8px * var(--ui));
  }

  .calcKey{
    height:calc(54px * var(--ui));
    border:none;
    border-radius:calc(20px * var(--ui));
    background:#242429;
    color:#fff;
    font-size:calc(18px * var(--ui));
    font-weight:1000;
    box-shadow:none;
    padding:0;
  }

  .calcKey.op{
    background:#2b2b31;
    color:var(--orange1);
  }

  .calcKey.eq{
    background:linear-gradient(180deg,var(--orange2),var(--orange3));
    color:#fff;
  }

  .calcKey.wide{
    grid-column:span 2;
  }

  .focusedCalcTarget{
    border-color:rgba(255,122,0,.7) !important;
    box-shadow:0 0 0 calc(4px * var(--ui)) rgba(255,122,0,.12) !important;
  }

  #photoLayer{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:90;
  }

  #photoLayer img{
    max-width:100%;
    max-height:100%;
    object-fit:contain;
  }

  .rowGrid3{
    display:grid;
    grid-template-columns:
      calc(26px * var(--ui)) .9fr
      calc(26px * var(--ui)) .9fr
      calc(14px * var(--ui)) .9fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  .rowGridTDBB{
    display:grid;
    grid-template-columns:
      calc(18px * var(--ui)) 1fr
      calc(18px * var(--ui)) .9fr
      calc(26px * var(--ui)) .9fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  .rowGridTTTB{
    display:grid;
    grid-template-columns:
      calc(26px * var(--ui)) 1fr
      calc(26px * var(--ui)) 1fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }

  @media (max-width:520px){
    .bottomLeftButtons{
      left:12px;
      bottom:14px;
      gap:10px;
    }

    .bottomRightButtons{
      right:12px;
      bottom:14px;
      gap:10px;
    }

    .itMemoBtn,
    .akMemoBtn,
    .equipBtn{
      width:122px;
      height:42px;
      font-size:14px;
    }

    #equipBadge{
      min-width:122px;
      padding:10px 12px;
    }

    #equipBadge .b1,
    #equipBadge .b2{
      font-size:14px;
    }

    .topMiniBtn{
      padding:8px 12px;
      font-size:14px;
    }
  }

  .cmptArea{
    flex:1;
    min-width:0;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    padding:calc(14px * var(--ui)) calc(16px * var(--ui));
    text-align:left;
    text-transform:uppercase;
    resize:none;
    overflow:hidden;
    min-height:calc(54px * var(--ui));
    height:calc(54px * var(--ui));
    line-height:1.25;
    border-radius:calc(22px * var(--ui));
  }

</style>
</head>

<body>

<header id="homeHeader" onclick="openPhoto()" ondblclick="openPhoto()">
  <div class="titleWrap">
    <div class="titleMain">JAS MEMO</div>
    <div class="titleVer">VER 6.4.13</div>
  </div>
</header>

<div class="controls" id="topControls">

  <button type="button" onclick="deleteSelected()">DELETE</button>

<div class="dayBar">
  <button type="button" class="dayBtn" onclick="moveDay(-1)">PREV DAY</button>
  <div class="dayLabel" id="dayLabel">TODAY</div>
  <button type="button" class="dayBtn" onclick="goToday()">TODAY</button>

  <button type="button" class="dayBtn" onclick="moveDay(1)">NEXT DAY</button>

<div id="memoList"></div>

<div class="bottomLeftButtons">
  <button class="equipBtn" type="button" onclick="openEquip()">EQUIPMENT</button>

<div class="bottomRightButtons">

  <button class="akMemoBtn" onclick="location.href='https://deathd-stack.github.io/JAS1/'">AK MEMO</button>
</div>

<input type="file" id="photoInput" accept="image/*" hidden />
<input type="file" id="lirPhotoInput" accept="image/*" hidden />

<div class="modal" id="modal" aria-hidden="true">
  <div class="box" id="sheet" role="dialog" aria-modal="true">
    <div class="dragArea" id="dragArea">
      <div class="drag-handle"></div>
      <div class="topActionBar">
        <button type="button" class="topMiniBtn" onclick="saveMemo()">SAVE</button>
        <button type="button" class="topMiniBtn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>

    <div class="modalTitleTap" onclick="openPhoto()">
      <div class="m1">JAS MEMO</div>
      <div class="m2">TAP TO OPEN PHOTO</div>
    </div>

    <div class="dateLine">
      <div class="dateLab">DATE</div>
      <input type="date" id="memoDate" class="dateInput">
    </div>

    <div class="pickRow">
      <label class="pickPill">
        <input type="checkbox" id="pickInbound" checked>
        <span>INBOUND</span>
      </label>
      <label class="pickPill">
        <input type="checkbox" id="pickOutbound" checked>
        <span>OUTBOUND</span>

</div>

<div id="photoLayer" ondblclick="closePhoto()" onclick="closePhoto()">
  <img id="photoImg" alt="photo" />
</div>

<div class="modal" id="equipModal" aria-hidden="true">
  <div class="box" style="max-height:70vh" onclick="event.stopPropagation()">
    <div class="dragArea">
      <div class="drag-handle"></div>
      <div class="topActionBar">
        <button type="button" class="topMiniBtn" onclick="saveEquip()">SAVE</button>
        <button type="button" class="topMiniBtn" onclick="closeEquip()">CLOSE</button>
      </div>
    </div>

    <div style="font-weight:1000;font-size:20px;margin:6px 0 12px; text-transform:uppercase; color:#fff;">EQUIPMENT</div>

    <div class="row">
      <div class="lab" style="min-width:72px;">TUG</div>
      <input id="tug1" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
      <input id="tug2" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>

    <div class="row">
      <div class="lab" style="min-width:72px;">BELT</div>
      <input id="belt" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>
  </div>
</div>

<div id="calcWrap" class="calcFloatingWrap" aria-hidden="true">
  <div class="calcFloating" onclick="event.stopPropagation()">
    <div class="calcTopBar">
      <div class="calcTitle">CALCULATOR</div>
      <button type="button" class="calcCloseBtn" onclick="closeCalc()">✕</button>
    </div>
    <div class="calcDisplay" id="globalCalcDisplay">0</div>
    <div class="calcGrid">
      <button type="button" class="calcKey op" data-global-calc="C">C</button>
      <button type="button" class="calcKey op" data-global-calc="⌫">⌫</button>
      <button type="button" class="calcKey op" data-global-calc="%">%</button>
      <button type="button" class="calcKey op" data-global-calc="/">÷</button>

      <button type="button" class="calcKey" data-global-calc="7">7</button>
      <button type="button" class="calcKey" data-global-calc="8">8</button>
      <button type="button" class="calcKey" data-global-calc="9">9</button>
      <button type="button" class="calcKey op" data-global-calc="*">×</button>

      <button type="button" class="calcKey" data-global-calc="4">4</button>
      <button type="button" class="calcKey" data-global-calc="5">5</button>
      <button type="button" class="calcKey" data-global-calc="6">6</button>
      <button type="button" class="calcKey op" data-global-calc="-">−</button>

      <button type="button" class="calcKey" data-global-calc="1">1</button>
      <button type="button" class="calcKey" data-global-calc="2">2</button>
      <button type="button" class="calcKey" data-global-calc="3">3</button>
      <button type="button" class="calcKey op" data-global-calc="+">+</button>

      <button type="button" class="calcKey wide" data-global-calc="0">0</button>
      <button type="button" class="calcKey" data-global-calc=".">.</button>
      <button type="button" class="calcKey eq" data-global-calc="=">=</button>
    </div>
  </div>
</div>

<script>
  const MEMO_KEY = "jas_memos_v64";
  const PHOTO_KEY = "jas_photo_v64";
  const EQUIP_KEY = "jas_equipment_v64";

  const modal = document.getElementById("modal");
  const sheet = document.getElementById("sheet");
  const dragArea = document.getElementById("dragArea");
  const sections = document.getElementById("sections");
  const memoList = document.getElementById("memoList");
  const photoInput = document.getElementById("photoInput");
  const lirPhotoInput = document.getElementById("lirPhotoInput");
  const photoLayer = document.getElementById("photoLayer");
  const photoImg = document.getElementById("photoImg");
  const memoDate = document.getElementById("memoDate");
  const dayLabel = document.getElementById("dayLabel");
  const pickInbound = document.getElementById("pickInbound");
  const pickOutbound = document.getElementById("pickOutbound");
  const topControls = document.getElementById("topControls");

  const equipBadge = document.getElementById("equipBadge");
  const equipModal = document.getElementById("equipModal");
  const tug1 = document.getElementById("tug1");
  const tug2 = document.getElementById("tug2");
  const belt = document.getElementById("belt");

  const calcWrap = document.getElementById("calcWrap");
  const globalCalcDisplay = document.getElementById("globalCalcDisplay");

  let memos = JSON.parse(localStorage.getItem(MEMO_KEY) || "[]");
  let photo = localStorage.getItem(PHOTO_KEY) || "";
  let editId = null;
  let dayOffset = 0;
  let activeLirType = null;
  let currentLirPhotos = { INBOUND:"", OUTBOUND:"" };
  let globalCalcExpr = "";
  let activeCalcInput = null;

  const EXTRA_KEYS = ["W","C","COB","GB","TS","EMS","RUSH","CARSEAT","COMAT","STRAP","LONGFIN","CYCLE","CREW","PCB"];

  function onlyNum(val, len){
    return (val || "").replace(/[^0-9]/g, "").slice(0, len);
  }

  function pad(val, len){
    const v = onlyNum(val, len);
    return v ? v.padStart(len, "0") : "";
  }

  function cleanTextUpper(val){
    return (val || "").toUpperCase().trim();
  }

  function defaultF(val){
    const v = cleanTextUpper(val);
    return v ? v : "F";
  }

  function nowTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }

  function normalizeTimeText(val){
    const raw = (val || "").trim();
    if(!raw) return "";
    const digits = raw.replace(/[^0-9]/g, "");
    if(digits.length === 3) return digits.slice(0,1) + ":" + digits.slice(1,3);
    if(digits.length >= 4) return digits.slice(0,2) + ":" + digits.slice(2,4);
    return raw.slice(0,5);
  }

  function askTime(currentValue=""){
    const t = prompt("TIME (HH:MM 24H)", currentValue || nowTime());
    if(t === null) return null;
    return normalizeTimeText(t);
  }

  function todayStr(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  function dateToStr(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }

  function getViewingDate(){
    const d = new Date();
    d.setHours(0,0,0,0);
    d.setDate(d.getDate() + dayOffset);
    return d;
  }

  function getViewingDayKey(){
    return dateToStr(getViewingDate());
  }

  function updateDayLabel(){
    dayLabel.textContent = getViewingDayKey();
  }

  function calcDayOffsetFromDate(dateStr){
    const base = new Date(todayStr());
    const target = new Date(dateStr);
    base.setHours(0,0,0,0);
    target.setHours(0,0,0,0);
    return Math.round((target - base) / 86400000);
  }

  function moveDay(n){
    dayOffset += n;
    updateDayLabel();
    renderList();
  }

  function goToday(){
    dayOffset = 0;
    updateDayLabel();
    renderList();
  }

  function deleteCurrentDay(){
    const dk = getViewingDayKey();
    const target = memos.filter(m => (m.dayKey || m.memoDate) === dk);
    if(!target.length){
      alert("NO MEMO IN THIS DAY");
      return;
    }
    if(!confirm("DELETE ALL MEMOS IN THIS DAY?")) return;
    memos = memos.filter(m => (m.dayKey || m.memoDate) !== dk);
    localStorage.setItem(MEMO_KEY, JSON.stringify(memos));
    renderList();
  }

  function isCalcEligibleInput(el){
    if(!(el instanceof HTMLInputElement)) return false;
    const k = el.dataset.k || "";
    if(!k) return false;
    return (
      k.endsWith("-7C") ||
      k.endsWith("-STA") ||
      k.endsWith("-STD") ||
      k.endsWith("-t") ||
      k.endsWith("-d") ||
      k.endsWith("-bb") ||
      k.endsWith("-tt") ||
      k.endsWith("-tb") ||
      k === "SHARED-HL" ||
      k === "SHARED-HASH" ||
      k.startsWith("extraVal-")
    );
  }

  document.addEventListener("focusin", (e)=>{
    const t = e.target;
    if(isCalcEligibleInput(t)){
      if(activeCalcInput && activeCalcInput !== t){
        activeCalcInput.classList.remove("focusedCalcTarget");
      }
      activeCalcInput = t;
      activeCalcInput.classList.add("focusedCalcTarget");
    }
  });

  document.addEventListener("click", (e)=>{
    const t = e.target;
    if(!(t instanceof HTMLElement)) return;
    if(!t.closest(".section") && !t.closest(".calcFloating")){
      if(activeCalcInput){
        activeCalcInput.classList.remove("focusedCalcTarget");
      }
    }
  });

  document.addEventListener("input", (e)=>{
    const t = e.target;
    if(!(t instanceof HTMLInputElement)) return;
    const k = t.dataset.k || "";
    if(!k) return;

    if(k === "SHARED-HL"){
      t.value = onlyNum(t.value, 4);
      document.querySelectorAll('input[data-k="SHARED-HL"]').forEach(el=>{
        if(el !== t) el.value = t.value;
      });
      return;
    }

    if(k === "SHARED-HASH"){
      t.value = onlyNum(t.value, 3);
      document.querySelectorAll('input[data-k="SHARED-HASH"]').forEach(el=>{
        if(el !== t) el.value = t.value;
      });
      return;
    }

    if(k.endsWith("-7C")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-STA")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-STD")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-t")) t.value = onlyNum(t.value, 3);
    if(k.endsWith("-d")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-bb")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-tt")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-tb")) t.value = onlyNum(t.value, 4);
    if(k.startsWith("extraVal-")) t.value = onlyNum(t.value, 3);
  });

  function makeExtraRow(type, key="CREW", val=""){
    const row = document.createElement("div");
    row.className = "extraRow";
    row.innerHTML = `
      <select>
        ${EXTRA_KEYS.map(k => `<option value="${k}" ${k===key ? "selected" : ""}>${k}</option>`).join("")}
      </select>
      <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="extraVal-${type}" value="${onlyNum(val,3)}">
      <button type="button" class="minusBtn" onclick="this.parentElement.remove()">-</button>
    `;
    return row;
  }

  function addExtraRow(type){
    const root = sections.querySelector(`.section[data-type="${type}"]`);
    const box = root ? root.querySelector(`#${type}-EXTRAS`) : null;
    if(!box) return;
    box.appendChild(makeExtraRow(type, "CREW", ""));
  }

  function bindEditableTime(el, initialValue){
    el.textContent = initialValue || "";
    el.addEventListener("click", ()=>{
      const t = askTime(el.textContent || "");
      if(t !== null) el.textContent = t;
    });
  }

  function openLirPicker(type){
    activeLirType = type;
    lirPhotoInput.value = "";
    lirPhotoInput.click();
  }

  function viewLirPhoto(type){
    const src = currentLirPhotos[type] || "";
    if(!src){
      alert("NO LIR PHOTO");
      return;
    }
    photoImg.src = src;
    photoLayer.style.display = "flex";
  }

  function openCalc(){
    calcWrap.classList.add("show");
    calcWrap.setAttribute("aria-hidden","false");
  }

  function closeCalc(){
    calcWrap.classList.remove("show");
    calcWrap.setAttribute("aria-hidden","true");
  }

  function updateGlobalCalcDisplay(val){
    globalCalcDisplay.textContent = val || "0";
  }

  function safeEval(expr){
    if(!expr) return "0";
    const cleaned = expr.replace(/[^0-9+\-*/%.()]/g, "");
    if(!cleaned) return "0";
    try{
      const result = Function("return (" + cleaned + ")")();
      if(result === undefined || result === null || Number.isNaN(result) || !Number.isFinite(result)){
        return "ERROR";
      }
      return String(result);
    }catch(e){
      return "ERROR";
    }
  }

  function applyCalcToInput(result){
    if(!activeCalcInput) return;
    const k = activeCalcInput.dataset.k || "";
    const digits = String(result || "").replace(/[^0-9]/g, "");

    if(k === "SHARED-HL"){
      activeCalcInput.value = digits.slice(0,4);
    }else if(k === "SHARED-HASH"){
      activeCalcInput.value = digits.slice(0,3);
    }else if(k.endsWith("-7C") || k.endsWith("-STA") || k.endsWith("-STD") || k.endsWith("-tt") || k.endsWith("-tb")){
      activeCalcInput.value = digits.slice(0,4);
    }else if(k.endsWith("-t") || k.startsWith("extraVal-")){
      activeCalcInput.value = digits.slice(0,3);
    }else if(k.endsWith("-d") || k.endsWith("-bb")){
      activeCalcInput.value = digits.slice(0,2);
    }else{
      activeCalcInput.value = digits;
    }

    activeCalcInput.dispatchEvent(new Event("input", { bubbles:true }));
  }

  function makeSection(type, memoData){
    const d = document.createElement("div");
    d.className = "section";
    d.dataset.type = type;

    const savedTime = memoData ? (memoData[type+"-TIME"] || "") : "";
    const local7C = memoData ? (memoData[type+"-7C"] || "") : "";
    const sharedHL = memoData ? (memoData.sharedHL || "") : "";
    const sharedHASH = memoData ? (memoData.sharedHASH || "") : "";
    const v = (k)=> memoData ? (memoData[type+"-"+k] || "") : "";
    const noteV = memoData ? (memoData[type+"-note"] || "") : "";

    const cmpt1Val = memoData ? defaultF(memoData[type+"-cmpt1"]) : "F";
    const cmpt2Val = memoData ? defaultF(memoData[type+"-cmpt2"]) : "F";

    const staStdLabel = type === "INBOUND" ? "STA" : "STD";
    const staStdKey = type === "INBOUND" ? "STA" : "STD";

    d.innerHTML = `
      <div class="sectionHead">
        <div class="sectionTitle">${type}</div>
        <div class="headRight">
          <div class="staStdWrap">
            <div class="staStdLab">${staStdLabel}</div>
            <input class="numBox staStdInput" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-${staStdKey}" value="${v(staStdKey)}">
          </div>
          <div class="timeWrap">
            <button type="button" class="timeBtn" data-timebtn="${type}">TIME</button>
            <div class="timeVal" id="${type}-TIMESHOWN"></div>
          </div>
        </div>
      </div>

      <div class="rowGrid3">
        <div class="lab">7C</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-7C" value="${local7C}">
        <div class="lab">HL</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="SHARED-HL" value="${sharedHL}">

  function loadImageFromFile(file){
    return new Promise((resolve, reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=> resolve(img);
        img.onerror = ()=> reject(new Error("IMAGE LOAD FAIL"));
        img.src = String(reader.result || "");
      };
      reader.onerror = ()=> reject(new Error("FILE READ FAIL"));
      reader.readAsDataURL(file);
    });
  }

  function compressImageToDataUrl(img, maxW = 1600, maxH = 1600, quality = 0.82){
    const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
    const w = Math.max(1, Math.round(img.width * ratio));
    const h = Math.max(1, Math.round(img.height * ratio));

    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;

    const ctx = canvas.getContext("2d");
    if(!ctx) throw new Error("CANVAS FAIL");
    ctx.drawImage(img, 0, 0, w, h);

    return canvas.toDataURL("image/jpeg", quality);
  }

  async function makeStablePhotoData(file){
    const img = await loadImageFromFile(file);

    const tries = [
      { maxW:1600, maxH:1600, quality:0.82 },
      { maxW:1600, maxH:1600, quality:0.70 },
      { maxW:1440, maxH:1440, quality:0.60 },
      { maxW:1280, maxH:1280, quality:0.52 },
      { maxW:1080, maxH:1080, quality:0.48 }
    ];

    for(const t of tries){
      const dataUrl = compressImageToDataUrl(img, t.maxW, t.maxH, t.quality);
      if(dataUrl.length < 3500000) return dataUrl;
    }

    return compressImageToDataUrl(img, 960, 960, 0.42);
  }

  function normalizeForParse(txt){

  function stripFakSegments(s){

    out = out.replace(/(?:^|,\s*)FAK\s+\d+(?:\.\d+)?\s*KG\b/gi, "");
    out = out.replace(/,\s*,/g, ", ");

      .replace(/\s*,\s*/g, ", ")
      .replace(/\s{2,}/g, " ")

    return out.replace(/\s{2,}/g, " ").trim() || "NIL";

  function appendToLast(lines, extra){
    if(!extra) return;
    if(!lines.length){
      lines.push(extra);
    }else{
      lines[lines.length - 1] = (lines[lines.length - 1] + " " + extra).replace(/\s{2,}/g, " ").trim();
    }
  }

  function splitMainAndSi(noteText){
    const rawLines = normalizeForParse(noteText).split("\n").map(v=>v.trim()).filter(Boolean);
    const mainLines = [];
    const siLines = [];
    let inSi = false;

    for(let line of rawLines){
      const upper = line.toUpperCase();

      if(/^SI(?:\s|$)/.test(upper)){
        if(upper === "SI"){
          inSi = true;
          continue;
        }
        line = line.replace(/^SI\s*/i, "").trim();
        inSi = true;
      }

      if(/^END$/i.test(upper)) break;

      if(/^-/.test(line)){
        line = line.replace(/^-+\s*/, "").trim();
        if(inSi) appendToLast(siLines, line);
        else appendToLast(mainLines, line);
        continue;
      }

      if(inSi) siLines.push(line);
      else mainLines.push(line);
    }

    return { mainLines, siLines };
  }

  function parseCptBlocks(noteText){
    const { mainLines, siLines } = splitMainAndSi(noteText);
    const cpts = { 1:"", 2:"", 3:"", 4:"" };
    const mainText = (mainLines || []).join("
").replace(/
/g, "");
    const blocks = mainText.match(/CPT\s*[1-4]\s*-?[\s\S]*?(?=
\s*CPT\s*[1-4]\s*-?|$)/gi) || [];

    blocks.forEach(block=>{
      const m = block.match(/^\s*CPT\s*([1-4])\s*-?\s*([\s\S]*)$/i);
      if(!m) return;
      const idx = Number(m[1]);
      const body = (m[2] || "")
        .split("
")
        .map(v=>v.trim())
        .filter(Boolean)
        .join(" ")
        .replace(/\s{2,}/g, " ")
        .trim();
      cpts[idx] = normalizeCmptContent(body);
    });

    Object.keys(cpts).forEach(k=>{
      if(!cpts[k]) cpts[k] = "NIL";
    });

    return { cpts, siLines };
  }

  function extractBagTotal(lines){
    let total = 0;
    (lines || []).forEach(v=>{
      const s = smartUpper(v);
      let m;
      const re = /\bBAG\s+(\d+)\s*P(?:C|CS)\b/g;
      while((m = re.exec(s)) !== null){
        total += Number(m[1] || 0);
      }
    });
    return total ? String(total) : "";
  }

  function extractDsTotal(lines){
    let total = 0;
    (lines || []).forEach(v=>{
      const s = smartUpper(v);
      let m;
      const re = /\bD\/?S\s+(\d+)\s*P(?:C|CS)\b/g;
      while((m = re.exec(s)) !== null){
        total += Number(m[1] || 0);
      }
    });
    return total ? String(total) : "";
  }

  function extractBbstValue(lines){
    for(const v of (lines || [])){
      const s = smartUpper(v);
      const m = s.match(/\b(?:BBST|BB)\s*[:\/-]?\s*(\d+)\b/);
      if(m) return m[1];
    }
    return "";
  }

  function collectExtraMatches(lines, fromSi){
    const extras = [];
    const add = (key, val)=>{
      const num = String(val || "").replace(/[^0-9]/g, "");
      if(!num) return;
      const exKey = String(key || "").toUpperCase();
      const found = extras.find(x => x.key === exKey);
      if(found){
        found.val = String(Number(found.val || 0) + Number(num));
      }else{
        extras.push({ key: exKey, val: num });
      }
    };

    const joined = lines.map(smartUpper).join("\n");

    let m;
    const cgoRe = /\bCGO\s+(\d+)\s*P(?:C|CS)\b/g;
    while((m = cgoRe.exec(joined)) !== null) add("C", m[1]);

    const emsRe = /\b(?:MAIL|POS|EMS)\s+(\d+)\s*P(?:C|CS)\b/g;
    while((m = emsRe.exec(joined)) !== null) add("EMS", m[1]);

    const btRe = /\bBT\b[\s,/-]*BAG\s+(\d+)\s*P(?:C|CS)\b/g;
    while((m = btRe.exec(joined)) !== null) add("TS", m[1]);

    const simpleMap = [
      ["WCHR","W"], ["COB","COB"], ["G/B","GB"], ["TS","TS"], ["T/S","TS"],
      ["RUSH","RUSH"], ["CARSEAT","CARSEAT"], ["COMAT","COMAT"], ["LONGFIN","LONGFIN"],
      ["CYCLE","CYCLE"], ["CREW","CREW"], ["PCB","PCB"]
    ];

    if(!fromSi){
      for(const [pattern, key] of simpleMap){
        const esc = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace("/", "\\/");
        const re = new RegExp(`\\b${esc}\\b(?:\\s+(\\d+))?`, "g");
        while((m = re.exec(joined)) !== null){
          add(key, m[1] || "1");
        }
      }
    }else{
      for(const [pattern, key] of simpleMap){
        const esc = pattern.replace(/[.*+?^${}()|[\]\\]/g, '\\$&').replace("/", "\\/");
        const re = new RegExp(`\\b${esc}\\b(?:\\s+(\\d+))?`, "g");
        while((m = re.exec(joined)) !== null){
          add(key, m[1] || "1");
        }
      }
    }

    return extras;
  }

  function applyExtraRows(type, extras){
    const root = sections.querySelector(`.section[data-type="${type}"]`);
    if(!root) return;
    const box = root.querySelector(`#${type}-EXTRAS`);
    if(!box) return;
    box.innerHTML = "";
    (extras || []).forEach(ex=>{
      box.appendChild(makeExtraRow(type, ex.key, ex.val));
    });
  }

  function ensureCmptAreas(){
    ["INBOUND","OUTBOUND"].forEach(type=>{
      [1,2,3,4].forEach(n=>{
        const oldEl = sections.querySelector(`[data-k="${type}-cmpt${n}"]`);
        if(!oldEl || oldEl.tagName === "TEXTAREA") return;
        const ta = document.createElement("textarea");
        ta.className = (oldEl.className || "") + " cmptArea";
        ta.dataset.k = oldEl.dataset.k;
        ta.placeholder = oldEl.placeholder || "TEXT";
        ta.value = oldEl.value || "";
        ta.rows = 1;
        oldEl.replaceWith(ta);
        ta.addEventListener("input", ()=> autoResizeTextarea(ta));
        autoResizeTextarea(ta);
      });
    });
  }

  function attachNoteParser(type){
    const root = sections.querySelector(`.section[data-type="${type}"]`);
    if(!root) return;
    const note = root.querySelector(`textarea[data-k="${type}-note"]`);
    if(!note || note.dataset.noteParserAttached === "1") return;
    note.dataset.noteParserAttached = "1";

    const run = ()=>{
      const raw = note.value || "";
      if(!raw.trim()) return;
      const { cpts, siLines } = parseCptBlocks(raw);

      [1,2,3,4].forEach(n=>{
        const el = root.querySelector(`[data-k="${type}-cmpt${n}"]`);
        if(el && cpts[n]){
          el.value = cpts[n];
          if(el.tagName === "TEXTAREA") autoResizeTextarea(el);
        }
      });

      const tEl = root.querySelector(`input[data-k="${type}-t"]`);
      const dEl = root.querySelector(`input[data-k="${type}-d"]`);
      const bbEl = root.querySelector(`input[data-k="${type}-bb"]`);

      const countLines = siLines.length ? Object.values(cpts).concat(siLines) : Object.values(cpts);
      const tVal = extractBagTotal(countLines);
      const dVal = extractDsTotal(countLines);
      const bbVal = extractBbstValue(countLines);

      if(tEl && tVal) tEl.value = onlyNum(tVal, 3);
      if(dEl && dVal) dEl.value = onlyNum(dVal, 2);
      if(bbEl && bbVal) bbEl.value = onlyNum(bbVal, 2);

      let extras = [];
      if(siLines.length){
        extras = collectExtraMatches(siLines, true);
      }else{
        extras = collectExtraMatches(Object.values(cpts), false);
      }
      applyExtraRows(type, extras);
    };

    note.addEventListener("paste", ()=> setTimeout(run, 0));
    note.addEventListener("blur", run);
  }

  function enhanceMemoSections(){
    ensureCmptAreas();
    ["INBOUND","OUTBOUND"].forEach(type=>{
      attachNoteParser(type);
      [1,2,3,4].forEach(n=>{
        const el = sections.querySelector(`[data-k="${type}-cmpt${n}"]`);
        if(el && el.tagName === "TEXTAREA") autoResizeTextarea(el);
      });
    });
  }

  const _buildSectionsBlank = buildSectionsBlank;
  buildSectionsBlank = function(){
    _buildSectionsBlank();
    enhanceMemoSections();
  };

  const _rebuildSectionsFromMemo = rebuildSectionsFromMemo;
  rebuildSectionsFromMemo = function(memoData){
    _rebuildSectionsFromMemo(memoData);
    enhanceMemoSections();
  };

  const _newMemo = newMemo;
  newMemo = function(){
    _newMemo();
    enhanceMemoSections();
  };

  const _editMemo = editMemo;
  editMemo = function(id){
    _editMemo(id);
    enhanceMemoSections();
  };

  enhanceMemoSections();

</script>
