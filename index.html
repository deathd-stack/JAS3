<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>JAS MEMO VER 4.3</title>

<style>
  :root{
    --bg1:#ff9800;
    --bg2:#ff7a1a;
    --card:#f6e7d7;
    --pill:#111;
    --shadow:0 14px 26px rgba(0,0,0,.18);
    --blue:#2f7df6;
    --red:#e20000;
    --line:#cfcfcf;
    --ui:.8;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    font-family:-apple-system, system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-weight:700;
    background:
      radial-gradient(1200px 700px at 50% -10%, #ffd18a 0%, transparent 55%),
      linear-gradient(180deg,var(--bg1),var(--bg2));
    min-height:100vh;
    overflow-x:hidden;
  }

  header{
    text-align:center;
    padding:22px 14px 10px;
    user-select:none;
    cursor:pointer;
  }
  .titleWrap{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }
  .titleMain{
    font-size:42px;
    font-weight:1000;
    letter-spacing:-1px;
    color:#111;
    text-transform:uppercase;
  }
  .titleVer{
    font-size:18px;
    font-weight:1000;
    color:#111;
    opacity:.9;
    text-transform:uppercase;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:calc(14px * var(--ui));
    padding:calc(8px * var(--ui)) calc(14px * var(--ui)) calc(6px * var(--ui));
    flex-wrap:wrap;
  }
  button{
    border:none;
    border-radius:calc(22px * var(--ui));
    background:#fff;
    padding:calc(14px * var(--ui)) calc(22px * var(--ui));
    font-weight:1000;
    color:var(--blue);
    font-size:calc(18px * var(--ui));
    box-shadow:0 10px 20px rgba(0,0,0,.18);
    text-transform:uppercase;
    cursor:pointer;
  }
  button:active{transform:scale(.99)}

  .weekBar{
    width:min(780px, calc(100% - 28px));
    margin:0 auto calc(10px * var(--ui));
    display:flex;
    align-items:center;
    justify-content:center;
    gap:calc(8px * var(--ui));
    flex-wrap:wrap;
  }
  .weekBtn{
    padding:calc(8px * var(--ui)) calc(12px * var(--ui));
    font-size:calc(14px * var(--ui));
    border-radius:calc(14px * var(--ui));
    box-shadow:none;
  }
  .weekLabel{
    background:rgba(255,255,255,.92);
    border-radius:calc(14px * var(--ui));
    padding:calc(9px * var(--ui)) calc(14px * var(--ui));
    font-size:calc(14px * var(--ui));
    font-weight:1000;
    color:#111;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
    text-transform:uppercase;
  }

  #memoList{
    padding:calc(10px * var(--ui)) calc(14px * var(--ui)) calc(110px * var(--ui));
    max-width:780px;
    margin:0 auto;
  }
  .emptyWeek{
    background:rgba(255,255,255,.22);
    border-radius:calc(20px * var(--ui));
    padding:calc(18px * var(--ui));
    color:#111;
    text-align:center;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
  }

  .memoCard{
    background:rgba(246,231,215,.92);
    border-radius:calc(24px * var(--ui));
    padding:calc(14px * var(--ui)) calc(12px * var(--ui));
    margin:calc(12px * var(--ui)) 0;
    box-shadow:0 16px 26px rgba(0,0,0,.18);
    border:2px solid rgba(255,255,255,.45);
    overflow:hidden;
  }
  .memoRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:flex-start;
  }

  .selBox{
    width:calc(30px * var(--ui));
    height:calc(30px * var(--ui));
    border-radius:calc(10px * var(--ui));
    border:2px solid rgba(0,0,0,.28);
    background:#fff;
    appearance:none;
    margin-top:calc(8px * var(--ui));
    flex:0 0 auto;
    position:relative;
  }
  .selBox:checked{
    background:#fff;
    border-color:#1e63d8;
    box-shadow:0 0 0 calc(4px * var(--ui)) rgba(47,125,246,.14);
  }
  .selBox:checked::after{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    width:calc(10px * var(--ui));
    height:calc(16px * var(--ui));
    border-right:calc(3px * var(--ui)) solid #1e63d8;
    border-bottom:calc(3px * var(--ui)) solid #1e63d8;
    transform:translate(-50%,-60%) rotate(45deg);
  }

  .lines{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:calc(10px * var(--ui));
    cursor:pointer;
    min-width:0;
  }
  .line{
    display:flex;
    align-items:flex-start;
    gap:calc(10px * var(--ui));
    min-width:0;
  }
  .tagPill{
    background:#111;
    color:#fff;
    border-radius:999px;
    padding:calc(9px * var(--ui)) calc(12px * var(--ui));
    font-weight:1000;
    font-size:calc(16px * var(--ui));
    min-width:calc(70px * var(--ui));
    text-align:center;
    flex:0 0 auto;
    text-transform:uppercase;
  }
  .textPill{
    background:rgba(210,199,188,.45);
    border-radius:999px;
    padding:calc(10px * var(--ui)) calc(14px * var(--ui));
    font-weight:1000;
    font-size:calc(18px * var(--ui));
    color:#111;
    flex:1;
    min-width:0;
    white-space:normal;
    overflow:visible;
    word-break:break-word;
    text-transform:uppercase;
  }
  .datePill{
    margin-top:calc(6px * var(--ui));
    margin-left:calc(40px * var(--ui));
    font-size:calc(12px * var(--ui));
    color:#5a5147;
    font-weight:1000;
    text-transform:uppercase;
  }

  .flash{animation:flash .55s;}
  @keyframes flash{50%{transform:scale(1.01); filter:brightness(1.05)}}

  #equipBtn{
    position:fixed;
    left:calc(14px * var(--ui));
    bottom:calc(18px * var(--ui));
    z-index:20;
    border:none;
    border-radius:calc(18px * var(--ui));
    background:#fff;
    padding:calc(12px * var(--ui)) calc(18px * var(--ui));
    font-weight:1000;
    color:var(--blue);
    font-size:calc(16px * var(--ui));
    box-shadow:0 12px 22px rgba(0,0,0,.18);
    text-transform:uppercase;
  }
  #equipBadge{
    position:fixed;
    right:calc(14px * var(--ui));
    bottom:calc(18px * var(--ui));
    z-index:20;
    background:rgba(0,0,0,.86);
    color:#fff;
    border-radius:calc(20px * var(--ui));
    padding:calc(12px * var(--ui)) calc(14px * var(--ui));
    font-weight:1000;
    line-height:1.15;
    text-align:right;
    min-width:unset;
    box-shadow:0 14px 26px rgba(0,0,0,.22);
    display:none;
    text-transform:uppercase;
  }
  #equipBadge .b1{font-size:calc(18px * var(--ui));}
  #equipBadge .b2{font-size:calc(18px * var(--ui)); opacity:.95;}

  .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    justify-content:center;
    align-items:flex-end;
    z-index:50;
    overscroll-behavior:contain;
    pointer-events:none;
  }
  .box{
    width:100%;
    max-width:820px;
    background:#fff;
    border-radius:calc(26px * var(--ui)) calc(26px * var(--ui)) 0 0;
    padding:calc(10px * var(--ui)) calc(14px * var(--ui)) calc(16px * var(--ui));
    max-height:92vh;
    overflow:auto;
    transform:translateY(0);
    will-change:transform;
    -webkit-overflow-scrolling:touch;
    pointer-events:auto;
  }

  .dragArea{
    padding:calc(6px * var(--ui)) 0 calc(8px * var(--ui));
    position:sticky;
    top:0;
    background:#fff;
    z-index:2;
  }
  .drag-handle{
    width:calc(60px * var(--ui));
    height:calc(7px * var(--ui));
    background:#cfcfcf;
    border-radius:999px;
    margin:0 auto;
  }

  .modalTitleTap{
    text-align:center;
    font-weight:1000;
    color:#111;
    padding:calc(6px * var(--ui)) 0 calc(10px * var(--ui));
    cursor:pointer;
    user-select:none;
    text-transform:uppercase;
  }
  .modalTitleTap .m1{font-size:calc(18px * var(--ui));}
  .modalTitleTap .m2{font-size:calc(12px * var(--ui)); opacity:.55; margin-top:2px;}

  .dateLine{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:calc(8px * var(--ui));
    margin-bottom:calc(8px * var(--ui));
  }
  .dateLine .dateLab{
    font-size:calc(15px * var(--ui));
    font-weight:1000;
    color:#111;
    text-transform:uppercase;
  }
  .dateInput{
    width:auto !important;
    min-width:calc(180px * var(--ui));
    text-align:center;
    padding:0 calc(10px * var(--ui));
  }

  .check-line{
    display:flex;
    justify-content:center;
    gap:calc(18px * var(--ui));
    align-items:center;
    padding:calc(6px * var(--ui)) 0 calc(10px * var(--ui));
    white-space:nowrap;
    text-transform:uppercase;
  }
  .check-line label{
    display:flex;
    align-items:center;
    gap:calc(8px * var(--ui));
    font-size:calc(16px * var(--ui));
    font-weight:1000;
  }
  .check-line input[type="checkbox"]{
    width:calc(22px * var(--ui));
    height:calc(22px * var(--ui));
    accent-color:var(--blue);
  }

  .section{
    background:#f2f2f2;
    border-radius:calc(16px * var(--ui));
    padding:calc(12px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    overflow:hidden;
    border:1px solid #e6e6e6;
  }
  .sectionHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:calc(10px * var(--ui));
    gap:calc(10px * var(--ui));
  }
  .sectionTitle{
    font-size:calc(24px * var(--ui));
    font-weight:1000;
    letter-spacing:.3px;
    text-transform:uppercase;
  }

  .timeWrap{
    display:flex;
    align-items:baseline;
    gap:calc(10px * var(--ui));
    white-space:nowrap;
    text-transform:uppercase;
  }
  .timeBtn{
    border:none;
    background:transparent;
    box-shadow:none;
    padding:calc(4px * var(--ui)) calc(8px * var(--ui));
    margin:0;
    font-weight:1000;
    font-size:calc(16px * var(--ui));
    color:#111;
    border-radius:calc(10px * var(--ui));
    text-transform:uppercase;
  }
  .timeBtn:active{background:rgba(226,27,27,.08);}
  .timeVal{
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    color:var(--red);
    min-width:calc(64px * var(--ui));
    text-align:right;
    font-variant-numeric:tabular-nums;
  }

  .row{
    display:flex;
    align-items:center;
    gap:calc(10px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    flex-wrap:nowrap;
    min-width:0;
  }
  .lab{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    min-width:calc(40px * var(--ui));
    color:#111;
    white-space:nowrap;
    text-transform:uppercase;
  }

  input, textarea, select{
    font-family:inherit;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    border:2px solid var(--line);
    border-radius:calc(16px * var(--ui));
    outline:none;
    background:#fff;
    -webkit-text-size-adjust:100%;
    font-variant-numeric:tabular-nums;
    text-transform:uppercase;
  }
  input{
    width:100%;
    height:calc(54px * var(--ui));
    line-height:calc(54px * var(--ui));
    padding:0 calc(10px * var(--ui));
    text-align:center;
  }
  textarea{
    width:100%;
    height:calc(76px * var(--ui));
    resize:none;
    font-weight:800;
    padding:calc(10px * var(--ui));
    text-transform:none;
  }
  select{
    height:calc(54px * var(--ui));
    padding:0 calc(10px * var(--ui));
  }

  .numBox{
    font-size:calc(18px * var(--ui));
    letter-spacing:.6px;
  }
  .long{
    flex:1;
    min-width:0;
    font-size:calc(16px * var(--ui));
    font-weight:1000;
    padding-left:calc(14px * var(--ui));
    text-align:left;
  }

  .extraBox{
    background:#fff;
    border:2px solid #e2e2e2;
    border-radius:calc(16px * var(--ui));
    padding:calc(12px * var(--ui));
    margin-top:calc(10px * var(--ui));
  }
  .extraHead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:calc(10px * var(--ui));
    text-transform:uppercase;
  }
  .extraTitle{
    font-size:calc(20px * var(--ui));
    font-weight:1000;
    letter-spacing:.4px;
  }
  .iconBtn{
    width:calc(48px * var(--ui));
    height:calc(48px * var(--ui));
    border-radius:calc(16px * var(--ui));
    border:none;
    background:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.10);
    color:var(--blue);
    font-size:calc(28px * var(--ui));
    font-weight:1000;
    text-transform:uppercase;
  }
  .extraRow{
    display:flex;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin-top:calc(10px * var(--ui));
  }
  .extraRow select{
    width:calc(130px * var(--ui));
    font-size:calc(16px * var(--ui));
    font-weight:1000;
  }
  .extraRow input{
    width:calc(130px * var(--ui));
    font-size:calc(18px * var(--ui));
  }
  .minusBtn{
    width:calc(60px * var(--ui));
    height:calc(54px * var(--ui));
    border-radius:calc(16px * var(--ui));
    border:none;
    background:#eef1f7;
    color:var(--blue);
    font-weight:1000;
    font-size:calc(22px * var(--ui));
    box-shadow:none;
    text-transform:uppercase;
  }

  .lirRow{
    display:flex;
    align-items:center;
    gap:calc(8px * var(--ui));
    margin:calc(10px * var(--ui)) 0;
    flex-wrap:wrap;
  }
  .lirBtn{
    padding:calc(8px * var(--ui)) calc(12px * var(--ui));
    font-size:calc(14px * var(--ui));
    border-radius:calc(14px * var(--ui));
    box-shadow:none;
  }
  .lirInfo{
    font-size:calc(13px * var(--ui));
    color:#666;
    font-weight:1000;
    text-transform:uppercase;
  }

  .bottomBtns{
    display:flex;
    gap:calc(18px * var(--ui));
    padding:calc(12px * var(--ui)) calc(6px * var(--ui)) 0;
    justify-content:flex-start;
    text-transform:uppercase;
    flex-wrap:wrap;
  }
  .bottomBtns button{
    padding:calc(10px * var(--ui)) calc(14px * var(--ui));
    font-size:calc(16px * var(--ui));
    box-shadow:none;
    border-radius:calc(14px * var(--ui));
  }

  #photoLayer{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:90;
  }
  #photoLayer img{
    max-width:100%;
    max-height:100%;
  }

  .rowGrid3{
    display:grid;
    grid-template-columns:
      calc(34px * var(--ui)) 1fr
      calc(34px * var(--ui)) 1fr
      calc(14px * var(--ui)) .95fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }
  .rowGridTDBB{
    display:grid;
    grid-template-columns:
      calc(18px * var(--ui)) 1fr
      calc(18px * var(--ui)) .9fr
      calc(26px * var(--ui)) .9fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
    min-width:0;
  }
</style>
</head>

<body>

<header id="homeHeader" onclick="openPhoto()" ondblclick="openPhoto()">
  <div class="titleWrap">
    <div class="titleMain">JAS MEMO</div>
    <div class="titleVer">VER 4.3</div>
  </div>
</header>

<div class="controls">
  <button type="button" onclick="newMemo()">ADD</button>
  <button type="button" onclick="deleteSelected()">DELETE</button>
  <button type="button" onclick="addPhoto()">PHOTO</button>
</div>

<div class="weekBar">
  <button type="button" class="weekBtn" onclick="moveWeek(-1)">PREV WEEK</button>
  <div class="weekLabel" id="weekLabel">THIS WEEK</div>
  <button type="button" class="weekBtn" onclick="goThisWeek()">TODAY</button>
  <button type="button" class="weekBtn" onclick="deleteCurrentWeek()">DEL WEEK</button>
  <button type="button" class="weekBtn" onclick="moveWeek(1)">NEXT WEEK</button>
</div>

<div id="memoList"></div>

<button id="equipBtn" type="button" onclick="openEquip()">EQUIPMENT</button>
<div id="equipBadge"></div>

<input type="file" id="photoInput" accept="image/*" hidden />
<input type="file" id="lirPhotoInput" accept="image/*" hidden />

<div class="modal" id="modal" aria-hidden="true">
  <div class="box" id="sheet" role="dialog" aria-modal="true">
    <div class="dragArea" id="dragArea">
      <div class="drag-handle"></div>
    </div>

    <div class="modalTitleTap" onclick="openPhoto()">
      <div class="m1">JAS MEMO</div>
      <div class="m2">TAP TO OPEN PHOTO</div>
    </div>

    <div class="dateLine">
      <div class="dateLab">DATE</div>
      <input type="date" id="memoDate" class="dateInput">
    </div>

    <div class="check-line">
      <label><input type="checkbox" id="inChk"> INBOUND</label>
      <label><input type="checkbox" id="outChk"> OUTBOUND</label>
    </div>

    <div id="sections"></div>

    <div class="bottomBtns">
      <button type="button" onclick="saveMemo()">SAVE</button>
      <button type="button" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<div id="photoLayer" ondblclick="closePhoto()" onclick="closePhoto()">
  <img id="photoImg" alt="photo" />
</div>

<div class="modal" id="equipModal" aria-hidden="true">
  <div class="box" style="max-height:70vh" onclick="event.stopPropagation()">
    <div class="dragArea">
      <div class="drag-handle"></div>
    </div>

    <div style="font-weight:1000;font-size:20px;margin:6px 0 12px; text-transform:uppercase;">EQUIPMENT</div>

    <div class="row">
      <div class="lab" style="min-width:72px;">TUG</div>
      <input id="tug1" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
      <input id="tug2" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>

    <div class="row">
      <div class="lab" style="min-width:72px;">BELT</div>
      <input id="belt" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>

    <div class="bottomBtns">
      <button type="button" onclick="saveEquip()">SAVE</button>
      <button type="button" onclick="closeEquip()">CLOSE</button>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById("modal");
  const sheet = document.getElementById("sheet");
  const dragArea = document.getElementById("dragArea");
  const sections = document.getElementById("sections");
  const memoList = document.getElementById("memoList");
  const photoInput = document.getElementById("photoInput");
  const lirPhotoInput = document.getElementById("lirPhotoInput");
  const photoLayer = document.getElementById("photoLayer");
  const photoImg = document.getElementById("photoImg");
  const inChk = document.getElementById("inChk");
  const outChk = document.getElementById("outChk");
  const memoDate = document.getElementById("memoDate");
  const weekLabel = document.getElementById("weekLabel");

  const equipBtn = document.getElementById("equipBtn");
  const equipBadge = document.getElementById("equipBadge");
  const equipModal = document.getElementById("equipModal");
  const tug1 = document.getElementById("tug1");
  const tug2 = document.getElementById("tug2");
  const belt = document.getElementById("belt");

  let memos = JSON.parse(localStorage.getItem("jas_memos") || "[]");
  let photo = localStorage.getItem("jas_photo");
  let editId = null;
  let currentLirPhoto = "";
  let weekOffset = 0;

  const EXTRA_KEYS = ["W","C","COB","STRAP","GB","TS","EMS"];

  function onlyNum(val, len){
    return (val || "").replace(/[^0-9]/g, "").slice(0, len);
  }
  function pad(val, len){
    const v = onlyNum(val, len);
    return v ? v.padStart(len, "0") : "";
  }
  function nowTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }
  function todayStr(){
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }
  function dateToStr(d){
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,"0");
    const day = String(d.getDate()).padStart(2,"0");
    return `${y}-${m}-${day}`;
  }
  function getMonday(dateLike){
    const d = new Date(dateLike);
    d.setHours(0,0,0,0);
    const day = d.getDay() || 7;
    d.setDate(d.getDate() - day + 1);
    return d;
  }
  function getSunday(dateLike){
    const d = getMonday(dateLike);
    d.setDate(d.getDate() + 6);
    return d;
  }
  function getWeekKey(dateLike){
    const monday = getMonday(dateLike);
    return dateToStr(monday);
  }
  function getViewingDate(){
    const d = new Date();
    d.setDate(d.getDate() + (weekOffset * 7));
    return d;
  }
  function getViewingWeekKey(){
    return getWeekKey(getViewingDate());
  }
  function updateWeekLabel(){
    const monday = getMonday(getViewingDate());
    const sunday = getSunday(getViewingDate());
    weekLabel.textContent = `${dateToStr(monday)} ~ ${dateToStr(sunday)}`;
  }
  function moveWeek(n){
    weekOffset += n;
    updateWeekLabel();
    renderList();
  }
  function goThisWeek(){
    weekOffset = 0;
    updateWeekLabel();
    renderList();
  }
  function deleteCurrentWeek(){
    const wk = getViewingWeekKey();
    const target = memos.filter(m => m.weekKey === wk);
    if(!target.length){
      alert("NO MEMO IN THIS WEEK");
      return;
    }
    if(!confirm("DELETE ALL MEMOS IN THIS WEEK?")) return;
    memos = memos.filter(m => m.weekKey !== wk);
    localStorage.setItem("jas_memos", JSON.stringify(memos));
    renderList();
  }

  function syncByDataK(dataK, value){
    document.querySelectorAll(`input[data-k="${dataK}"]`).forEach(el=>{
      if(el !== document.activeElement) el.value = value;
    });
  }

  function updateLirInfo(){
    const el = sections.querySelector("#lirInfo");
    if(el){
      el.textContent = currentLirPhoto ? "PHOTO SAVED" : "NO PHOTO";
    }
  }

  function addLirPhoto(){
    lirPhotoInput.value = "";
    lirPhotoInput.click();
  }
  function viewLirPhoto(){
    if(!currentLirPhoto) return;
    photoImg.src = currentLirPhoto;
    photoLayer.style.display = "flex";
  }
  function clearLirPhoto(){
    currentLirPhoto = "";
    updateLirInfo();
  }

  lirPhotoInput.onchange = (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      currentLirPhoto = r.result || "";
      updateLirInfo();
    };
    r.readAsDataURL(f);
  };

  document.addEventListener("input", (e)=>{
    const t = e.target;
    if(!(t instanceof HTMLInputElement)) return;
    const k = t.dataset.k || "";
    if(!k) return;

    if(k === "SHARED-HL"){
      t.value = onlyNum(t.value, 4);
      syncByDataK("SHARED-HL", t.value);
      return;
    }
    if(k === "SHARED-HASH"){
      t.value = onlyNum(t.value, 3);
      syncByDataK("SHARED-HASH", t.value);
      return;
    }

    if(k.endsWith("-c7")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-t")) t.value = onlyNum(t.value, 3);
    if(k.endsWith("-d")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-bb")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-tt")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-tb")) t.value = onlyNum(t.value, 4);
    if(k.startsWith("extraVal-")) t.value = onlyNum(t.value, 3);
  });

  function makeSection(type, memoData){
    const d = document.createElement("div");
    d.className = "section";
    d.dataset.type = type;

    const savedTime = memoData ? (memoData[type+"-TIME"] || "") : "";
    const cmpt1Default = memoData ? (memoData[type+"-cmpt1"] || "F") : "F";
    const cmpt2Default = memoData ? (memoData[type+"-cmpt2"] || "F") : "F";
    const sharedHL = memoData ? (memoData.sharedHL || "") : "";
    const sharedHASH = memoData ? (memoData.sharedHASH || "") : "";
    const v = (k)=> memoData ? (memoData[type+"-"+k] || "") : "";
    const noteV = memoData ? (memoData[type+"-note"] || "") : "";

    d.innerHTML = `
      <div class="sectionHead">
        <div class="sectionTitle">${type}</div>
        <div class="timeWrap">
          <button type="button" class="timeBtn" data-timebtn="${type}">TIME</button>
          <div class="timeVal" id="${type}-TIMESHOWN">${savedTime}</div>
        </div>
      </div>

      <div class="rowGrid3">
        <div class="lab">7C</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-c7" value="${v("c7")}">
        <div class="lab">HL</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="SHARED-HL" value="${sharedHL}">
        <div class="lab">#</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="SHARED-HASH" value="${sharedHASH}">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 1</div>
        <input class="long" data-k="${type}-cmpt1" placeholder="TEXT" value="${cmpt1Default}">
      </div>
      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 2</div>
        <input class="long" data-k="${type}-cmpt2" placeholder="TEXT" value="${cmpt2Default}">
      </div>
      ${[3,4].map(i=>`
        <div class="row">
          <div class="lab" style="min-width:96px;">CMPT ${i}</div>
          <input class="long" data-k="${type}-cmpt${i}" placeholder="TEXT" value="${memoData ? (memoData[type+"-cmpt"+i]||"") : ""}">
        </div>
      `).join("")}

      <div class="rowGridTDBB">
        <div class="lab">T</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="${type}-t" value="${v("t")}">
        <div class="lab">D</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-d" value="${v("d")}">
        <div class="lab">BB</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-bb" value="${v("bb")}">
      </div>

      ${type==="OUTBOUND" ? `
        <div class="row">
          <div class="lab" style="min-width:60px;">T/T</div>
          <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tt" value="${v("tt")}">
          <div class="lab" style="min-width:60px;">T/B</div>
          <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tb" value="${v("tb")}">
        </div>

        <div class="lirRow">
          <button type="button" class="lirBtn" onclick="addLirPhoto()">LIR</button>
          <button type="button" class="lirBtn" onclick="viewLirPhoto()">VIEW</button>
          <button type="button" class="lirBtn" onclick="clearLirPhoto()">CLEAR</button>
          <div class="lirInfo" id="lirInfo">NO PHOTO</div>
        </div>
      ` : ""}

      <div class="extraBox">
        <div class="extraHead">
          <div class="extraTitle">EXTRA</div>
          <button type="button" class="iconBtn" onclick="addExtraRow('${type}')">+</button>
        </div>
        <div id="${type}-EXTRAS"></div>
      </div>

      <textarea data-k="${type}-note" placeholder="NOTE (${type})">${noteV}</textarea>
    `;

    const timeBtn = d.querySelector(`[data-timebtn="${type}"]`);
    const timeShown = d.querySelector(`#${type}-TIMESHOWN`);
    timeBtn.addEventListener("click", ()=>{ timeShown.textContent = nowTime(); });
    timeBtn.addEventListener("dblclick", ()=>{
      const cur = timeShown.textContent || nowTime();
      const t = prompt("TIME (HH:MM 24H)", cur);
      if(t) timeShown.textContent = t;
    });

    const extrasBox = d.querySelector(`#${type}-EXTRAS`);
    const extras = memoData ? (memoData[type+"-EXTRAS"] || []) : [];
    extras.forEach(ex=>extrasBox.appendChild(makeExtraRow(type, ex.key, ex.val)));

    return d;
  }

  function makeExtraRow(type, key="W", val=""){
    const row = document.createElement("div");
    row.className = "extraRow";
    row.innerHTML = `
      <select>
        ${EXTRA_KEYS.map(k=>`<option value="${k}" ${k===key?"selected":""}>${k}</option>`).join("")}
      </select>
      <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="extraVal-${type}" value="${onlyNum(val,3)}">
      <button type="button" class="minusBtn" onclick="this.parentElement.remove()">-</button>
    `;
    return row;
  }

  function addExtraRow(type){
    const root = sections.querySelector(`.section[data-type="${type}"]`);
    const box = root ? root.querySelector(`#${type}-EXTRAS`) : null;
    if(!box) return;
    box.appendChild(makeExtraRow(type, "W", ""));
  }

  inChk.onchange = outChk.onchange = ()=>{
    const keepHL = document.querySelector(`input[data-k="SHARED-HL"]`)?.value || "";
    const keepHASH = document.querySelector(`input[data-k="SHARED-HASH"]`)?.value || "";
    const keepDate = memoDate.value || todayStr();

    sections.innerHTML = "";
    if(inChk.checked) sections.appendChild(makeSection("INBOUND", {sharedHL: keepHL, sharedHASH: keepHASH}));
    if(outChk.checked) sections.appendChild(makeSection("OUTBOUND", {sharedHL: keepHL, sharedHASH: keepHASH}));

    memoDate.value = keepDate;
    syncByDataK("SHARED-HL", keepHL);
    syncByDataK("SHARED-HASH", keepHASH);

    if(!outChk.checked){
      currentLirPhoto = "";
    }
    updateLirInfo();
  };

  function newMemo(){
    editId = null;
    inChk.checked = false;
    outChk.checked = false;
    sections.innerHTML = "";
    currentLirPhoto = "";
    memoDate.value = todayStr();
    openModal();
  }

  function openModal(){
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden","false");
    equipBtn.style.display = "none";
    equipBadge.style.display = "none";
    sheet.style.transform = "translateY(0)";
    currentTranslate = 0;
  }

  function closeModal(){
    modal.style.display = "none";
    modal.setAttribute("aria-hidden","true");
    editId = null;
    equipBtn.style.display = "block";
    updateEquipBadge();
  }

  function saveMemo(){
    const data = { id: editId ?? Date.now() };
    data.hasIn = inChk.checked;
    data.hasOut = outChk.checked;

    data.memoDate = memoDate.value || todayStr();
    data.weekKey = getWeekKey(data.memoDate);

    data.sharedHL = pad(document.querySelector(`input[data-k="SHARED-HL"]`)?.value || "", 4);
    data.sharedHASH = pad(document.querySelector(`input[data-k="SHARED-HASH"]`)?.value || "", 3);

    const normalizeF = (v)=> (v && v.trim() ? v : "F");

    ["INBOUND","OUTBOUND"].forEach(type=>{
      const enabled = (type==="INBOUND") ? data.hasIn : data.hasOut;
      if(!enabled) return;

      const root = sections.querySelector(`.section[data-type="${type}"]`);
      if(!root) return;

      const gi = (k)=> root.querySelector(`input[data-k="${type}-${k}"]`);
      const cm = (n)=> root.querySelector(`input[data-k="${type}-cmpt${n}"]`);
      const note = root.querySelector(`textarea[data-k="${type}-note"]`);

      data[type+"-c7"] = pad(gi("c7")?.value, 4);
      data[type+"-t"]  = pad(gi("t")?.value, 3);
      data[type+"-d"]  = pad(gi("d")?.value, 2);
      data[type+"-bb"] = pad(gi("bb")?.value, 2);

      data[type+"-cmpt1"] = normalizeF(cm(1)?.value || "");
      data[type+"-cmpt2"] = normalizeF(cm(2)?.value || "");
      data[type+"-cmpt3"] = cm(3)?.value || "";
      data[type+"-cmpt4"] = cm(4)?.value || "";

      if(type==="OUTBOUND"){
        data[type+"-tt"] = pad(gi("tt")?.value, 4);
        data[type+"-tb"] = pad(gi("tb")?.value, 4);
        data[type+"-LIRPHOTO"] = currentLirPhoto || "";
      }

      data[type+"-note"] = note ? (note.value || "") : "";

      const shown = document.getElementById(type+"-TIMESHOWN");
      data[type+"-TIME"] = shown ? (shown.textContent || "") : "";

      const extras = [];
      const box = root.querySelector(`#${type}-EXTRAS`);
      if(box){
        [...box.querySelectorAll(".extraRow")].forEach(r=>{
          const key = (r.querySelector("select")?.value || "").toUpperCase();
          const val = pad(r.querySelector("input")?.value || "", 3);
          if(key && val) extras.push({key, val});
        });
      }
      data[type+"-EXTRAS"] = extras;
    });

    if(editId){
      const idx = memos.findIndex(m=>m.id===editId);
      if(idx >= 0) memos[idx] = data;
    }else{
      memos.push(data);
    }

    localStorage.setItem("jas_memos", JSON.stringify(memos));
    weekOffset = calcWeekOffsetFromDate(data.memoDate);
    updateWeekLabel();
    closeModal();
    renderList(data.id);
  }

  function calcWeekOffsetFromDate(dateStr){
    const thisMonday = getMonday(new Date());
    const targetMonday = getMonday(dateStr);
    const diff = Math.round((targetMonday - thisMonday) / 86400000);
    return Math.round(diff / 7);
  }

  function formatTitleLine(m, type){
    const hl = (m.sharedHL || "").trim();
    const hash = (m.sharedHASH || "").trim();
    const c7 = String((m[`${type}-c7`] || "")).trim();
    const both = !!m.hasIn && !!m.hasOut;

    if(both){
      if(type === "INBOUND"){
        return `7C[${c7}] HL[${hl}]`;
      }else{
        return `7C[${c7}] #[${hash}]`;
      }
    }
    return `7C[${c7}] HL[${hl}] #[${hash}]`;
  }

  function renderList(flashId){
    memoList.innerHTML = "";

    const viewingWeek = getViewingWeekKey();
    const weekMemos = memos
      .filter(m => (m.weekKey || getWeekKey(m.memoDate || todayStr())) === viewingWeek)
      .sort((a,b)=>{
        const da = a.memoDate || "";
        const db = b.memoDate || "";
        if(da === db) return Number(b.id) - Number(a.id);
        return da < db ? 1 : -1;
      });

    if(!weekMemos.length){
      memoList.innerHTML = `<div class="emptyWeek">NO MEMO IN THIS WEEK</div>`;
      return;
    }

    weekMemos.forEach(m=>{
      const card = document.createElement("div");
      card.className = "memoCard" + (m.id===flashId ? " flash" : "");

      let lines = "";
      if(m.hasIn){
        lines += `<div class="line"><div class="tagPill">IN</div><div class="textPill">${formatTitleLine(m, "INBOUND")}</div></div>`;
      }
      if(m.hasOut){
        lines += `<div class="line"><div class="tagPill">OUT</div><div class="textPill">${formatTitleLine(m, "OUTBOUND")}</div></div>`;
      }
      if(!m.hasIn && !m.hasOut){
        lines = `<div class="line"><div class="tagPill">IN</div><div class="textPill">EMPTY</div></div>`;
      }

      card.innerHTML = `
        <div class="memoRow">
          <input class="selBox" type="checkbox" data-id="${m.id}">
          <div class="lines" data-open="${m.id}">${lines}</div>
        </div>
        <div class="datePill">${m.memoDate || ""}</div>
      `;
      memoList.appendChild(card);
    });

    memoList.querySelectorAll("[data-open]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const id = Number(el.getAttribute("data-open"));
        editMemo(id);
      });
    });
  }

  function editMemo(id){
    const m = memos.find(x=>x.id===id);
    if(!m) return;

    editId = id;
    inChk.checked = !!m.hasIn;
    outChk.checked = !!m.hasOut;
    currentLirPhoto = m["OUTBOUND-LIRPHOTO"] || "";
    memoDate.value = m.memoDate || todayStr();

    sections.innerHTML = "";
    if(inChk.checked) sections.appendChild(makeSection("INBOUND", m));
    if(outChk.checked) sections.appendChild(makeSection("OUTBOUND", m));

    syncByDataK("SHARED-HL", m.sharedHL || "");
    syncByDataK("SHARED-HASH", m.sharedHASH || "");

    openModal();
    updateLirInfo();
  }

  function deleteSelected(){
    const checks = document.querySelectorAll('.selBox:checked');
    const ids = [...checks].map(c=>Number(c.dataset.id));
    memos = memos.filter(m=>!ids.includes(m.id));
    localStorage.setItem("jas_memos", JSON.stringify(memos));
    renderList();
  }

  function addPhoto(){
    photoInput.value="";
    photoInput.click();
  }
  photoInput.onchange = (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      photo = r.result;
      localStorage.setItem("jas_photo", photo);
    };
    r.readAsDataURL(f);
  };
  function openPhoto(){
    if(!photo) return;
    photoImg.src = photo;
    photoLayer.style.display = "flex";
  }
  function closePhoto(){
    photoLayer.style.display = "none";
  }

  function openEquip(){
    const eq = JSON.parse(localStorage.getItem("jas_equipment") || "{}");
    tug1.value = pad(eq.tug1,2);
    tug2.value = pad(eq.tug2,2);
    belt.value = pad(eq.belt,2);
    equipModal.style.display = "flex";
    equipModal.setAttribute("aria-hidden","false");
  }
  function closeEquip(){
    equipModal.style.display = "none";
    equipModal.setAttribute("aria-hidden","true");
  }
  function saveEquip(){
    const eq = {
      tug1: pad(tug1.value,2),
      tug2: pad(tug2.value,2),
      belt: pad(belt.value,2)
    };
    localStorage.setItem("jas_equipment", JSON.stringify(eq));
    updateEquipBadge();
    closeEquip();
  }
  function updateEquipBadge(){
    const eq = JSON.parse(localStorage.getItem("jas_equipment") || "{}");
    if(!eq.tug1 && !eq.tug2 && !eq.belt){
      equipBadge.style.display = "none";
      return;
    }
    const t1 = eq.tug1 || "00";
    const t2 = eq.tug2 || "00";
    const b = eq.belt || "00";
    equipBadge.innerHTML = `
      <div class="b1">TUG ${t1}/${t2}</div>
      <div class="b2">BELT ${b}</div>
    `;
    equipBadge.style.display = "block";
  }

  equipModal.addEventListener("click",(e)=>{
    if(e.target === equipModal) closeEquip();
  });

  let startY = 0;
  let currentTranslate = 0;
  let dragging = false;

  function onStart(y){
    dragging = true;
    startY = y;
    sheet.style.transition = "none";
  }
  function onMove(y){
    if(!dragging) return;
    const dy = Math.max(0, y - startY);
    currentTranslate = dy;
    sheet.style.transform = `translateY(${dy}px)`;
  }
  function onEnd(){
    if(!dragging) return;
    dragging = false;
    sheet.style.transition = "transform .18s ease";
    if(currentTranslate > 140){
      closeModal();
    }else{
      sheet.style.transform = "translateY(0)";
      currentTranslate = 0;
    }
  }

  dragArea.addEventListener("touchstart", (e)=> onStart(e.touches[0].clientY), {passive:true});
  dragArea.addEventListener("touchmove",  (e)=> onMove(e.touches[0].clientY),  {passive:true});
  dragArea.addEventListener("touchend",   ()=> onEnd());

  dragArea.addEventListener("mousedown", (e)=> onStart(e.clientY));
  window.addEventListener("mousemove", (e)=> onMove(e.clientY));
  window.addEventListener("mouseup", ()=> onEnd());

  memoDate.value = todayStr();
  updateWeekLabel();
  renderList();
  updateEquipBadge();
</script>

</body>
</html>
