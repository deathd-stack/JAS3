<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>JAS MEMO VER.3</title>

<style>
:root{
  --bg:#ff7a00;
  --card:rgba(255,255,255,.92);
  --card2:rgba(255,255,255,.82);
  --text:#111;
  --muted:rgba(0,0,0,.55);
  --shadow:0 10px 28px rgba(0,0,0,.18);
  --shadow2:0 6px 18px rgba(0,0,0,.14);
  --radius:18px;
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
  margin:0;
  font-family:system-ui,-apple-system;
  background: var(--bg) url("bg.jpg") center/cover no-repeat fixed;
  color:var(--text);
  font-weight:650;
  padding-bottom:22px;
}

header{
  text-align:center;
  padding:18px 14px 10px;
  font-size:2.0rem;
  font-weight:950;
  cursor:pointer;
  letter-spacing:.5px;
  color:#111;
  user-select:none;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
}

.controls{
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px 12px 12px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  background:linear-gradient(to bottom, rgba(255,122,0,.82), rgba(255,122,0,.55));
  border-bottom:1px solid rgba(255,255,255,.25);
}

button{
  padding:12px 16px;
  border:none;
  border-radius:16px;
  background:var(--card);
  box-shadow:var(--shadow2);
  font-weight:950;
  font-size:1.02rem;
  letter-spacing:.2px;
  transition:transform .08s ease, filter .2s ease;
}
button:active{ transform:scale(.98); filter:brightness(.98); }

#memoList{ padding:10px 12px; }

.memo{
  background:var(--card);
  border-radius:var(--radius);
  padding:12px 12px;
  margin-bottom:10px;
  display:flex;
  gap:10px;
  align-items:flex-start;
  box-shadow:var(--shadow);
}

.memo input[type="checkbox"]{
  width:22px;
  height:22px;
  accent-color:#111;
  flex:0 0 auto;
  margin-top:2px;
}

.memo-title{
  width:100%;
  cursor:pointer;
  line-height:1.25;
}

.memo-title .line{
  margin:4px 0;
  white-space:nowrap;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:7px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.06);
  font-weight:950;
  font-size:.95rem;
}

.badge .tag{
  display:inline-flex;
  align-items:center;
  padding:3px 8px;
  border-radius:999px;
  font-size:.74rem;
  font-weight:1000;
  letter-spacing:.4px;
  background:#111;
  color:#fff;
}

/* MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:none;
  justify-content:center;
  align-items:flex-end;
  padding:10px;
  z-index:1000;
}

.box{
  width:min(760px, 100%);
  max-height:92vh;
  overflow:auto;
  background:rgba(255,255,255,.96);
  border-radius:24px;
  padding:10px 14px 16px;
  box-shadow:0 18px 60px rgba(0,0,0,.30);
  animation:sheetIn .14s ease-out;
  will-change:transform;
}
@keyframes sheetIn{
  from{ transform:translateY(14px); opacity:.8; }
  to{ transform:translateY(0); opacity:1; }
}

/* ✅ 손잡이 */
.handle-wrap{
  display:flex;
  justify-content:center;
  padding:6px 0 10px;
  position:sticky;
  top:0;
  background:rgba(255,255,255,.96);
  z-index:2;
}
.handle{
  width:54px;
  height:6px;
  border-radius:999px;
  background:rgba(0,0,0,.18);
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:8px;
  flex-wrap:wrap;
}

.row.nowrap{ flex-wrap:nowrap; }

.row.center{
  justify-content:center;
  flex-wrap:nowrap;
  gap:10px;
}

label.chk{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-weight:1000;
  padding:10px 12px;
  border-radius:16px;
  background:rgba(0,0,0,.05);
  box-shadow:0 6px 14px rgba(0,0,0,.08);
  flex:1;
  white-space:nowrap;
}

label.chk input{ transform:scale(1.05); }

.section{
  margin-top:14px;
  background:var(--card2);
  border-radius:18px;
  padding:12px;
  box-shadow:0 8px 18px rgba(0,0,0,.10);
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:1000;
  margin-bottom:10px;
  letter-spacing:.2px;
}

.time{
  color:#d20000;
  font-weight:1000;
  cursor:pointer;
  user-select:none;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(210,0,0,.10);
  border:1px solid rgba(210,0,0,.15);
}

.field-label{
  display:inline-block;
  min-width:26px;
  font-weight:1000;
  color:rgba(0,0,0,.72);
}
.field-label.cob{ min-width:40px; }

input{
  width:74px;
  text-align:center;
  font-weight:950;
  font-size:1.02rem;
  padding:10px 10px;
  border-radius:14px;
  border:1px solid rgba(0,0,0,.12);
  background:rgba(255,255,255,.98);
  outline:none;
  transition:border-color .15s ease, box-shadow .15s ease;
}
input:focus{
  border-color:rgba(0,0,0,.35);
  box-shadow:0 0 0 4px rgba(0,0,0,.08);
}
input[data-long]{ width:min(340px,100%); flex:1; min-width:0; }

textarea{
  width:100%;
  height:82px;
  margin-top:10px;
  font-weight:800;
  font-size:1rem;
  padding:12px;
  border-radius:16px;
  border:1px solid rgba(0,0,0,.12);
  background:rgba(255,255,255,.98);
  outline:none;
  resize:none;
}
textarea:focus{
  border-color:rgba(0,0,0,.35);
  box-shadow:0 0 0 4px rgba(0,0,0,.08);
}

.cmpt-row{
  justify-content:flex-start;
  flex-wrap:nowrap;
}
.cmpt-row .lbl{
  width:92px;
  font-weight:1000;
  text-align:left;
}
.cmpt-row input[data-long]{
  text-align:left;
  padding-left:14px;
}

.row.actions{
  margin-top:12px;
  gap:10px;
}
.row.actions button{
  flex:1;
  border-radius:18px;
}

/* PHOTO */
#photoLayer{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  z-index:9999;
  overflow:hidden;
  touch-action:none;
}
#photoLayer img{
  position:absolute;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:contain;
  transform:scale(1);
  transform-origin:center center;
  touch-action:none;
}

@media (max-width:380px){
  header{ font-size:1.85rem; }
  button{ padding:11px 14px; font-size:.98rem; }
  .badge{ font-size:.90rem; }
  label.chk{ padding:9px 10px; font-size:.98rem; }
  input{ width:70px; }
  .cmpt-row .lbl{ width:86px; }
}
</style>
</head>

<body>

<header id="titleBtn">JAS MEMO VER.3</header>

<div class="controls" id="controls">
  <button onclick="newMemo()">ADD</button>
  <button onclick="deleteSelected()">DELETE</button>
  <button onclick="addPhoto()">PHOTO</button>
</div>

<div id="memoList"></div>
<input type="file" id="photoInput" accept="image/*" hidden>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box" id="sheet">
    <div class="handle-wrap" id="handleArea">
      <div class="handle"></div>
    </div>

    <div class="row center" style="margin-bottom:10px;">
      <label class="chk"><input type="checkbox" id="inChk"> INBOUND</label>
      <label class="chk"><input type="checkbox" id="outChk"> OUTBOUND</label>
    </div>

    <div id="sections"></div>

    <div class="row actions">
      <button onclick="saveMemo()">SAVE</button>
      <button onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<!-- PHOTO -->
<div id="photoLayer">
  <img id="photoImg" alt="photo">
</div>

<script>
const modal = document.getElementById("modal");
const sheet = document.getElementById("sheet");
const handleArea = document.getElementById("handleArea");
const sections = document.getElementById("sections");
const memoList = document.getElementById("memoList");
const photoInput = document.getElementById("photoInput");
const photoLayer = document.getElementById("photoLayer");
const photoImg = document.getElementById("photoImg");
const titleBtn = document.getElementById("titleBtn");
const controls = document.getElementById("controls");

let memos = JSON.parse(localStorage.getItem("jas_memos")||"[]");
let editId=null;
let photo = localStorage.getItem("jas_photo");

/* 사진 줌 */
let scale=1;
let pinchStartDist=null;
let pinchStartScale=1;

function now(){
  const d=new Date();
  return d.toLocaleTimeString("ko-KR",{hour12:false,hour:"2-digit",minute:"2-digit"});
}

function setControlsVisible(v){
  controls.style.display = v ? "flex" : "none";
}

/* ---------- MEMO ---------- */
function newMemo(){
  editId=null;
  inChk.checked=false;
  outChk.checked=false;
  sections.innerHTML="";
  setControlsVisible(false);
  modal.style.display="flex";
  sheet.style.transform = "translateY(0)";
}

function closeModal(){
  modal.style.display="none";
  setControlsVisible(true);
  sheet.style.transform = "translateY(0)";
}

inChk.onchange = outChk.onchange = renderSections;

function renderSections(){
  sections.innerHTML="";
  if(inChk.checked) sections.append(makeSection("INBOUND"));
  if(outChk.checked) sections.append(makeSection("OUTBOUND"));
}

function makeSection(type){
  const d=document.createElement("div");
  d.className="section";
  d.innerHTML=`
    <div class="section-title">
      ${type}
      <span class="time"
        data-k="${type}-time"
        onclick="this.textContent=now()"
        ondblclick="this.textContent=prompt('TIME',this.textContent)||this.textContent"
      >--:--</span>
    </div>

    <div class="row nowrap">
      <span class="field-label">7C</span> <input maxlength="4" inputmode="numeric" data-k="${type}-c7">
      <span class="field-label">HL</span> <input maxlength="4" inputmode="numeric" data-k="HL">
      <span class="field-label">#</span> <input maxlength="3" inputmode="numeric" data-k="NUM">
    </div>

    ${[1,2,3,4].map(i=>`
      <div class="row cmpt-row">
        <div class="lbl">CMPT ${i}</div>
        <input data-long data-k="${type}-cmpt${i}" ${i<=2 ? `value="F"` : ""}>
      </div>`).join("")}

    <div class="row nowrap">
      <span class="field-label">T</span> <input maxlength="3" inputmode="numeric" data-k="${type}-t">
      <span class="field-label">D</span> <input maxlength="2" inputmode="numeric" data-k="${type}-d">
      <span class="field-label">BB</span> <input maxlength="2" inputmode="numeric" data-k="${type}-bb">
    </div>

    <div class="row nowrap">
      <span class="field-label">W</span> <input maxlength="2" inputmode="numeric" data-k="${type}-w">
      <span class="field-label">C</span> <input maxlength="3" inputmode="numeric" data-k="${type}-c">
      <span class="field-label cob">COB</span> <input maxlength="3" inputmode="numeric" data-k="${type}-cob">
    </div>

    ${type==="OUTBOUND" ? `
      <div class="row nowrap">
        <span class="field-label" style="min-width:34px;">T/T</span> <input maxlength="4" inputmode="numeric" data-k="OUTBOUND-tt">
        <span class="field-label" style="min-width:34px;">T/B</span> <input maxlength="4" inputmode="numeric" data-k="OUTBOUND-tb">
      </div>
    ` : ""}

    <textarea data-k="${type}-note" placeholder="특이사항 (${type})"></textarea>
  `;
  return d;
}

/* HL + # 동기화 */
document.addEventListener("input",e=>{
  const k = e.target?.dataset?.k;
  if(k==="HL" || k==="NUM"){
    document.querySelectorAll(`[data-k="${k}"]`).forEach(i=>{
      if(i!==e.target) i.value=e.target.value;
    });
  }
});

/* SAVE */
function saveMemo(){
  const data={id:editId??Date.now()};

  document.querySelectorAll("[data-k]").forEach(el=>{
    const k=el.dataset.k;
    if(el.tagName==="SPAN") data[k]=el.textContent;
    else data[k]=el.value;
  });

  if(editId){
    memos[memos.findIndex(m=>m.id===editId)]=data;
  }else{
    memos.push(data);
  }

  localStorage.setItem("jas_memos",JSON.stringify(memos));
  closeModal();
  renderList();
}

function renderList(){
  memoList.innerHTML="";
  memos.forEach(m=>{
    const hasIN  = !!m["INBOUND-c7"];
    const hasOUT = !!m["OUTBOUND-c7"];
    const hl  = m.HL  || "";
    const num = m.NUM || "";

    const inText = hasIN
      ? (hasOUT
          ? `7C[${m["INBOUND-c7"]||""}] HL[${hl}]`
          : `7C[${m["INBOUND-c7"]||""}] HL[${hl}] #[${num}]`)
      : "";

    const outText = hasOUT
      ? `7C[${m["OUTBOUND-c7"]||""}] #[${num}]`
      : "";

    memoList.innerHTML += `
      <div class="memo">
        <input type="checkbox">
        <div class="memo-title" onclick="editMemo(${m.id})">
          ${hasIN ? `<div class="line"><span class="badge"><span class="tag">IN</span> ${inText}</span></div>` : ``}
          ${hasOUT? `<div class="line"><span class="badge"><span class="tag">OUT</span> ${outText}</span></div>` : ``}
        </div>
      </div>
    `;
  });
}

function editMemo(id){
  editId=id;
  const m=memos.find(x=>x.id===id);

  setControlsVisible(false);
  modal.style.display="flex";
  sheet.style.transform = "translateY(0)";

  inChk.checked=!!m["INBOUND-c7"];
  outChk.checked=!!m["OUTBOUND-c7"];
  renderSections();

  document.querySelectorAll("[data-k]").forEach(el=>{
    const k = el.dataset.k;
    let v = m[k];

    if(el.tagName==="SPAN"){
      el.textContent = (v!=null && v!=="") ? v : "--:--";
    }else{
      if((v==null || v==="") && (k.endsWith("-cmpt1") || k.endsWith("-cmpt2"))) v="F";
      el.value = (v!=null) ? v : "";
    }
  });
}

/* DELETE */
function deleteSelected(){
  const c=[...document.querySelectorAll(".memo input")];
  memos=memos.filter((_,i)=>!c[i].checked);
  localStorage.setItem("jas_memos",JSON.stringify(memos));
  renderList();
}

/* ✅ 손잡이 스와이프 다운으로 닫기 */
(function enableSwipeToClose(){
  let startY=null;
  let currentY=0;
  let dragging=false;

  const start = (y)=>{
    if(modal.style.display!=="flex") return;
    startY=y;
    currentY=0;
    dragging=true;
    sheet.style.transition="none";
  };

  const move = (y)=>{
    if(!dragging || startY==null) return;
    const dy = Math.max(0, y - startY);
    currentY = dy;
    sheet.style.transform = `translateY(${dy}px)`;
  };

  const end = ()=>{
    if(!dragging) return;
    dragging=false;
    sheet.style.transition="transform .16s ease-out";

    // 90px 이상 내려가면 닫기
    if(currentY > 90){
      sheet.style.transform = `translateY(220px)`;
      setTimeout(()=>closeModal(), 140);
    }else{
      sheet.style.transform = "translateY(0)";
    }

    startY=null;
    currentY=0;
  };

  handleArea.addEventListener("touchstart",(e)=>start(e.touches[0].clientY),{passive:true});
  handleArea.addEventListener("touchmove",(e)=>move(e.touches[0].clientY),{passive:true});
  handleArea.addEventListener("touchend",end,{passive:true});

  handleArea.addEventListener("mousedown",(e)=>start(e.clientY));
  window.addEventListener("mousemove",(e)=>move(e.clientY));
  window.addEventListener("mouseup",end);
})();

/* ---------- PHOTO ---------- */
function addPhoto(){ photoInput.click(); }
photoInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    photo=r.result;
    localStorage.setItem("jas_photo",photo);
  };
  r.readAsDataURL(f);
};

titleBtn.onclick = openPhoto;

function openPhoto(){
  if(!photo) return;
  scale=1;
  pinchStartDist=null;
  photoImg.src=photo;
  photoImg.style.transform=`scale(${scale})`;
  photoLayer.style.display="block";
}

/* 더블탭 닫기(iOS) */
let lastTap=0;
photoImg.addEventListener("touchend",(e)=>{
  if(photoLayer.style.display!=="block") return;
  e.stopPropagation();
  const t=Date.now();
  if(t-lastTap<=350){
    lastTap=0;
    photoLayer.style.display="none";
  }else{
    lastTap=t;
  }
},{passive:true});
photoImg.addEventListener("dblclick",()=>{
  if(photoLayer.style.display!=="block") return;
  photoLayer.style.display="none";
});

/* 휠 줌 */
photoLayer.addEventListener("wheel",(e)=>{
  if(photoLayer.style.display!=="block") return;
  e.preventDefault();
  scale += e.deltaY < 0 ? 0.1 : -0.1;
  scale = Math.max(1, Math.min(scale, 4));
  photoImg.style.transform = `scale(${scale})`;
},{passive:false});

/* 핀치 줌 */
function dist(t1,t2){
  const dx=t1.clientX-t2.clientX;
  const dy=t1.clientY-t2.clientY;
  return Math.hypot(dx,dy);
}
photoLayer.addEventListener("touchstart",(e)=>{
  if(photoLayer.style.display!=="block") return;
  if(e.touches.length===2){
    pinchStartDist = dist(e.touches[0], e.touches[1]);
    pinchStartScale = scale;
  }
},{passive:true});

photoLayer.addEventListener("touchmove",(e)=>{
  if(photoLayer.style.display!=="block") return;
  if(e.touches.length===2 && pinchStartDist){
    e.preventDefault();
    const d = dist(e.touches[0], e.touches[1]);
    const factor = d / pinchStartDist;
    scale = Math.max(1, Math.min(pinchStartScale * factor, 4));
    photoImg.style.transform = `scale(${scale})`;
  }
},{passive:false});

photoLayer.addEventListener("touchend",(e)=>{
  if(e.touches.length<2) pinchStartDist=null;
},{passive:true});

/* 초기 */
renderList();
</script>

</body>
</html>
