<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>JAS MEMO VER 2</title>

<style>
body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:#ff9f1c url("jas-bg.png") center/contain no-repeat fixed;
  font-weight:600;
}

header{
  text-align:center;
  padding:18px;
  font-size:2.2rem;
  font-weight:900;
  cursor:pointer;
}

.controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:10px;
}

button{
  padding:10px 16px;
  border:none;
  border-radius:12px;
  background:#fff;
  font-weight:900;
  font-size:1.1rem;
}

#memoList{padding:12px;}

.memo{
  background:#fff;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  display:flex;
  gap:10px;
  align-items:flex-start;
}

.memo-title{
  font-weight:900;
  cursor:pointer;
  line-height:1.25;
}

.memo-title .line{ margin:2px 0; }

/* modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  background:#fff;
  width:95%;
  max-height:90vh;
  overflow:auto;
  border-radius:16px;
  padding:16px;
}

.row{
  display:flex;
  gap:10px;
  align-items:center;
  margin-bottom:6px;
  flex-wrap:wrap;
}

input{
  width:70px;
  text-align:center;
  font-weight:800;
  font-size:1rem;
}

input[data-long]{width:260px;}

.section{
  margin-top:14px;
}

.section-title{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:900;
}

.time{
  color:red;
  font-weight:900;
  cursor:pointer;
  user-select:none;
}

textarea{
  width:100%;
  height:70px;
  margin-top:6px;
  font-weight:700;
}

/* photo */
#photoLayer{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#photoLayer img{
  max-width:100%;
  max-height:100%;
  transform:scale(1);
}
</style>
</head>

<body>

<header onclick="openPhoto()">JAS MEMO VER 2</header>

<div class="controls">
  <button onclick="newMemo()">ADD</button>
  <button onclick="deleteSelected()">DELETE</button>
  <button onclick="addPhoto()">PHOTO</button>
</div>

<div id="memoList"></div>
<input type="file" id="photoInput" accept="image/*" hidden>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="box">

    <div class="row" style="justify-content:center">
      <input type="checkbox" id="inChk"> INBOUND
      <span style="width:30px"></span>
      <input type="checkbox" id="outChk"> OUTBOUND
    </div>

    <div id="sections"></div>

    <div class="row">
      <button onclick="saveMemo()">SAVE</button>
      <button onclick="closeModal()">CLOSE</button>
    </div>

  </div>
</div>

<!-- PHOTO -->
<div id="photoLayer" ondblclick="closePhoto()">
  <img id="photoImg">
</div>

<script>
const modal = document.getElementById("modal");
const sections = document.getElementById("sections");
const memoList = document.getElementById("memoList");
const photoInput = document.getElementById("photoInput");
const photoLayer = document.getElementById("photoLayer");
const photoImg = document.getElementById("photoImg");

let memos = JSON.parse(localStorage.getItem("jas_memos")||"[]");
let editId=null;
let photo = localStorage.getItem("jas_photo");
let scale=1;

function now(){
  const d=new Date();
  return d.toLocaleTimeString("ko-KR",{hour12:false,hour:"2-digit",minute:"2-digit"});
}

function newMemo(){
  editId=null;
  inChk.checked=false;
  outChk.checked=false;
  sections.innerHTML="";
  modal.style.display="flex";
}

function closeModal(){ modal.style.display="none"; }

inChk.onchange = outChk.onchange = renderSections;

function renderSections(){
  sections.innerHTML="";
  if(inChk.checked) sections.append(makeSection("INBOUND"));
  if(outChk.checked) sections.append(makeSection("OUTBOUND"));
}

function makeSection(type){
  const d=document.createElement("div");
  d.className="section";
  d.innerHTML=`
    <div class="section-title">
      ${type}
      <!-- 시간: 탭(클릭)=현재시간 저장 / 더블탭=수정 -->
      <span class="time"
        data-k="${type}-time"
        onclick="this.textContent=now()"
        ondblclick="this.textContent=prompt('TIME',this.textContent)||this.textContent"
      >--:--</span>
    </div>

    <div class="row">
      7C <input maxlength="4" inputmode="numeric" data-k="${type}-c7">
      HL <input maxlength="4" inputmode="numeric" data-k="HL">
      # <input maxlength="3" inputmode="numeric" data-k="NUM">
    </div>

    ${[1,2,3,4].map(i=>`
      <div class="row">
        CMPT ${i}
        <input data-long data-k="${type}-cmpt${i}">
      </div>`).join("")}

    <div class="row">
      T <input maxlength="3" inputmode="numeric" data-k="${type}-t">
      D <input maxlength="2" inputmode="numeric" data-k="${type}-d">
      BB <input maxlength="2" inputmode="numeric" data-k="${type}-bb">
    </div>

    <div class="row">
      W <input maxlength="2" inputmode="numeric" data-k="${type}-w">
      C <input maxlength="3" inputmode="numeric" data-k="${type}-c">
      COB <input maxlength="3" inputmode="numeric" data-k="${type}-cob">
    </div>

    ${type==="OUTBOUND" ? `
      <div class="row">
        T/T <input maxlength="4" inputmode="numeric" data-k="OUTBOUND-tt">
        T/B <input maxlength="4" inputmode="numeric" data-k="OUTBOUND-tb">
      </div>
    ` : ""}

    <textarea data-k="${type}-note" placeholder="특이사항 (${type})"></textarea>
  `;
  return d;
}

/* HL + # 동기화 */
document.addEventListener("input",e=>{
  const k = e.target?.dataset?.k;
  if(k==="HL" || k==="NUM"){
    document.querySelectorAll(`[data-k="${k}"]`).forEach(i=>{
      if(i!==e.target) i.value=e.target.value;
    });
  }
});

/* SAVE */
function saveMemo(){
  const data={id:editId??Date.now()};

  document.querySelectorAll("[data-k]").forEach(el=>{
    const k=el.dataset.k;

    // span(time)은 textContent 저장
    if(el.tagName==="SPAN"){
      data[k]=el.textContent;
    }else{
      data[k]=el.value;
    }
  });

  // 기존 데이터 호환(옛날 B 키가 있으면 bb로 흡수)
  ["INBOUND","OUTBOUND"].forEach(t=>{
    const oldKey = `${t}-b`;
    const newKey = `${t}-bb`;
    if(data[newKey]==="" && data[oldKey]) data[newKey]=data[oldKey];
    delete data[oldKey];
  });

  if(editId){
    memos[memos.findIndex(m=>m.id===editId)]=data;
  }else{
    memos.push(data);
  }

  localStorage.setItem("jas_memos",JSON.stringify(memos));
  closeModal();
  renderList();
}

function renderList(){
  memoList.innerHTML="";
  memos.forEach(m=>{
    const num = m.NUM || "";
    const hl  = m.HL  || "";

    const inLine = (m["INBOUND-c7"] || hl || num)
      ? `IN 7C[${m["INBOUND-c7"]||""}] HL[${hl}] #[${num}]`
      : "";

    const outLine = (m["OUTBOUND-c7"] || num)
      ? `OUT 7C[${m["OUTBOUND-c7"]||""}] #[${num}]`
      : "";

    memoList.innerHTML+=`
      <div class="memo">
        <input type="checkbox">
        <div class="memo-title" onclick="editMemo(${m.id})">
          ${inLine ? `<div class="line">${inLine}</div>` : ""}
          ${outLine ? `<div class="line">${outLine}</div>` : ""}
          ${(!inLine && !outLine) ? `<div class="line">NEW MEMO</div>` : ""}
        </div>
      </div>`;
  });
}

function editMemo(id){
  editId=id;
  const m=memos.find(x=>x.id===id);
  modal.style.display="flex";

  inChk.checked=!!m["INBOUND-c7"];
  outChk.checked=!!m["OUTBOUND-c7"];
  renderSections();

  document.querySelectorAll("[data-k]").forEach(el=>{
    const k=el.dataset.k;

    // 옛날 B 키 호환
    let v = m[k];
    if(v==null && k.endsWith("-bb")){
      const old = k.replace("-bb","-b");
      v = m[old];
    }

    if(el.tagName==="SPAN"){
      el.textContent = (v!=null && v!=="") ? v : "--:--";
    }else{
      el.value = (v!=null) ? v : "";
    }
  });
}

/* DELETE */
function deleteSelected(){
  const c=[...document.querySelectorAll(".memo input")];
  memos=memos.filter((_,i)=>!c[i].checked);
  localStorage.setItem("jas_memos",JSON.stringify(memos));
  renderList();
}

/* PHOTO */
function addPhoto(){ photoInput.click(); }
photoInput.onchange=e=>{
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ photo=r.result; localStorage.setItem("jas_photo",photo); };
  r.readAsDataURL(f);
};

function openPhoto(){
  if(!photo) return;
  scale=1;
  photoImg.src=photo;
  photoImg.style.transform="scale(1)";
  photoLayer.style.display="flex";
}
function closePhoto(){
  photoLayer.style.display="none";
  scale=1;
}

photoLayer.onwheel=e=>{
  e.preventDefault();
  scale+=e.deltaY<0?0.1:-0.1;
  scale=Math.max(1,Math.min(scale,4));
  photoImg.style.transform=`scale(${scale})`;
};

renderList();
</script>

</body>
</html>
