<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>JAS MEMO VER 6.5</title>
<style>
  :root{
    --bgSolid:#ff6a00;
    --orange1:#ffb347;
    --orange2:#ff7a00;
    --orange3:#ff5a00;
    --line:#2e2e32;
    --text:#f5f5f7;
    --muted:#b4b4bc;
    --shadow:0 20px 44px rgba(0,0,0,.34);
    --shadow-soft:0 10px 24px rgba(0,0,0,.26);
    --ui:.715;
    --dayUi:.65;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
    font-weight:800;color:var(--text);min-height:100vh;overflow-x:hidden;background:var(--bgSolid);
  }
  header{text-align:center;padding:calc(24px * var(--ui)) calc(14px * var(--ui)) calc(10px * var(--ui));user-select:none;cursor:pointer}
  .titleWrap{display:flex;justify-content:center;align-items:baseline;gap:calc(10px * var(--ui));flex-wrap:wrap}
  .titleMain{font-size:calc(46.2px * var(--ui));font-weight:1000;letter-spacing:-1.2px;text-transform:uppercase;line-height:1;color:#fff}
  .titleVer{font-size:calc(18.7px * var(--ui));font-weight:1000;opacity:.92;text-transform:uppercase;color:#fff2d8;letter-spacing:.4px}
  .controls{display:flex;justify-content:center;gap:calc(10px * var(--ui));padding:calc(8px * var(--ui)) calc(14px * var(--ui));flex-wrap:wrap}
  button{
    border:none;border-radius:999px;background:linear-gradient(180deg, rgba(40,40,44,.96), rgba(27,27,30,.96));
    padding:calc(14px * var(--ui)) calc(22px * var(--ui));font-weight:1000;color:var(--orange1);
    font-size:calc(16px * var(--ui));box-shadow:var(--shadow-soft);text-transform:uppercase;cursor:pointer;
    border:1px solid rgba(255,255,255,.06)
  }
  .dayBar{
    width:min(calc(780px * var(--dayUi) / .65), calc(100% - 24px));margin:calc(2px * var(--dayUi)) auto calc(10px * var(--dayUi));
    display:flex;align-items:center;justify-content:center;gap:calc(8px * var(--dayUi));flex-wrap:wrap
  }
  .dayBtn{padding:calc(10px * var(--dayUi)) calc(14px * var(--dayUi));font-size:calc(13px * var(--dayUi));border-radius:999px;box-shadow:none;background:rgba(34,34,38,.92);color:var(--orange1);border:1px solid rgba(255,255,255,.05)}
  .dayLabel{background:rgba(34,34,38,.96);border:1px solid rgba(255,255,255,.06);border-radius:999px;padding:calc(10px * var(--dayUi)) calc(16px * var(--dayUi));font-size:calc(13px * var(--dayUi));font-weight:1000;color:#fff}
  #memoList{padding:calc(10px * var(--ui)) calc(14px * var(--ui)) calc(160px * var(--ui));max-width:calc(780px * var(--ui) / .65);margin:0 auto}
  .emptyDay{background:rgba(28,28,31,.70);border:1px solid rgba(255,255,255,.06);border-radius:calc(30px * var(--ui));padding:calc(22px * var(--ui));text-align:center;font-size:calc(16px * var(--ui))}
  .memoCard{background:linear-gradient(180deg, rgba(34,34,38,.96), rgba(24,24,27,.96));border-radius:calc(32px * var(--ui));padding:calc(16px * var(--ui)) calc(14px * var(--ui));margin:calc(12px * var(--ui)) 0;box-shadow:var(--shadow);border:1px solid rgba(255,255,255,.06);position:relative}
  .memoCard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:calc(6px * var(--ui));background:linear-gradient(180deg,var(--orange1),var(--orange2),var(--orange3))}
  .memoRow{display:flex;gap:calc(10px * var(--ui));align-items:flex-start;padding-left:calc(4px * var(--ui))}
  .selBox{width:calc(28px * var(--ui));height:calc(28px * var(--ui));margin-top:calc(8px * var(--ui))}
  .lines{flex:1;display:flex;flex-direction:column;gap:calc(10px * var(--ui));cursor:pointer}
  .line{display:flex;align-items:flex-start;gap:calc(10px * var(--ui))}
  .tagPill{background:linear-gradient(180deg,#ff9a2f,#ff6a00);color:#fff;border-radius:999px;padding:calc(10px * var(--ui)) calc(14px * var(--ui));font-size:calc(15px * var(--ui));min-width:calc(70px * var(--ui));text-align:center}
  .textPill{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.05);border-radius:999px;padding:calc(11px * var(--ui)) calc(16px * var(--ui));font-size:calc(18px * var(--ui));color:#fff;flex:1;word-break:break-word}
  .datePill{margin-top:calc(8px * var(--ui));margin-left:calc(42px * var(--ui));font-size:calc(12px * var(--ui));color:var(--muted)}
  .bottomLeftButtons,.bottomRightButtons{position:fixed;bottom:calc(18px * var(--ui));z-index:30;display:flex;flex-direction:column;gap:calc(12px * var(--ui))}
  .bottomLeftButtons{left:calc(14px * var(--ui))}
  .bottomRightButtons{right:calc(14px * var(--ui));align-items:flex-end}
  .itMemoBtn,.akMemoBtn,.equipBtn{width:calc(148px * var(--ui));height:calc(50px * var(--ui));border-radius:999px;font-size:calc(16px * var(--ui));padding:0;display:flex;align-items:center;justify-content:center}
  .itMemoBtn{background:linear-gradient(180deg,#ffe063,#ffc61a);color:#111}
  .akMemoBtn{background:linear-gradient(180deg,#ff3953,#d80024);color:#fff}
  .equipBtn{background:linear-gradient(180deg,#2d2d33,#1c1c20);color:var(--orange1)}
  #equipBadge{min-width:calc(148px * var(--ui));background:rgba(18,18,20,.92);color:#fff;border-radius:calc(24px * var(--ui));padding:calc(12px * var(--ui)) calc(14px * var(--ui));display:none}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;justify-content:center;align-items:flex-end;z-index:50}
  .box{width:100%;max-width:calc(820px * var(--ui) / .65);background:#17171a;border-radius:calc(34px * var(--ui)) calc(34px * var(--ui)) 0 0;padding:0 calc(14px * var(--ui)) calc(18px * var(--ui));max-height:92vh;overflow:auto}
  .dragArea{padding:calc(7px * var(--ui)) 0 calc(8px * var(--ui));position:sticky;top:0;background:#17171a;z-index:40}
  .drag-handle{width:calc(62px * var(--ui));height:calc(8px * var(--ui));background:#494952;border-radius:999px;margin:0 auto calc(8px * var(--ui))}
  .topActionBar{display:flex;align-items:center;justify-content:space-between;gap:calc(10px * var(--ui))}
  .topMiniBtn{padding:calc(10px * var(--ui)) calc(16px * var(--ui));font-size:calc(14px * var(--ui));border-radius:999px;box-shadow:none;background:#242429;color:var(--orange1)}
  .modalTitleTap{position:sticky;top:calc(72px * var(--ui));z-index:34;text-align:center;color:#fff;padding:calc(10px * var(--ui)) 0 calc(12px * var(--ui));text-transform:uppercase;background:linear-gradient(180deg, rgba(23,23,26,1) 0%, rgba(23,23,26,.98) 78%, rgba(23,23,26,.90) 100%);margin:0 calc(-14px * var(--ui))}
  .modalTitleTap .m1{font-size:calc(18px * var(--ui))}
  .modalTitleTap .m2{font-size:calc(12px * var(--ui));opacity:.58;margin-top:2px}
  .dateLine{display:flex;justify-content:center;align-items:center;gap:calc(8px * var(--ui));margin-bottom:calc(8px * var(--ui));margin-top:calc(6px * var(--ui))}
  .dateLab{font-size:calc(15px * var(--ui));color:#fff;text-transform:uppercase}
  .dateInput{width:auto !important;min-width:calc(180px * var(--ui));text-align:center;padding:0 calc(12px * var(--ui))}
  .pickRow{display:flex;justify-content:center;gap:calc(10px * var(--ui));flex-wrap:wrap;margin:calc(6px * var(--ui)) 0 calc(12px * var(--ui))}
  .pickPill{display:flex;align-items:center;gap:calc(8px * var(--ui));background:#222226;border:2px solid #2d2d32;border-radius:999px;padding:calc(11px * var(--ui)) calc(16px * var(--ui));font-size:calc(15px * var(--ui));text-transform:uppercase;color:#fff}
  .pickPill input{width:calc(20px * var(--ui));height:calc(20px * var(--ui));margin:0;accent-color:var(--orange2)}
  .section{background:#1f1f23;border-radius:calc(28px * var(--ui));padding:calc(14px * var(--ui));margin:calc(12px * var(--ui)) 0;border:1px solid rgba(255,255,255,.05)}
  .sectionHead{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:calc(10px * var(--ui));gap:calc(10px * var(--ui))}
  .sectionTitle{font-size:calc(24px * var(--ui));letter-spacing:.3px;text-transform:uppercase;color:#fff}
  .headRight{display:flex;align-items:flex-start;gap:calc(10px * var(--ui));flex-wrap:wrap;justify-content:flex-end}
  .staStdWrap,.timeWrap{display:flex;align-items:center;gap:calc(8px * var(--ui));white-space:nowrap}
  .staStdLab{font-size:calc(16px * var(--ui));color:#fff;text-transform:uppercase}
  .staStdInput{width:calc(92px * var(--ui)) !important;min-width:calc(92px * var(--ui));text-align:center}
  .timeBtn{border:none;background:transparent;box-shadow:none;padding:calc(4px * var(--ui)) calc(8px * var(--ui));margin:0;font-size:calc(16px * var(--ui));color:#fff}
  .timeVal{font-size:calc(22px * var(--ui));color:var(--orange1);min-width:calc(64px * var(--ui));text-align:right;cursor:pointer}
  .row{display:flex;align-items:center;gap:calc(10px * var(--ui));margin:calc(10px * var(--ui)) 0;min-width:0}
  .lab{font-size:calc(20px * var(--ui));min-width:calc(46px * var(--ui));color:#fff;white-space:nowrap;text-transform:uppercase}
  input, textarea, select{font-family:inherit;font-size:calc(16px * var(--ui));font-weight:1000;border:2px solid var(--line);border-radius:calc(22px * var(--ui));outline:none;background:#121214;color:#fff;transition:border-color .14s ease, box-shadow .14s ease}
  input:focus, textarea:focus, select:focus{border-color:rgba(255,122,0,.7);box-shadow:0 0 0 calc(4px * var(--ui)) rgba(255,122,0,.12)}
  input{width:100%;height:calc(54px * var(--ui));line-height:calc(54px * var(--ui));padding:0 calc(12px * var(--ui));text-align:center}
  textarea{width:100%;min-height:calc(54px * var(--ui));resize:none;font-weight:800;padding:calc(12px * var(--ui));text-transform:none;border-radius:calc(24px * var(--ui));overflow:hidden}
  .numBox{font-size:calc(18px * var(--ui));letter-spacing:.6px}
  .long{flex:1;min-width:0;font-size:calc(16px * var(--ui));padding-left:calc(16px * var(--ui));text-align:left}
  .extraBox{background:#18181b;border:2px solid #27272c;border-radius:calc(26px * var(--ui));padding:calc(14px * var(--ui));margin-top:calc(10px * var(--ui))}
  .extraHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:calc(10px * var(--ui));text-transform:uppercase}
  .extraTitle{font-size:calc(20px * var(--ui));letter-spacing:.4px;color:#fff}
  .iconBtn{width:calc(48px * var(--ui));height:calc(48px * var(--ui));border-radius:calc(18px * var(--ui));background:#242429;color:var(--orange1);font-size:calc(28px * var(--ui));padding:0}
  .extraRow{display:flex;gap:calc(10px * var(--ui));align-items:center;margin-top:calc(10px * var(--ui))}
  .extraRow select{width:calc(130px * var(--ui));font-size:calc(16px * var(--ui));font-weight:1000}
  .extraRow input{width:calc(130px * var(--ui));font-size:calc(18px * var(--ui))}
  .minusBtn{width:calc(60px * var(--ui));height:calc(54px * var(--ui));border-radius:calc(20px * var(--ui));background:#242429;color:var(--orange1);font-size:calc(22px * var(--ui));box-shadow:none}
  .lirBtn{padding:calc(10px * var(--ui)) calc(16px * var(--ui));font-size:calc(14px * var(--ui));border-radius:999px;box-shadow:none;background:#242429;color:var(--orange1)}
  .lirCalcRow{display:flex;align-items:center;justify-content:space-between;gap:calc(10px * var(--ui));margin:calc(12px * var(--ui)) 0 calc(4px * var(--ui));flex-wrap:nowrap}
  .lirBtns{display:flex;align-items:center;gap:calc(10px * var(--ui));flex-wrap:wrap}
  .calcCircleBtn{width:calc(48px * var(--ui));height:calc(48px * var(--ui));min-width:calc(48px * var(--ui));border-radius:999px;border:none;background:#242429;color:var(--orange1);display:flex;align-items:center;justify-content:center;padding:0}
  .calcIcon{position:relative;display:block;width:calc(22px * var(--ui));height:calc(26px * var(--ui));border:2px solid var(--orange2);border-radius:calc(8px * var(--ui))}
  .calcIcon::before{content:"";position:absolute;left:50%;transform:translateX(-50%);top:calc(3px * var(--ui));width:calc(12px * var(--ui));height:calc(4px * var(--ui));background:var(--orange2);border-radius:calc(3px * var(--ui))}
  .calcIcon::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:calc(4px * var(--ui));width:calc(12px * var(--ui));height:calc(10px * var(--ui));background:radial-gradient(circle, var(--orange2) 58%, transparent 60%) 0 0 / calc(4px * var(--ui)) calc(4px * var(--ui)) repeat;opacity:.95}
  .calcFloatingWrap{position:fixed;inset:0;background:rgba(0,0,0,.42);display:none;align-items:flex-end;justify-content:center;z-index:120;padding:calc(16px * var(--ui))}
  .calcFloatingWrap.show{display:flex}
  .calcFloating{width:min(calc(430px * var(--ui) / .65), 100%);background:#18181b;border-radius:calc(30px * var(--ui));padding:calc(14px * var(--ui));border:1px solid rgba(255,255,255,.05)}
  .calcTopBar{display:flex;justify-content:space-between;align-items:center;gap:calc(10px * var(--ui));margin-bottom:calc(10px * var(--ui))}
  .calcTitle{font-size:calc(15px * var(--ui));color:#fff;text-transform:uppercase;letter-spacing:.4px}
  .calcCloseBtn{background:#242429;color:var(--orange1);width:calc(42px * var(--ui));height:calc(42px * var(--ui));border-radius:calc(16px * var(--ui));padding:0;font-size:calc(18px * var(--ui))}
  .calcDisplay{width:100%;height:calc(60px * var(--ui));border:2px solid #2b2b31;border-radius:calc(24px * var(--ui));background:#101012;padding:0 calc(14px * var(--ui));display:flex;align-items:center;justify-content:flex-end;font-size:calc(24px * var(--ui));color:#fff;overflow:hidden;white-space:nowrap}
  .calcGrid{margin-top:calc(10px * var(--ui));display:grid;grid-template-columns:repeat(4, 1fr);gap:calc(8px * var(--ui))}
  .calcKey{height:calc(54px * var(--ui));border-radius:calc(20px * var(--ui));background:#242429;color:#fff;font-size:calc(18px * var(--ui));padding:0}
  .calcKey.op{background:#2b2b31;color:var(--orange1)}
  .calcKey.eq{background:linear-gradient(180deg,var(--orange2),var(--orange3));color:#fff}
  .calcKey.wide{grid-column:span 2}
  .focusedCalcTarget{border-color:rgba(255,122,0,.7)!important;box-shadow:0 0 0 calc(4px * var(--ui)) rgba(255,122,0,.12)!important}
  #photoLayer{position:fixed;inset:0;background:#000;display:none;justify-content:center;align-items:center;z-index:90}
  #photoLayer img{max-width:100%;max-height:100%;object-fit:contain}
  .rowGrid3{display:grid;grid-template-columns:calc(26px * var(--ui)) .9fr calc(26px * var(--ui)) .9fr calc(14px * var(--ui)) .9fr;gap:calc(10px * var(--ui));align-items:center;margin:calc(10px * var(--ui)) 0}
  .rowGridTDBB{display:grid;grid-template-columns:calc(18px * var(--ui)) 1fr calc(18px * var(--ui)) .9fr calc(26px * var(--ui)) .9fr;gap:calc(10px * var(--ui));align-items:center;margin:calc(10px * var(--ui)) 0}
  .rowGridTTTB{display:grid;grid-template-columns:calc(26px * var(--ui)) 1fr calc(26px * var(--ui)) 1fr;gap:calc(10px * var(--ui));align-items:center;margin:calc(10px * var(--ui)) 0}
  .noticeOverlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;z-index:200;padding:18px}
  .noticeBox{width:min(420px,100%);background:#18181b;border:1px solid rgba(255,255,255,.08);border-radius:28px;padding:20px;box-shadow:var(--shadow)}
  .noticeTitle{font-size:22px;color:#fff;margin-bottom:10px;text-transform:uppercase}
  .noticeBody{font-size:16px;line-height:1.45;color:#fff;margin-bottom:16px}
  .noticeRow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .noticeActions{display:flex;justify-content:flex-end;gap:10px}
  @media (max-width:520px){
    .bottomLeftButtons{left:12px;bottom:14px;gap:10px}
    .bottomRightButtons{right:12px;bottom:14px;gap:10px}
    .itMemoBtn,.akMemoBtn,.equipBtn{width:122px;height:42px;font-size:14px}
    .topMiniBtn{padding:8px 12px;font-size:14px}

</head>
<body>
<header id="homeHeader" onclick="openPhoto()" ondblclick="openPhoto()">
  <div class="titleWrap"><div class="titleMain">JAS MEMO</div><div class="titleVer">VER 6.5</div></div>
</header>

<div class="controls" id="topControls">
  <button type="button" onclick="newMemo()">ADD</button>
  <button type="button" onclick="deleteSelected()">DELETE</button>
  <button type="button" onclick="addPhoto()">PHOTO</button>
</div>

<div class="dayBar">
  <button type="button" class="dayBtn" onclick="moveDay(-1)">PREV DAY</button>
  <div class="dayLabel" id="dayLabel">TODAY</div>
  <button type="button" class="dayBtn" onclick="goToday()">TODAY</button>
  <button type="button" class="dayBtn" onclick="deleteCurrentDay()">DEL DAY</button>
  <button type="button" class="dayBtn" onclick="moveDay(1)">NEXT DAY</button>
</div>

<div id="memoList"></div>

<div class="bottomLeftButtons">
  <button class="equipBtn" type="button" onclick="openEquip()">EQUIPMENT</button>
  <button class="itMemoBtn" onclick="location.href='https://deathd-stack.github.io/JAS2/'">IT MEMO</button>
</div>

<div class="bottomRightButtons">
  <div id="equipBadge"></div>
  <button class="akMemoBtn" onclick="location.href='https://deathd-stack.github.io/JAS1/'">AK MEMO</button>
</div>

<input type="file" id="photoInput" accept="image/*" hidden />
<input type="file" id="lirPhotoInput" accept="image/*" hidden />

<div class="modal" id="modal" aria-hidden="true">
  <div class="box" id="sheet" role="dialog" aria-modal="true">
    <div class="dragArea" id="dragArea">
      <div class="drag-handle"></div>
      <div class="topActionBar">
        <button type="button" class="topMiniBtn" onclick="saveMemo()">SAVE</button>
        <button type="button" class="topMiniBtn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>

    <div class="modalTitleTap" onclick="openPhoto()">
      <div class="m1">JAS MEMO</div>
      <div class="m2">TAP TO OPEN PHOTO</div>
    </div>

    <div class="dateLine">
      <div class="dateLab">DATE</div>
      <input type="date" id="memoDate" class="dateInput">
    </div>

    <div class="pickRow">
      <label class="pickPill"><input type="checkbox" id="pickInbound" checked><span>INBOUND</span></label>
      <label class="pickPill"><input type="checkbox" id="pickOutbound" checked><span>OUTBOUND</span></label>
    </div>

    <div id="sections"></div>
  </div>
</div>

<div id="photoLayer" ondblclick="closePhoto()" onclick="closePhoto()"><img id="photoImg" alt="photo" /></div>

<div class="modal" id="equipModal" aria-hidden="true">
  <div class="box" style="max-height:70vh" onclick="event.stopPropagation()">
    <div class="dragArea">
      <div class="drag-handle"></div>
      <div class="topActionBar">
        <button type="button" class="topMiniBtn" onclick="saveEquip()">SAVE</button>
        <button type="button" class="topMiniBtn" onclick="closeEquip()">CLOSE</button>
      </div>
    </div>

    <div style="font-weight:1000;font-size:20px;margin:6px 0 12px;color:#fff;text-transform:uppercase;">EQUIPMENT</div>
    <div class="row">
      <div class="lab" style="min-width:72px;">TUG</div>
      <input id="tug1" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
      <input id="tug2" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>
    <div class="row">
      <div class="lab" style="min-width:72px;">BELT</div>
      <input id="belt" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>
  </div>
</div>

<div id="calcWrap" class="calcFloatingWrap" aria-hidden="true">
  <div class="calcFloating" onclick="event.stopPropagation()">
    <div class="calcTopBar">
      <div class="calcTitle">CALCULATOR</div>
      <button type="button" class="calcCloseBtn" onclick="closeCalc()">✕</button>
    </div>
    <div class="calcDisplay" id="globalCalcDisplay">0</div>
    <div class="calcGrid">
      <button type="button" class="calcKey op" data-global-calc="C">C</button>
      <button type="button" class="calcKey op" data-global-calc="⌫">⌫</button>
      <button type="button" class="calcKey op" data-global-calc="%">%</button>
      <button type="button" class="calcKey op" data-global-calc="/">÷</button>
      <button type="button" class="calcKey" data-global-calc="7">7</button>
      <button type="button" class="calcKey" data-global-calc="8">8</button>
      <button type="button" class="calcKey" data-global-calc="9">9</button>
      <button type="button" class="calcKey op" data-global-calc="*">×</button>
      <button type="button" class="calcKey" data-global-calc="4">4</button>
      <button type="button" class="calcKey" data-global-calc="5">5</button>
      <button type="button" class="calcKey" data-global-calc="6">6</button>
      <button type="button" class="calcKey op" data-global-calc="-">−</button>
      <button type="button" class="calcKey" data-global-calc="1">1</button>
      <button type="button" class="calcKey" data-global-calc="2">2</button>
      <button type="button" class="calcKey" data-global-calc="3">3</button>
      <button type="button" class="calcKey op" data-global-calc="+">+</button>
      <button type="button" class="calcKey wide" data-global-calc="0">0</button>
      <button type="button" class="calcKey" data-global-calc=".">.</button>
      <button type="button" class="calcKey eq" data-global-calc="=">=</button>
    </div>
  </div>
</div>

<div id="noticeOverlay" class="noticeOverlay">
  <div class="noticeBox">
    <div class="noticeTitle">수정사항</div>
    <div class="noticeBody">이제 INBOUND NOTE에 LDM 복사해서 넣으시면 자동으로 입력됩니다.</div>
    <label class="noticeRow"><input type="checkbox" id="noticeHideChk"> <span>다시는 보지 않음</span></label>
    <div class="noticeActions"><button type="button" onclick="closeNotice()">닫기</button></div>
  </div>
</div>

<script>
const MEMO_KEY = "jas_memos_v65";
const PHOTO_KEY = "jas_photo_v65";
const EQUIP_KEY = "jas_equipment_v65";
const NOTICE_KEY = "jas_notice_hide_v65";

const modal = document.getElementById("modal");
const sheet = document.getElementById("sheet");
const sections = document.getElementById("sections");
const memoList = document.getElementById("memoList");
const photoInput = document.getElementById("photoInput");
const lirPhotoInput = document.getElementById("lirPhotoInput");
const photoLayer = document.getElementById("photoLayer");
const photoImg = document.getElementById("photoImg");
const memoDate = document.getElementById("memoDate");
const dayLabel = document.getElementById("dayLabel");
const pickInbound = document.getElementById("pickInbound");
const pickOutbound = document.getElementById("pickOutbound");
const topControls = document.getElementById("topControls");
const equipBadge = document.getElementById("equipBadge");
const equipModal = document.getElementById("equipModal");
const tug1 = document.getElementById("tug1");
const tug2 = document.getElementById("tug2");
const belt = document.getElementById("belt");
const calcWrap = document.getElementById("calcWrap");
const globalCalcDisplay = document.getElementById("globalCalcDisplay");
const noticeOverlay = document.getElementById("noticeOverlay");
const noticeHideChk = document.getElementById("noticeHideChk");

let memos = JSON.parse(localStorage.getItem(MEMO_KEY) || "[]");
let photo = localStorage.getItem(PHOTO_KEY) || "";
let editId = null;
let dayOffset = 0;
let activeLirType = null;
let currentLirPhotos = { INBOUND:"", OUTBOUND:"" };
let globalCalcExpr = "";
let activeCalcInput = null;

const EXTRA_KEYS = ["W","C","COB","GB","TS","EMS","RUSH","CARSEAT","COMAT","STRAP","LONGFIN","CYCLE","CREW","PCB"];

function onlyNum(val, len){ return (val || "").replace(/[^0-9]/g, "").slice(0, len); }
function pad(val, len){ const v = onlyNum(val, len); return v ? v.padStart(len, "0") : ""; }
function cleanTextUpper(val){ return (val || "").toUpperCase().trim(); }
function defaultF(val){ const v = cleanTextUpper(val); return v ? v : "F"; }
function nowTime(){ const d = new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); }
function normalizeTimeText(val){ const raw = (val || "").trim(); if(!raw) return ""; const digits = raw.replace(/[^0-9]/g, ""); if(digits.length === 3) return digits.slice(0,1)+":"+digits.slice(1,3); if(digits.length >= 4) return digits.slice(0,2)+":"+digits.slice(2,4); return raw.slice(0,5); }
function askTime(currentValue=""){ const t = prompt("TIME (HH:MM 24H)", currentValue || nowTime()); if(t === null) return null; return normalizeTimeText(t); }
function todayStr(){ const d = new Date(); return dateToStr(d); }
function dateToStr(d){ const y = d.getFullYear(); const m = String(d.getMonth()+1).padStart(2,"0"); const day = String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
function getViewingDate(){ const d = new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate() + dayOffset); return d; }
function getViewingDayKey(){ return dateToStr(getViewingDate()); }
function updateDayLabel(){ dayLabel.textContent = getViewingDayKey(); }
function calcDayOffsetFromDate(dateStr){ const base = new Date(todayStr()); const target = new Date(dateStr); base.setHours(0,0,0,0); target.setHours(0,0,0,0); return Math.round((target - base) / 86400000); }
function moveDay(n){ dayOffset += n; updateDayLabel(); renderList(); }
function goToday(){ dayOffset = 0; updateDayLabel(); renderList(); }
function persistMemos(){ localStorage.setItem(MEMO_KEY, JSON.stringify(memos)); }
function deleteCurrentDay(){ const dk = getViewingDayKey(); const target = memos.filter(m => (m.dayKey || m.memoDate) === dk); if(!target.length){ alert("NO MEMO IN THIS DAY"); return; } if(!confirm("DELETE ALL MEMOS IN THIS DAY?")) return; memos = memos.filter(m => (m.dayKey || m.memoDate) !== dk); persistMemos(); renderList(); }

function isCalcEligibleInput(el){
  if(!(el instanceof HTMLInputElement)) return false;
  const k = el.dataset.k || "";
  if(!k) return false;
  return (k.endsWith("-7C") || k.endsWith("-STA") || k.endsWith("-STD") || k.endsWith("-t") || k.endsWith("-d") || k.endsWith("-bb") || k.endsWith("-tt") || k.endsWith("-tb") || k === "SHARED-HL" || k === "SHARED-HASH" || k.startsWith("extraVal-"));
}

document.addEventListener("focusin", (e)=>{
  const t = e.target;
  if(isCalcEligibleInput(t)){
    if(activeCalcInput && activeCalcInput !== t) activeCalcInput.classList.remove("focusedCalcTarget");
    activeCalcInput = t;
    activeCalcInput.classList.add("focusedCalcTarget");
  }
});
document.addEventListener("click", (e)=>{
  const t = e.target;
  if(!(t instanceof HTMLElement)) return;
  if(!t.closest(".section") && !t.closest(".calcFloating")){
    if(activeCalcInput) activeCalcInput.classList.remove("focusedCalcTarget");
  }
});
document.addEventListener("input", (e)=>{
  const t = e.target;
  if(!(t instanceof HTMLInputElement)) return;
  const k = t.dataset.k || "";
  if(!k) return;
  if(k === "SHARED-HL"){
    t.value = onlyNum(t.value, 4);
    document.querySelectorAll('input[data-k="SHARED-HL"]').forEach(el=>{ if(el !== t) el.value = t.value; });
    return;
  }
  if(k === "SHARED-HASH"){
    t.value = onlyNum(t.value, 3);
    document.querySelectorAll('input[data-k="SHARED-HASH"]').forEach(el=>{ if(el !== t) el.value = t.value; });
    return;
  }
  if(k.endsWith("-7C") || k.endsWith("-STA") || k.endsWith("-STD") || k.endsWith("-tt") || k.endsWith("-tb")) t.value = onlyNum(t.value, 4);
  if(k.endsWith("-t") || k.startsWith("extraVal-")) t.value = onlyNum(t.value, 3);
  if(k.endsWith("-d") || k.endsWith("-bb")) t.value = onlyNum(t.value, 2);
});

function autoGrow(el){
  if(!el) return;
  el.style.height = "auto";
  el.style.height = Math.max(el.scrollHeight, 54) + "px";
}
function sanitizeCmptText(text){
  let out = text || "";
  out = out.replace(/\bFAK\b[^,.\n]*/gi, "");
  out = out.replace(/\s+,/g, ",").replace(/,\s*,/g, ",");
  out = out.replace(/[ \t]{2,}/g, " ");
  out = out.replace(/,\s*$/g, "");
  out = out.replace(/\n{2,}/g, "\n");
  return out.trim();
}
function parseCountPatterns(text, patterns){
  let total = 0;
  patterns.forEach(re=>{
    const matches = [...text.matchAll(re)];
    matches.forEach(m=>{ total += Number(m[1] || 0); });
  });
  return total;
}
function addOrAccumulateExtra(root, key, amount){
  if(!root || !key || !amount) return;
  const box = root.querySelector(`#${root.dataset.type}-EXTRAS`);
  if(!box) return;
  const rows = [...box.querySelectorAll(".extraRow")];
  const existing = rows.find(r => (r.querySelector("select")?.value || "").toUpperCase() === key);
  if(existing){
    const input = existing.querySelector("input");
    const prev = Number(input.value || 0);
    input.value = String(prev + amount);
  }else{
    box.appendChild(makeExtraRow(root.dataset.type, key, String(amount)));
  }
}
function setIfValue(root, key, value){
  if(!root || !value) return;
  const el = root.querySelector(`input[data-k="${root.dataset.type}-${key}"]`);
  if(el) el.value = String(value);
}
function parseStructuredNote(type, noteText){
  const root = sections.querySelector(`.section[data-type="${type}"]`);
  if(!root || !noteText) return;

  const normalized = noteText.replace(/\r/g, "");
  const hasSiSection = /(?:^|\n)\s*SI\b/i.test(normalized);

  const cptMatches = [...normalized.matchAll(/CPT([1-4])\s*-\s*([\s\S]*?)(?=(?:\nCPT[1-4]\s*-)|(?:\nSI\b)|$)/gi)];
  let totalBag = 0;
  let totalD = 0;
  let totalBB = 0;

  cptMatches.forEach(m=>{
    const num = m[1];
    let text = (m[2] || "").trim();
    text = sanitizeCmptText(text);
    const cmpt = root.querySelector(`[data-k="${type}-cmpt${num}"]`);
    if(cmpt){
      cmpt.value = text || (num === "1" || num === "2" ? "F" : "");
      autoGrow(cmpt);
    }
    totalBag += parseCountPatterns(text, [/\bBAG\s*(\d+)\s*P(?:C|CS)\b/gi]);
    totalD += parseCountPatterns(text, [/\bD\/?S\s*(\d+)\s*P?(?:C|CS)?\b/gi]);
    totalBB += parseCountPatterns(text, [/\bBBST\s*(\d+)\b/gi, /\bBB\s*\/?\s*(\d+)\b/gi]);
  });

  if(totalBag) setIfValue(root, "t", totalBag);
  if(totalD) setIfValue(root, "d", totalD);
  if(totalBB) setIfValue(root, "bb", totalBB);

  const extraBox = root.querySelector(`#${type}-EXTRAS`);
  if(extraBox) extraBox.innerHTML = "";

  const siPart = hasSiSection ? normalized.split(/\nSI\b/i).slice(1).join("\n") : "";
  const sourceForExtra = hasSiSection ? siPart : cptMatches.map(m => m[0]).join("\n");

  const mapExtraCount = (src)=>{
    if(!src) return;
    addOrAccumulateExtra(root, "C", parseCountPatterns(src, [/\bCGO\s*(\d+)\s*P(?:C|CS)\b/gi]));
    addOrAccumulateExtra(root, "EMS", parseCountPatterns(src, [/\b(?:MAIL|POS|EMS)\s*(\d+)\s*P(?:C|CS)\b/gi]));
    addOrAccumulateExtra(root, "TS", parseCountPatterns(src, [/\bBT\s*BAG\s*(\d+)\s*P(?:C|CS)\b/gi, /\b(?:TS|T\/S)\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "W", parseCountPatterns(src, [/\bWCHR\s*(\d+)\b/gi, /\bWCHR\s*(\d+)\s*P(?:C|CS)\b/gi]));
    addOrAccumulateExtra(root, "COB", parseCountPatterns(src, [/\bCOB\s*(\d+)\b/gi, /\bCOB\s*(\d+)\s*P(?:C|CS)\b/gi]));
    addOrAccumulateExtra(root, "GB", parseCountPatterns(src, [/\bG\/B\s*(\d+)\b/gi, /\bGB\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "RUSH", parseCountPatterns(src, [/\bRUSH\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "CARSEAT", parseCountPatterns(src, [/\bCARSEAT\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "COMAT", parseCountPatterns(src, [/\bCOMAT\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "LONGFIN", parseCountPatterns(src, [/\bLONGFIN\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "CYCLE", parseCountPatterns(src, [/\bCYCLE\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "CREW", parseCountPatterns(src, [/\bCREW\s*(\d+)\b/gi]));
    addOrAccumulateExtra(root, "PCB", parseCountPatterns(src, [/\bPCB\s*(\d+)\b/gi]));
    const dFromSrc = parseCountPatterns(src, [/\bD\/?S\s*(\d+)\s*P?(?:C|CS)?\b/gi]);
    const bbFromSrc = parseCountPatterns(src, [/\bBBST\s*(\d+)\b/gi, /\bBB\s*\/?\s*(\d+)\b/gi]);
    if(hasSiSection){
      if(dFromSrc) setIfValue(root, "d", dFromSrc);
      if(bbFromSrc) setIfValue(root, "bb", bbFromSrc);
    }
  };
  mapExtraCount(sourceForExtra);
}
function makeExtraRow(type, key="CREW", val=""){
  const row = document.createElement("div");
  row.className = "extraRow";
  row.innerHTML = `
    <select>
      ${EXTRA_KEYS.map(k => `<option value="${k}" ${k===key ? "selected" : ""}>${k}</option>`).join("")}
    </select>
    <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="extraVal-${type}" value="${onlyNum(val,3)}">
    <button type="button" class="minusBtn" onclick="this.parentElement.remove()">-</button>
  `;
  return row;
}
function addExtraRow(type){
  const root = sections.querySelector(`.section[data-type="${type}"]`);
  const box = root ? root.querySelector(`#${type}-EXTRAS`) : null;
  if(!box) return;
  box.appendChild(makeExtraRow(type, "CREW", ""));
}
function bindEditableTime(el, initialValue){
  el.textContent = initialValue || "";
  el.addEventListener("click", ()=>{ const t = askTime(el.textContent || ""); if(t !== null) el.textContent = t; });
}
function openLirPicker(type){ activeLirType = type; lirPhotoInput.value = ""; lirPhotoInput.click(); }
function viewLirPhoto(type){ const src = currentLirPhotos[type] || ""; if(!src){ alert("NO LIR PHOTO"); return; } photoImg.src = src; photoLayer.style.display = "flex"; }
function openCalc(){ calcWrap.classList.add("show"); calcWrap.setAttribute("aria-hidden","false"); }
function closeCalc(){ calcWrap.classList.remove("show"); calcWrap.setAttribute("aria-hidden","true"); }
function updateGlobalCalcDisplay(val){ globalCalcDisplay.textContent = val || "0"; }
function safeEval(expr){
  if(!expr) return "0";
  const cleaned = expr.replace(/[^0-9+\-*/%.()]/g, "");
  if(!cleaned) return "0";
  try{
    const result = Function("return (" + cleaned + ")")();
    if(result === undefined || result === null || Number.isNaN(result) || !Number.isFinite(result)) return "ERROR";
    return String(result);
  }catch(e){ return "ERROR"; }
}
function applyCalcToInput(result){
  if(!activeCalcInput) return;
  const k = activeCalcInput.dataset.k || "";
  const digits = String(result || "").replace(/[^0-9]/g, "");
  if(k === "SHARED-HL") activeCalcInput.value = digits.slice(0,4);
  else if(k === "SHARED-HASH") activeCalcInput.value = digits.slice(0,3);
  else if(k.endsWith("-7C") || k.endsWith("-STA") || k.endsWith("-STD") || k.endsWith("-tt") || k.endsWith("-tb")) activeCalcInput.value = digits.slice(0,4);
  else if(k.endsWith("-t") || k.startsWith("extraVal-")) activeCalcInput.value = digits.slice(0,3);
  else if(k.endsWith("-d") || k.endsWith("-bb")) activeCalcInput.value = digits.slice(0,2);
  else activeCalcInput.value = digits;
  activeCalcInput.dispatchEvent(new Event("input", { bubbles:true }));
}

document.querySelectorAll("[data-global-calc]").forEach(btn => btn.addEventListener("click", ()=>{
  const key = btn.dataset.globalCalc;
  if(key === "C") globalCalcExpr = "";
  else if(key === "⌫") globalCalcExpr = globalCalcExpr.slice(0,-1);
  else if(key === "="){
    const result = safeEval(globalCalcExpr);
    updateGlobalCalcDisplay(result);
    if(result !== "ERROR") applyCalcToInput(result);
    globalCalcExpr = result === "ERROR" ? "" : result;
    return;
  }else globalCalcExpr += key;
  updateGlobalCalcDisplay(globalCalcExpr || "0");
}));

function makeSection(type, memoData){
  const d = document.createElement("div");
  d.className = "section";
  d.dataset.type = type;

  const savedTime = memoData ? (memoData[type+"-TIME"] || "") : "";
  const local7C = memoData ? (memoData[type+"-7C"] || "") : "";
  const sharedHL = memoData ? (memoData.sharedHL || "") : "";
  const sharedHASH = memoData ? (memoData.sharedHASH || "") : "";
  const v = (k)=> memoData ? (memoData[type+"-"+k] || "") : "";
  const noteV = memoData ? (memoData[type+"-note"] || "") : "";
  const cmpt1Val = memoData ? defaultF(memoData[type+"-cmpt1"]) : "F";
  const cmpt2Val = memoData ? defaultF(memoData[type+"-cmpt2"]) : "F";
  const cmpt3Val = memoData ? (memoData[type+"-cmpt3"] || "") : "";
  const cmpt4Val = memoData ? (memoData[type+"-cmpt4"] || "") : "";
  const staStdLabel = type === "INBOUND" ? "STA" : "STD";
  const staStdKey = type === "INBOUND" ? "STA" : "STD";

  d.innerHTML = `
    <div class="sectionHead">
      <div class="sectionTitle">${type}</div>
      <div class="headRight">
        <div class="staStdWrap">
          <div class="staStdLab">${staStdLabel}</div>
          <input class="numBox staStdInput" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-${staStdKey}" value="${v(staStdKey)}">
        </div>
        <div class="timeWrap">
          <button type="button" class="timeBtn" data-timebtn="${type}">TIME</button>
          <div class="timeVal" id="${type}-TIMESHOWN"></div>
        </div>
      </div>
    </div>

    <div class="rowGrid3">
      <div class="lab">7C</div>
      <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-7C" value="${local7C}">
      <div class="lab">HL</div>
      <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="SHARED-HL" value="${sharedHL}">
      <div class="lab">#</div>
      <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="SHARED-HASH" value="${sharedHASH}">
    </div>

    <div class="row"><div class="lab" style="min-width:96px;">CMPT 1</div><textarea class="long" rows="1" data-k="${type}-cmpt1" placeholder="TEXT">${cmpt1Val}</textarea></div>
    <div class="row"><div class="lab" style="min-width:96px;">CMPT 2</div><textarea class="long" rows="1" data-k="${type}-cmpt2" placeholder="TEXT">${cmpt2Val}</textarea></div>
    <div class="row"><div class="lab" style="min-width:96px;">CMPT 3</div><textarea class="long" rows="1" data-k="${type}-cmpt3" placeholder="TEXT">${cmpt3Val}</textarea></div>
    <div class="row"><div class="lab" style="min-width:96px;">CMPT 4</div><textarea class="long" rows="1" data-k="${type}-cmpt4" placeholder="TEXT">${cmpt4Val}</textarea></div>

    <div class="rowGridTDBB">
      <div class="lab">T</div>
      <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="${type}-t" value="${v("t")}">
      <div class="lab">D</div>
      <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-d" value="${v("d")}">
      <div class="lab">BB</div>
      <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-bb" value="${v("bb")}">
    </div>

    ${type === "OUTBOUND" ? `
    <div class="rowGridTTTB">
      <div class="lab">T/T</div>
      <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tt" value="${v("tt")}">
      <div class="lab">T/B</div>
      <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tb" value="${v("tb")}">
    </div>
    <div class="lirCalcRow">
      <div class="lirBtns">
        <button type="button" class="lirBtn" data-lir-add="${type}">LIR</button>
        <button type="button" class="lirBtn" data-lir-view="${type}">VIEW</button>
      </div>
      <button type="button" class="calcCircleBtn calcIconBtn" data-calc-toggle="${type}"><span class="calcIcon"></span></button>
    </div>` : ""}

    <div class="extraBox">
      <div class="extraHead">
        <div class="extraTitle">EXTRA</div>
        <button type="button" class="iconBtn" onclick="addExtraRow('${type}')">+</button>
      </div>
      <div id="${type}-EXTRAS"></div>
    </div>

    <textarea data-k="${type}-note" rows="4" placeholder="NOTE (${type})">${noteV}</textarea>
  `;

  const timeBtn = d.querySelector(`[data-timebtn="${type}"]`);
  const timeShown = d.querySelector(`#${type}-TIMESHOWN`);
  bindEditableTime(timeShown, savedTime);
  timeBtn.addEventListener("click", ()=>{ timeShown.textContent = nowTime(); });
  timeBtn.addEventListener("dblclick", ()=>{ const t = askTime(timeShown.textContent || ""); if(t !== null) timeShown.textContent = t; });

  const lirAddBtn = d.querySelector(`[data-lir-add="${type}"]`);
  const lirViewBtn = d.querySelector(`[data-lir-view="${type}"]`);
  const calcToggleBtn = d.querySelector(`[data-calc-toggle="${type}"]`);
  if(lirAddBtn) lirAddBtn.addEventListener("click", ()=>openLirPicker(type));
  if(lirViewBtn) lirViewBtn.addEventListener("click", ()=>viewLirPhoto(type));
  if(calcToggleBtn) calcToggleBtn.addEventListener("click", ()=>openCalc());

  const extrasBox = d.querySelector(`#${type}-EXTRAS`);
  const extras = memoData ? (memoData[type+"-EXTRAS"] || []) : [];
  extras.forEach(ex => extrasBox.appendChild(makeExtraRow(type, ex.key, ex.val)));

  d.querySelectorAll(`textarea[data-k^="${type}-cmpt"]`).forEach(autoGrow);
  const noteArea = d.querySelector(`textarea[data-k="${type}-note"]`);
  if(noteArea){
    autoGrow(noteArea);
    noteArea.addEventListener("input", ()=> autoGrow(noteArea));
    noteArea.addEventListener("paste", ()=>{
      setTimeout(()=> parseStructuredNote(type, noteArea.value), 30);
    });
  }
  d.querySelectorAll(`textarea[data-k^="${type}-cmpt"]`).forEach(el=> el.addEventListener("input", ()=> autoGrow(el)));

  return d;
}

function buildSectionsBlank(){
  sections.innerHTML = "";
  if(pickInbound.checked) sections.appendChild(makeSection("INBOUND", null));
  if(pickOutbound.checked) sections.appendChild(makeSection("OUTBOUND", null));
}
function rebuildSectionsFromMemo(memoData){
  sections.innerHTML = "";
  if(pickInbound.checked) sections.appendChild(makeSection("INBOUND", memoData));
  if(pickOutbound.checked) sections.appendChild(makeSection("OUTBOUND", memoData));
}
function newMemo(){
  editId = null;
  memoDate.value = getViewingDayKey();
  pickInbound.checked = true;
  pickOutbound.checked = true;
  currentLirPhotos = { INBOUND:"", OUTBOUND:"" };
  buildSectionsBlank();
  openModal();
}
function openModal(){
  modal.style.display = "flex";
  modal.setAttribute("aria-hidden","false");
  sheet.style.transform = "translateY(0)";
  topControls.style.display = "none";
}
function closeModal(){
  modal.style.display = "none";
  modal.setAttribute("aria-hidden","true");
  editId = null;
  activeLirType = null;
  closeCalc();
  if(activeCalcInput) activeCalcInput.classList.remove("focusedCalcTarget");
  topControls.style.display = "flex";
  updateEquipBadge();
}
function ensureAtLeastOnePick(changed){
  if(!pickInbound.checked && !pickOutbound.checked){
    changed.checked = true;
    alert("INBOUND OR OUTBOUND SELECT");
    return false;
  }
  return true;
}
pickInbound.addEventListener("change", ()=>{
  if(!ensureAtLeastOnePick(pickInbound)) return;
  if(editId){
    const m = memos.find(x=>x.id===editId);
    rebuildSectionsFromMemo(m || null);
  }else buildSectionsBlank();
});
pickOutbound.addEventListener("change", ()=>{
  if(!ensureAtLeastOnePick(pickOutbound)) return;
  if(editId){
    const m = memos.find(x=>x.id===editId);
    rebuildSectionsFromMemo(m || null);
  }else buildSectionsBlank();
});

function saveMemo(){
  if(!pickInbound.checked && !pickOutbound.checked){
    alert("INBOUND OR OUTBOUND SELECT");
    return;
  }
  const data = { id: editId ?? Date.now(), hasIn:pickInbound.checked, hasOut:pickOutbound.checked };
  data.memoDate = memoDate.value || getViewingDayKey();
  data.dayKey = data.memoDate;
  data.sharedHL = pad(document.querySelector('input[data-k="SHARED-HL"]')?.value || "", 4);
  data.sharedHASH = pad(document.querySelector('input[data-k="SHARED-HASH"]')?.value || "", 3);

  ["INBOUND","OUTBOUND"].forEach(type=>{
    const root = sections.querySelector(`.section[data-type="${type}"]`);
    if(!root){
      data[type+"-7C"] = ""; data[type+"-STA"] = ""; data[type+"-STD"] = ""; data[type+"-t"] = ""; data[type+"-d"] = ""; data[type+"-bb"] = ""; data[type+"-tt"] = ""; data[type+"-tb"] = "";
      data[type+"-cmpt1"] = "F"; data[type+"-cmpt2"] = "F"; data[type+"-cmpt3"] = ""; data[type+"-cmpt4"] = ""; data[type+"-note"] = ""; data[type+"-TIME"] = ""; data[type+"-EXTRAS"] = []; data[type+"-LIRPHOTO"] = currentLirPhotos[type] || "";
      return;
    }
    const gi = (k)=> root.querySelector(`input[data-k="${type}-${k}"]`);
    const cm = (n)=> root.querySelector(`textarea[data-k="${type}-cmpt${n}"]`);
    const note = root.querySelector(`textarea[data-k="${type}-note"]`);

    data[type+"-7C"] = pad(gi("7C")?.value || "", 4);
    data[type+"-STA"] = type==="INBOUND" ? pad(gi("STA")?.value || "", 4) : "";
    data[type+"-STD"] = type==="OUTBOUND" ? pad(gi("STD")?.value || "", 4) : "";
    data[type+"-t"] = pad(gi("t")?.value || "", 3);
    data[type+"-d"] = pad(gi("d")?.value || "", 2);
    data[type+"-bb"] = pad(gi("bb")?.value || "", 2);
    data[type+"-tt"] = type==="OUTBOUND" ? pad(gi("tt")?.value || "", 4) : "";
    data[type+"-tb"] = type==="OUTBOUND" ? pad(gi("tb")?.value || "", 4) : "";
    data[type+"-cmpt1"] = cleanTextUpper(cm(1)?.value || "");
    data[type+"-cmpt2"] = cleanTextUpper(cm(2)?.value || "");
    data[type+"-cmpt3"] = cleanTextUpper(cm(3)?.value || "");
    data[type+"-cmpt4"] = cleanTextUpper(cm(4)?.value || "");
    data[type+"-note"] = note ? (note.value || "") : "";
    const shown = document.getElementById(type+"-TIMESHOWN");
    data[type+"-TIME"] = shown ? normalizeTimeText(shown.textContent || "") : "";

    const extras = [];
    const box = root.querySelector(`#${type}-EXTRAS`);
    if(box){
      [...box.querySelectorAll(".extraRow")].forEach(r=>{
        const key = (r.querySelector("select")?.value || "").toUpperCase();
        const val = pad(r.querySelector("input")?.value || "", 3);
        if(key && val) extras.push({key, val});
      });
    }
    data[type+"-EXTRAS"] = extras;
    data[type+"-LIRPHOTO"] = currentLirPhotos[type] || "";
  });

  if(editId){
    const idx = memos.findIndex(m=>m.id===editId);
    if(idx >= 0) memos[idx] = data;
  }else memos.push(data);

  persistMemos();
  dayOffset = calcDayOffsetFromDate(data.memoDate);
  updateDayLabel();
  closeModal();
  renderList(data.id);
}
function formatCombinedLine(m){
  const v7cIn = (m["INBOUND-7C"] || "").trim();
  const v7cOut = (m["OUTBOUND-7C"] || "").trim();
  const v7c = v7cIn || v7cOut || "";
  const vhl = (m.sharedHL || "").trim();
  const hash = (m.sharedHASH || "").trim();
  return `7C[${v7c}] HL[${vhl}] #[${hash}]`;
}
function formatSplitLine(m, type){
  const v7c = (m[type+"-7C"] || "").trim();
  const vhl = (m.sharedHL || "").trim();
  const hash = (m.sharedHASH || "").trim();
  if(type === "INBOUND") return `7C[${v7c}] HL[${vhl}]`;
  return `7C[${v7c}] #[${hash}]`;
}
function renderList(flashId){
  memoList.innerHTML = "";
  const viewingDay = getViewingDayKey();
  const dayMemos = memos.filter(m => (m.dayKey || m.memoDate || todayStr()) === viewingDay).sort((a,b)=> Number(a.id) - Number(b.id));
  if(!dayMemos.length){
    memoList.innerHTML = `<div class="emptyDay">NO MEMO IN THIS DAY</div>`;
    return;
  }
  dayMemos.forEach(m=>{
    const hasIn = m.hasIn !== false;
    const hasOut = m.hasOut !== false;
    let linesHtml = "";
    if(hasIn && hasOut){
      linesHtml = `<div class="line"><div class="tagPill">IN</div><div class="textPill">${formatSplitLine(m, "INBOUND")}</div></div>
                   <div class="line"><div class="tagPill">OUT</div><div class="textPill">${formatSplitLine(m, "OUTBOUND")}</div></div>`;
    }else{
      const singleTag = hasIn ? "IN" : "OUT";
      linesHtml = `<div class="line"><div class="tagPill">${singleTag}</div><div class="textPill">${formatCombinedLine(m)}</div></div>`;
    }
    const card = document.createElement("div");
    card.className = "memoCard" + (m.id===flashId ? " flash" : "");
    card.innerHTML = `<div class="memoRow"><input class="selBox" type="checkbox" data-id="${m.id}"><div class="lines" data-open="${m.id}">${linesHtml}</div></div><div class="datePill">${m.memoDate || ""}</div>`;
    memoList.appendChild(card);
  });
  memoList.querySelectorAll("[data-open]").forEach(el=>{
    el.addEventListener("click", ()=>{ const id = Number(el.getAttribute("data-open")); editMemo(id); });
  });
}
function editMemo(id){
  const m = memos.find(x=>x.id===id);
  if(!m) return;
  editId = id;
  memoDate.value = m.memoDate || getViewingDayKey();
  pickInbound.checked = m.hasIn !== false;
  pickOutbound.checked = m.hasOut !== false;
  currentLirPhotos = { INBOUND: m["INBOUND-LIRPHOTO"] || "", OUTBOUND: m["OUTBOUND-LIRPHOTO"] || "" };
  rebuildSectionsFromMemo(m);
  document.querySelectorAll('input[data-k="SHARED-HL"]').forEach(el => el.value = m.sharedHL || "");
  document.querySelectorAll('input[data-k="SHARED-HASH"]').forEach(el => el.value = m.sharedHASH || "");
  openModal();
}
function deleteSelected(){
  const checks = document.querySelectorAll('.selBox:checked');
  const ids = [...checks].map(c=>Number(c.dataset.id));
  if(!ids.length){ alert("SELECT MEMO"); return; }
  memos = memos.filter(m=>!ids.includes(m.id));
  persistMemos();
  renderList();
}
function addPhoto(){ photoInput.value = ""; photoInput.click(); }
function loadImageFromFile(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>{
      const img = new Image();
      img.onload = ()=> resolve(img);
      img.onerror = ()=> reject(new Error("IMAGE LOAD FAIL"));
      img.src = String(reader.result || "");
    };
    reader.onerror = ()=> reject(new Error("FILE READ FAIL"));
    reader.readAsDataURL(file);
  });
}
function compressImageToDataUrl(img, maxW = 1600, maxH = 1600, quality = 0.82){
  const ratio = Math.min(maxW / img.width, maxH / img.height, 1);
  const w = Math.max(1, Math.round(img.width * ratio));
  const h = Math.max(1, Math.round(img.height * ratio));
  const canvas = document.createElement("canvas");
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext("2d");
  if(!ctx) throw new Error("CANVAS FAIL");
  ctx.drawImage(img, 0, 0, w, h);
  return canvas.toDataURL("image/jpeg", quality);
}
async function makeStablePhotoData(file){
  const img = await loadImageFromFile(file);
  const tries = [
    { maxW:1600, maxH:1600, quality:0.82 },
    { maxW:1600, maxH:1600, quality:0.70 },
    { maxW:1440, maxH:1440, quality:0.60 },
    { maxW:1280, maxH:1280, quality:0.52 },
    { maxW:1080, maxH:1080, quality:0.48 }
  ];
  for(const t of tries){
    const dataUrl = compressImageToDataUrl(img, t.maxW, t.maxH, t.quality);
    if(dataUrl.length < 3500000) return dataUrl;
  }
  return compressImageToDataUrl(img, 960, 960, 0.42);
}
async function savePhotoFile(file){
  try{
    const stableDataUrl = await makeStablePhotoData(file);
    localStorage.setItem(PHOTO_KEY, stableDataUrl);
    photo = stableDataUrl;
    photoImg.src = stableDataUrl;
    alert("PHOTO SAVED");
  }catch(err){
    console.error(err);
    alert("PHOTO SAVE FAIL");
  }
}
async function saveLirPhotoFile(file, type){
  try{
    const stableDataUrl = await makeStablePhotoData(file);
    currentLirPhotos[type] = stableDataUrl;
    alert("LIR PHOTO SAVED");
  }catch(err){
    console.error(err);
    alert("LIR PHOTO SAVE FAIL");
  }
}
photoInput.onchange = async (e)=>{ const file = e.target.files?.[0]; if(file) await savePhotoFile(file); };
lirPhotoInput.onchange = async (e)=>{ const file = e.target.files?.[0]; if(file && activeLirType) await saveLirPhotoFile(file, activeLirType); };
function openPhoto(){ if(!photo){ alert("NO PHOTO"); return; } photoImg.src = photo; photoLayer.style.display = "flex"; }
function closePhoto(){ photoLayer.style.display = "none"; }
function openEquip(){ equipModal.style.display = "flex"; equipModal.setAttribute("aria-hidden","false"); loadEquip(); }
function closeEquip(){ equipModal.style.display = "none"; equipModal.setAttribute("aria-hidden","true"); }
function loadEquip(){ const eq = JSON.parse(localStorage.getItem(EQUIP_KEY) || "{}"); tug1.value = eq.tug1 || ""; tug2.value = eq.tug2 || ""; belt.value = eq.belt || ""; updateEquipBadge(); }
function saveEquip(){ const eq = { tug1: onlyNum(tug1.value,2), tug2: onlyNum(tug2.value,2), belt: onlyNum(belt.value,2) }; localStorage.setItem(EQUIP_KEY, JSON.stringify(eq)); updateEquipBadge(); closeEquip(); }
function updateEquipBadge(){ const eq = JSON.parse(localStorage.getItem(EQUIP_KEY)||"{}"); const a = eq.tug1 || ""; const b = eq.tug2 || ""; const c = eq.belt || ""; if(!a && !b && !c){ equipBadge.style.display="none"; return; } equipBadge.style.display="block"; equipBadge.innerHTML=`<div class="b1">TUG ${a||'--'} / ${b||'--'}</div><div class="b2">BELT ${c||'--'}</div>`; }

function maybeShowNotice(){
  if(localStorage.getItem(NOTICE_KEY) === "1") return;
  noticeOverlay.style.display = "flex";
}
function closeNotice(){
  if(noticeHideChk.checked) localStorage.setItem(NOTICE_KEY, "1");
  noticeOverlay.style.display = "none";
}

updateDayLabel();
updateEquipBadge();
renderList();
maybeShowNotice();
</script>
