<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>JAS MEMO VER 4.2</title>

<style>
  :root{
    --bg1:#ff9800;
    --bg2:#ff7a1a;
    --card:#f6e7d7;
    --pill:#111;
    --shadow:0 14px 26px rgba(0,0,0,.18);
    --blue:#2f7df6;
    --red:#e20000;
    --line:#cfcfcf;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:-apple-system, system-ui, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    font-weight:700;
    background:radial-gradient(1200px 700px at 50% -10%, #ffd18a 0%, transparent 55%),
              linear-gradient(180deg,var(--bg1),var(--bg2));
    min-height:100vh;
    overflow-x:hidden;
  }

  header{
    text-align:center;
    padding:22px 14px 10px;
    user-select:none;
    cursor:pointer;
  }
  .titleWrap{
    display:flex;
    justify-content:center;
    align-items:baseline;
    gap:10px;
    flex-wrap:wrap;
  }
  .titleMain{
    font-size:42px;
    font-weight:1000;
    letter-spacing:-1px;
    color:#111;
    text-transform:uppercase;
  }
  .titleVer{
    font-size:18px;
    font-weight:1000;
    color:#111;
    opacity:.9;
    text-transform:uppercase;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:14px;
    padding:8px 14px 8px;
  }
  button{
    border:none;
    border-radius:22px;
    background:#fff;
    padding:14px 22px;
    font-weight:1000;
    color:var(--blue);
    font-size:18px;
    box-shadow:0 10px 20px rgba(0,0,0,.18);
    text-transform:uppercase;
  }
  button:active{transform:scale(.99)}

  #memoList{
    padding:10px 14px 110px;
    max-width:780px;
    margin:0 auto;
  }
  .memoCard{
    background:rgba(246,231,215,.92);
    border-radius:24px;
    padding:14px 12px;
    margin:12px 0;
    box-shadow:0 16px 26px rgba(0,0,0,.18);
    border:2px solid rgba(255,255,255,.45);
    overflow:hidden;
  }
  .memoRow{
    display:flex;
    gap:10px;
    align-items:flex-start;
  }
  .selBox{
    width:30px;
    height:30px;
    border-radius:10px;
    border:2px solid rgba(0,0,0,.25);
    background:#fff;
    appearance:none;
    margin-top:8px;
    flex:0 0 auto;
  }
  .selBox:checked{
    background:linear-gradient(#fff,#fff),
      radial-gradient(circle at 50% 50%, #222 0 40%, transparent 41%);
  }

  .lines{
    flex:1;
    display:flex;
    flex-direction:column;
    gap:10px;
    cursor:pointer;
    min-width:0;
  }
  .line{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }
  .tagPill{
    background:#111;
    color:#fff;
    border-radius:999px;
    padding:9px 12px;
    font-weight:1000;
    font-size:16px;
    min-width:70px;
    text-align:center;
    flex:0 0 auto;
    text-transform:uppercase;
  }
  .textPill{
    background:rgba(210,199,188,.45);
    border-radius:999px;
    padding:10px 14px;
    font-weight:1000;
    font-size:18px;
    color:#111;
    flex:1;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-transform:uppercase;
  }

  .flash{animation:flash .55s;}
  @keyframes flash{50%{transform:scale(1.01); filter:brightness(1.05)}}

  #equipBtn{
    position:fixed;
    left:14px;
    bottom:18px;
    z-index:20;
    border:none;
    border-radius:18px;
    background:#fff;
    padding:12px 18px;
    font-weight:1000;
    color:var(--blue);
    font-size:16px;
    box-shadow:0 12px 22px rgba(0,0,0,.18);
    text-transform:uppercase;
  }
  #equipBadge{
    position:fixed;
    right:14px;
    bottom:18px;
    z-index:20;
    background:rgba(0,0,0,.86);
    color:#fff;
    border-radius:20px;
    padding:12px 14px;
    font-weight:1000;
    line-height:1.15;
    text-align:right;
    min-width:190px;
    box-shadow:0 14px 26px rgba(0,0,0,.22);
    display:none;
    text-transform:uppercase;
  }
  #equipBadge .b1{font-size:18px;}
  #equipBadge .b2{font-size:18px; opacity:.95;}

  .modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.55);
    display:none;
    justify-content:center;
    align-items:flex-end;
    z-index:50;
    overscroll-behavior:contain;
    pointer-events:none;
  }
  .box{
    width:100%;
    max-width:820px;
    background:#fff;
    border-radius:26px 26px 0 0;
    padding:10px 14px 16px;
    max-height:92vh;
    overflow:auto;
    transform:translateY(0);
    will-change:transform;
    -webkit-overflow-scrolling:touch;
    pointer-events:auto;
  }

  .dragArea{
    padding:6px 0 8px;
    position:sticky;
    top:0;
    background:#fff;
    z-index:2;
  }
  .drag-handle{
    width:60px;
    height:7px;
    background:#cfcfcf;
    border-radius:999px;
    margin:0 auto;
  }

  .modalTitleTap{
    text-align:center;
    font-weight:1000;
    color:#111;
    padding:6px 0 10px;
    cursor:pointer;
    user-select:none;
    text-transform:uppercase;
  }
  .modalTitleTap .m1{font-size:18px;}
  .modalTitleTap .m2{font-size:12px; opacity:.55; margin-top:2px;}

  .check-line{
    display:flex;
    justify-content:center;
    gap:18px;
    align-items:center;
    padding:6px 0 10px;
    white-space:nowrap;
    text-transform:uppercase;
  }
  .check-line label{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:16px;
    font-weight:1000;
  }
  .check-line input[type="checkbox"]{
    width:22px;height:22px;
    accent-color:var(--blue);
  }

  .section{
    background:#f2f2f2;
    border-radius:16px;
    padding:12px 12px;
    margin:10px 0;
    overflow:hidden;
    border:1px solid #e6e6e6;
  }
  .sectionHead{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    gap:10px;
  }
  .sectionTitle{
    font-size:24px;
    font-weight:1000;
    letter-spacing:.3px;
    text-transform:uppercase;
  }

  .timeWrap{
    display:flex;
    align-items:baseline;
    gap:10px;
    white-space:nowrap;
    text-transform:uppercase;
  }
  .timeBtn{
    border:none;
    background:transparent;
    box-shadow:none;
    padding:4px 8px;
    margin:0;
    font-weight:1000;
    font-size:16px;
    color:#111;
    border-radius:10px;
    text-transform:uppercase;
  }
  .timeBtn:active{background:rgba(226,27,27,.08);}
  .timeVal{
    font-weight:1000;
    font-size:22px;
    color:var(--red);
    min-width:64px;
    text-align:right;
    font-variant-numeric: tabular-nums;
  }

  .row{
    display:flex;
    align-items:center;
    gap:10px;
    margin:10px 0;
    flex-wrap:nowrap;
    min-width:0;
  }
  .lab{
    font-size:20px;
    font-weight:1000;
    min-width:40px;
    color:#111;
    white-space:nowrap;
    text-transform:uppercase;
  }

  /* ✅✅ 숫자 안 짤리는 핵심 세팅 */
  input, textarea, select{
    font-family:inherit;
    font-size:16px;
    font-weight:1000;
    border:2px solid var(--line);
    border-radius:16px;
    outline:none;
    background:#fff;
    -webkit-text-size-adjust:100%;
    font-variant-numeric: tabular-nums;
    text-transform:uppercase;
  }
  input{
    width:100%;
    height:54px;            /* ✅ 조금 키움 */
    line-height:54px;       /* ✅ 높이랑 동일 */
    padding:0 10px;         /* ✅ 위/아래 0 */
    text-align:center;
  }
  textarea{
    width:100%;
    height:76px;
    resize:none;
    font-weight:800;
    padding:10px 10px;
    text-transform:none; /* NOTE는 대문자 강제 안함 */
  }
  select{
    height:54px;
    padding:0 10px;
  }

  /* 숫자 입력 박스(7C/HL/#/T/D/BB/TT/TB)는 살짝 줄여서 끝까지 보이게 */
  .numBox{
    font-size:18px;        /* ✅ 숫자 크기 */
    letter-spacing:.6px;
  }

  .long{
    flex:1;
    min-width:0;
    font-size:16px;
    font-weight:1000;
    padding-left:14px;
    text-align:left;
  }

  .extraBox{
    background:#fff;
    border:2px solid #e2e2e2;
    border-radius:16px;
    padding:12px;
    margin-top:10px;
  }
  .extraHead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:10px;
    text-transform:uppercase;
  }
  .extraTitle{
    font-size:20px;
    font-weight:1000;
    letter-spacing:.4px;
  }
  .iconBtn{
    width:48px;
    height:48px;
    border-radius:16px;
    border:none;
    background:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.10);
    color:var(--blue);
    font-size:28px;
    font-weight:1000;
    text-transform:uppercase;
  }
  .extraRow{
    display:flex;
    gap:10px;
    align-items:center;
    margin-top:10px;
  }
  .extraRow select{
    width:130px;
    font-size:16px;
    font-weight:1000;
  }
  .extraRow input{
    width:130px;
    font-size:18px;
  }
  .minusBtn{
    width:60px;
    height:54px;
    border-radius:16px;
    border:none;
    background:#eef1f7;
    color:var(--blue);
    font-weight:1000;
    font-size:22px;
    box-shadow:none;
    text-transform:uppercase;
  }

  .bottomBtns{
    display:flex;
    gap:18px;
    padding:12px 6px 0;
    justify-content:flex-start;
    text-transform:uppercase;
  }
  .bottomBtns button{
    padding:10px 14px;
    font-size:16px;
    box-shadow:none;
    border-radius:14px;
  }

  #photoLayer{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:90;
  }
  #photoLayer img{max-width:100%;max-height:100%;}

  .rowGrid3{
    display:grid;
    grid-template-columns: 34px 1fr 34px 1fr 14px .95fr;
    gap:10px;
    align-items:center;
    margin:10px 0;
    min-width:0;
  }
  .rowGridTDBB{
    display:grid;
    grid-template-columns: 18px 1fr 18px .9fr 26px .9fr;
    gap:10px;
    align-items:center;
    margin:10px 0;
    min-width:0;
  }
</style>
</head>

<body>

<header id="homeHeader" onclick="openPhoto()" ondblclick="openPhoto()">
  <div class="titleWrap">
    <div class="titleMain">JAS MEMO</div>
    <div class="titleVer">VER 4.2</div>
  </div>
</header>

<div class="controls">
  <button type="button" onclick="newMemo()">ADD</button>
  <button type="button" onclick="deleteSelected()">DELETE</button>
  <button type="button" onclick="addPhoto()">PHOTO</button>
</div>

<div id="memoList"></div>

<button id="equipBtn" type="button" onclick="openEquip()">EQUIPMENT</button>
<div id="equipBadge"></div>

<input type="file" id="photoInput" accept="image/*" hidden />

<div class="modal" id="modal" aria-hidden="true">
  <div class="box" id="sheet" role="dialog" aria-modal="true">
    <div class="dragArea" id="dragArea">
      <div class="drag-handle"></div>
    </div>

    <div class="modalTitleTap" onclick="openPhoto()">
      <div class="m1">JAS MEMO</div>
      <div class="m2">TAP TO OPEN PHOTO</div>
    </div>

    <div class="check-line">
      <label><input type="checkbox" id="inChk"> INBOUND</label>
      <label><input type="checkbox" id="outChk"> OUTBOUND</label>
    </div>

    <div id="sections"></div>

    <div class="bottomBtns">
      <button type="button" onclick="saveMemo()">SAVE</button>
      <button type="button" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<div id="photoLayer" ondblclick="closePhoto()" onclick="closePhoto()">
  <img id="photoImg" alt="photo" />
</div>

<div class="modal" id="equipModal" aria-hidden="true">
  <div class="box" style="max-height:70vh" onclick="event.stopPropagation()">
    <div class="dragArea">
      <div class="drag-handle"></div>
    </div>

    <div style="font-weight:1000;font-size:20px;margin:6px 0 12px; text-transform:uppercase;">EQUIPMENT</div>

    <div class="row">
      <div class="lab" style="min-width:72px;">TUG</div>
      <input id="tug1" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
      <input id="tug2" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>

    <div class="row">
      <div class="lab" style="min-width:72px;">BELT</div>
      <input id="belt" class="numBox" inputmode="numeric" maxlength="2" placeholder="00">
    </div>

    <div class="bottomBtns">
      <button type="button" onclick="saveEquip()">SAVE</button>
      <button type="button" onclick="closeEquip()">CLOSE</button>
    </div>
  </div>
</div>

<script>
  const modal = document.getElementById("modal");
  const sheet = document.getElementById("sheet");
  const dragArea = document.getElementById("dragArea");
  const sections = document.getElementById("sections");
  const memoList = document.getElementById("memoList");
  const photoInput = document.getElementById("photoInput");
  const photoLayer = document.getElementById("photoLayer");
  const photoImg = document.getElementById("photoImg");
  const inChk = document.getElementById("inChk");
  const outChk = document.getElementById("outChk");

  const equipBtn = document.getElementById("equipBtn");
  const equipBadge = document.getElementById("equipBadge");
  const equipModal = document.getElementById("equipModal");
  const tug1 = document.getElementById("tug1");
  const tug2 = document.getElementById("tug2");
  const belt = document.getElementById("belt");

  let memos = JSON.parse(localStorage.getItem("jas_memos") || "[]");
  let photo = localStorage.getItem("jas_photo");
  let editId = null;

  const EXTRA_KEYS = ["W","C","COB","STRAP","GB","TS","EMS"];

  function onlyNum(val, len){
    return (val || "").replace(/[^0-9]/g, "").slice(0, len);
  }
  function pad(val, len){
    const v = onlyNum(val, len);
    return v ? v.padStart(len, "0") : "";
  }
  function nowTime(){
    const d = new Date();
    return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }

  function syncByDataK(dataK, value){
    document.querySelectorAll(`input[data-k="${dataK}"]`).forEach(el=>{
      if(el !== document.activeElement) el.value = value;
    });
  }

  /* ✅ 숫자 입력 제한 + HL/# 완전공유(양방향) */
  document.addEventListener("input", (e)=>{
    const t = e.target;
    if(!(t instanceof HTMLInputElement)) return;
    const k = t.dataset.k || "";
    if(!k) return;

    // shared
    if(k === "SHARED-HL"){
      t.value = onlyNum(t.value, 4);
      syncByDataK("SHARED-HL", t.value);
      return;
    }
    if(k === "SHARED-HASH"){
      t.value = onlyNum(t.value, 3);
      syncByDataK("SHARED-HASH", t.value);
      return;
    }

    if(k.endsWith("-c7")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-t")) t.value = onlyNum(t.value, 3);
    if(k.endsWith("-d")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-bb")) t.value = onlyNum(t.value, 2);
    if(k.endsWith("-tt")) t.value = onlyNum(t.value, 4);
    if(k.endsWith("-tb")) t.value = onlyNum(t.value, 4);
    if(k.startsWith("extraVal-")) t.value = onlyNum(t.value, 3);
  });

  function makeSection(type, memoData){
    const d = document.createElement("div");
    d.className = "section";

    const savedTime = memoData ? (memoData[type+"-TIME"] || "") : "";

    const cmpt1Default = memoData ? (memoData[type+"-cmpt1"] || "F") : "F";
    const cmpt2Default = memoData ? (memoData[type+"-cmpt2"] || "F") : "F";

    const sharedHL = memoData ? (memoData.sharedHL || "") : "";
    const sharedHASH = memoData ? (memoData.sharedHASH || "") : "";

    d.innerHTML = `
      <div class="sectionHead">
        <div class="sectionTitle">${type}</div>
        <div class="timeWrap">
          <button type="button" class="timeBtn" data-timebtn="${type}">TIME</button>
          <div class="timeVal" id="${type}-TIMESHOWN">${savedTime}</div>
        </div>
      </div>

      <div class="rowGrid3">
        <div class="lab">7C</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-c7">
        <div class="lab">HL</div>
        <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="SHARED-HL" value="${sharedHL}">
        <div class="lab">#</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="SHARED-HASH" value="${sharedHASH}">
      </div>

      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 1</div>
        <input class="long" data-k="${type}-cmpt1" placeholder="TEXT" value="${cmpt1Default}">
      </div>
      <div class="row">
        <div class="lab" style="min-width:96px;">CMPT 2</div>
        <input class="long" data-k="${type}-cmpt2" placeholder="TEXT" value="${cmpt2Default}">
      </div>
      ${[3,4].map(i=>`
        <div class="row">
          <div class="lab" style="min-width:96px;">CMPT ${i}</div>
          <input class="long" data-k="${type}-cmpt${i}" placeholder="TEXT">
        </div>
      `).join("")}

      <div class="rowGridTDBB">
        <div class="lab">T</div>
        <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="${type}-t">
        <div class="lab">D</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-d">
        <div class="lab">BB</div>
        <input class="numBox" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type}-bb">
      </div>

      ${type==="OUTBOUND" ? `
        <div class="row">
          <div class="lab" style="min-width:60px;">T/T</div>
          <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tt">
          <div class="lab" style="min-width:60px;">T/B</div>
          <input class="numBox" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type}-tb">
        </div>
      ` : ""}

      <div class="extraBox">
        <div class="extraHead">
          <div class="extraTitle">EXTRA</div>
          <button type="button" class="iconBtn" onclick="addExtraRow('${type}')">+</button>
        </div>
        <div id="${type}-EXTRAS"></div>
      </div>

      <textarea data-k="${type}-note" placeholder="NOTE (${type})"></textarea>
    `;

    const timeBtn = d.querySelector(`[data-timebtn="${type}"]`);
    const timeShown = d.querySelector(`#${type}-TIMESHOWN`);
    timeBtn.addEventListener("click", ()=>{ timeShown.textContent = nowTime(); });
    timeBtn.addEventListener("dblclick", ()=>{
      const cur = timeShown.textContent || nowTime();
      const t = prompt("TIME (HH:MM 24H)", cur);
      if(t) timeShown.textContent = t;
    });

    const extrasBox = d.querySelector(`#${type}-EXTRAS`);
    const extras = memoData ? (memoData[type+"-EXTRAS"] || []) : [];
    extras.forEach(ex=>extrasBox.appendChild(makeExtraRow(type, ex.key, ex.val)));

    return d;
  }

  function makeExtraRow(type, key="W", val=""){
    const row = document.createElement("div");
    row.className = "extraRow";
    row.innerHTML = `
      <select>
        ${EXTRA_KEYS.map(k=>`<option value="${k}" ${k===key?"selected":""}>${k}</option>`).join("")}
      </select>
      <input class="numBox" inputmode="numeric" maxlength="3" placeholder="000" data-k="extraVal-${type}" value="${onlyNum(val,3)}">
      <button type="button" class="minusBtn" onclick="this.parentElement.remove()">-</button>
    `;
    return row;
  }

  function addExtraRow(type){
    const box = document.getElementById(type+"-EXTRAS");
    if(!box) return;
    box.appendChild(makeExtraRow(type, "W", ""));
  }

  inChk.onchange = outChk.onchange = ()=>{
    // 체크 바꾸면 “새 작성” 화면으로 렌더
    const keepHL = document.querySelector(`input[data-k="SHARED-HL"]`)?.value || "";
    const keepHASH = document.querySelector(`input[data-k="SHARED-HASH"]`)?.value || "";

    sections.innerHTML = "";
    if(inChk.checked) sections.appendChild(makeSection("INBOUND", {sharedHL: keepHL, sharedHASH: keepHASH}));
    if(outChk.checked) sections.appendChild(makeSection("OUTBOUND", {sharedHL: keepHL, sharedHASH: keepHASH}));

    // 양쪽에 똑같이 유지
    syncByDataK("SHARED-HL", keepHL);
    syncByDataK("SHARED-HASH", keepHASH);
  };

  function newMemo(){
    editId = null;
    inChk.checked = false;
    outChk.checked = false;
    sections.innerHTML = "";
    openModal();
  }

  function openModal(){
    modal.style.display = "flex";
    modal.setAttribute("aria-hidden","false");
    equipBtn.style.display = "none";
    equipBadge.style.display = "none";
    sheet.style.transform = "translateY(0)";
    currentTranslate = 0;
  }

  function closeModal(){
    modal.style.display = "none";
    modal.setAttribute("aria-hidden","true");
    editId = null;
    equipBtn.style.display = "block";
    updateEquipBadge();
  }

  function saveMemo(){
    const data = { id: editId ?? Date.now() };
    data.hasIn = inChk.checked;
    data.hasOut = outChk.checked;

    // ✅ 공유 HL/# 저장 (항상 동일)
    data.sharedHL = pad(document.querySelector(`input[data-k="SHARED-HL"]`)?.value || "", 4);
    data.sharedHASH = pad(document.querySelector(`input[data-k="SHARED-HASH"]`)?.value || "", 3);

    const normalizeF = (v)=> (v && v.trim() ? v : "F");

    ["INBOUND","OUTBOUND"].forEach(type=>{
      const enabled = (type==="INBOUND") ? data.hasIn : data.hasOut;
      if(!enabled) return;

      const g = (k)=>document.querySelector(`[data-k="${type}-${k}"]`);

      data[type+"-c7"]   = pad(g("c7")?.value, 4);

      data[type+"-t"]  = pad(g("t")?.value, 3);
      data[type+"-d"]  = pad(g("d")?.value, 2);
      data[type+"-bb"] = pad(g("bb")?.value, 2);

      data[type+"-cmpt1"] = normalizeF(document.querySelector(`[data-k="${type}-cmpt1"]`)?.value || "");
      data[type+"-cmpt2"] = normalizeF(document.querySelector(`[data-k="${type}-cmpt2"]`)?.value || "");
      [3,4].forEach(i=>{
        data[type+`-cmpt${i}`] = document.querySelector(`[data-k="${type}-cmpt${i}"]`)?.value || "";
      });

      if(type==="OUTBOUND"){
        data[type+"-tt"] = pad(g("tt")?.value, 4);
        data[type+"-tb"] = pad(g("tb")?.value, 4);
      }

      data[type+"-note"] = document.querySelector(`[data-k="${type}-note"]`)?.value || "";

      const shown = document.getElementById(type+"-TIMESHOWN");
      data[type+"-TIME"] = shown ? (shown.textContent || "") : "";

      const extras = [];
      const box = document.getElementById(type+"-EXTRAS");
      if(box){
        [...box.querySelectorAll(".extraRow")].forEach(r=>{
          const key = (r.querySelector("select")?.value || "").toUpperCase();
          const val = pad(r.querySelector("input")?.value || "", 3);
          if(key && val) extras.push({key, val});
        });
      }
      data[type+"-EXTRAS"] = extras;
    });

    if(editId){
      const idx = memos.findIndex(m=>m.id===editId);
      if(idx>=0) memos[idx] = data;
    }else{
      memos.push(data);
    }

    localStorage.setItem("jas_memos", JSON.stringify(memos));
    closeModal();
    renderList(data.id);
  }

  function renderList(flashId){
    memoList.innerHTML = "";
    memos.forEach(m=>{
      const card = document.createElement("div");
      card.className = "memoCard" + (m.id===flashId ? " flash" : "");

      const hl = m.sharedHL || "";
      const hash = m.sharedHASH || "";

      const inText = `IN 7C[${m["INBOUND-c7"]||""}] HL[${hl}] #[${hash}]`;
      const outText = `OUT 7C[${m["OUTBOUND-c7"]||""}] HL[${hl}] #[${hash}]`;

      let lines = "";
      if(m.hasIn){
        lines += `<div class="line"><div class="tagPill">IN</div><div class="textPill">${inText}</div></div>`;
      }
      if(m.hasOut){
        lines += `<div class="line"><div class="tagPill">OUT</div><div class="textPill">${outText}</div></div>`;
      }
      if(!m.hasIn && !m.hasOut){
        lines = `<div class="line"><div class="tagPill">IN</div><div class="textPill">EMPTY</div></div>`;
      }

      card.innerHTML = `
        <div class="memoRow">
          <input class="selBox" type="checkbox" data-id="${m.id}">
          <div class="lines" data-open="${m.id}">${lines}</div>
        </div>
      `;
      memoList.appendChild(card);
    });

    // ✅ 클릭 이벤트로 열기 (onclick 문자열보다 안전)
    memoList.querySelectorAll("[data-open]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const id = Number(el.getAttribute("data-open"));
        editMemo(id);
      });
    });
  }

  function editMemo(id){
    const m = memos.find(x=>x.id===id);
    if(!m) return;

    editId = id;
    inChk.checked = !!m.hasIn;
    outChk.checked = !!m.hasOut;

    sections.innerHTML = "";
    if(inChk.checked) sections.appendChild(makeSection("INBOUND", m));
    if(outChk.checked) sections.appendChild(makeSection("OUTBOUND", m));

    openModal();

    setTimeout(()=>{
      ["INBOUND","OUTBOUND"].forEach(type=>{
        const enabled = (type==="INBOUND") ? m.hasIn : m.hasOut;
        if(!enabled) return;

        const setV=(k,val)=>{
          const el = document.querySelector(`[data-k="${type}-${k}"]`);
          if(el) el.value = val || "";
        };

        setV("c7", m[type+"-c7"]);
        setV("t",  m[type+"-t"]);
        setV("d",  m[type+"-d"]);
        setV("bb", m[type+"-bb"]);

        const c1 = document.querySelector(`[data-k="${type}-cmpt1"]`);
        const c2 = document.querySelector(`[data-k="${type}-cmpt2"]`);
        if(c1) c1.value = (m[type+"-cmpt1"] && m[type+"-cmpt1"].trim()) ? m[type+"-cmpt1"] : "F";
        if(c2) c2.value = (m[type+"-cmpt2"] && m[type+"-cmpt2"].trim()) ? m[type+"-cmpt2"] : "F";

        [3,4].forEach(i=>{
          const el = document.querySelector(`[data-k="${type}-cmpt${i}"]`);
          if(el) el.value = m[type+`-cmpt${i}`] || "";
        });

        if(type==="OUTBOUND"){
          setV("tt", m[type+"-tt"]);
          setV("tb", m[type+"-tb"]);
        }

        const note = document.querySelector(`[data-k="${type}-note"]`);
        if(음표) note.value = m[type+"-note"] || "";

        const shown = document.getElementById(type+"-TIMESHOWN");
        if(shown) shown.textContent = m[type+"-TIME"] || "";
      });

      // ✅ 공유 HL/# 화면 반영 (양쪽 항상 동일)
      syncByDataK("SHARED-HL", m.sharedHL || "");
      syncByDataK("SHARED-HASH", m.sharedHASH || "");
    }, 30);
  }

  function deleteSelected(){
    const checks = document.querySelectorAll('.selBox:checked');
    const ids = [...checks].map(c=>Number(c.dataset.id));
    memos = memos.filter(m=>!ids.includes(m.id));
    localStorage.setItem("jas_memos", JSON.stringify(memos));
    renderList();
  }

  /* PHOTO */
  function addPhoto(){ photoInput.value=""; photoInput.click(); }
  photoInput.onchange = (e)=>{
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{
      photo = r.result;
      localStorage.setItem("jas_photo", photo);
    };
    r.readAsDataURL(f);
  };
  function openPhoto(){
    if(!photo) return;
    photoImg.src = photo;
    photoLayer.style.display = "flex";
  }
  function closePhoto(){ photoLayer.style.display = "none"; }

  /* EQUIP */
  function openEquip(){
    const eq = JSON.parse(localStorage.getItem("jas_equipment") || "{}");
    tug1.value = pad(eq.tug1,2);
    tug2.value = pad(eq.tug2,2);
    belt.value = pad(eq.belt,2);
    equipModal.style.display = "flex";
    equipModal.setAttribute("aria-hidden","false");
  }
  function closeEquip(){
    equipModal.style.display = "none";
    equipModal.setAttribute("aria-hidden","true");
  }
  function saveEquip(){
    const eq = { tug1: pad(tug1.value,2), tug2: pad(tug2.value,2), belt: pad(belt.value,2) };
    localStorage.setItem("jas_equipment", JSON.stringify(eq));
    updateEquipBadge();
    closeEquip();
  }
  function updateEquipBadge(){
    const eq = JSON.parse(localStorage.getItem("jas_equipment") || "{}");
    if(!eq.tug1 && !eq.tug2 && !eq.belt){
      equipBadge.style.display = "none";
      return;
    }
    const t1 = eq.tug1 || "00";
    const t2 = eq.tug2 || "00";
    const b  = eq.belt || "00";
    equipBadge.innerHTML = `
      <div class="b1">TUG ${t1}/${t2}</div>
      <div class="b2">BELT ${b}</div>
    `;
    equipBadge.style.display = "block";
  }

  equipModal.addEventListener("click",(e)=>{
    if(e.target === equipModal) closeEquip();
  });

  /* DRAG TO CLOSE */
  let startY = 0;
  let currentTranslate = 0;
  let dragging = false;

  function onStart(y){
    dragging = true;
    startY = y;
    sheet.style.transition = "none";
  }
  function onMove(y){
    if(!dragging) return;
    const dy = Math.max(0, y - startY);
    currentTranslate = dy;
    sheet.style.transform = `translateY(${dy}px)`;
  }
  function onEnd(){
    if(!dragging) return;
    dragging = false;
    sheet.style.transition = "transform .18s ease";
    if(currentTranslate > 140){
      closeModal();
    }else{
      sheet.style.transform = "translateY(0)";
      currentTranslate = 0;
    }
  }

  dragArea.addEventListener("touchstart", (e)=> onStart(e.touches[0].clientY), {passive:true});
  dragArea.addEventListener("touchmove",  (e)=> onMove(e.touches[0].clientY),  {passive:true});
  dragArea.addEventListener("touchend",   ()=> onEnd());

  dragArea.addEventListener("mousedown", (e)=> onStart(e.clientY));
  window.addEventListener("mousemove", (e)=> onMove(e.clientY));
  window.addEventListener("mouseup", ()=> onEnd());

  /* INIT */
  renderList();
  updateEquipBadge();
</script>

</body>
</html>
