<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>JAS MEMO VER 4.2</title>

<style>
  :root{
    --bg1:#ffb43a;
    --bg2:#f08b2a;
    --bg3:#ef7a21;

    --ink:#111;
    --line:#cfcfcf;
    --shadow:0 10px 26px rgba(0,0,0,.18);
    --shadow2:0 14px 40px rgba(0,0,0,.22);
    --blue:#2f80ed;
    --red:#e21b1b;

    /* 전체 UI 20% 작게 */
    --ui:.80;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:-apple-system,system-ui,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--bg1) 0%, var(--bg2) 55%, var(--bg3) 100%);
    overflow-x:hidden;
    font-weight:900;
  }

  header{
    padding: calc(18px * var(--ui)) calc(12px * var(--ui)) calc(10px * var(--ui));
    text-align:center;
    user-select:none;
    cursor:pointer;
  }
  .titleLine{display:inline-flex;align-items:flex-end;gap:calc(10px * var(--ui));}
  .titleMain{
    font-weight:950;letter-spacing:.5px;
    font-size:clamp(28px, 7vw, 46px);
    line-height:1;
    text-transform:uppercase;
  }
  .titleVer{
    font-weight:950;
    font-size:clamp(14px, 3.6vw, 22px);
    opacity:.95;
    line-height:1;
    transform:translateY(-2px);
    text-transform:uppercase;
  }

  .controls{
    display:flex;
    justify-content:center;
    gap:calc(14px * var(--ui));
    padding: calc(6px * var(--ui)) calc(12px * var(--ui)) calc(14px * var(--ui));
  }
  .btnTop{
    border:0;border-radius:18px;background:#fff;
    padding: calc(12px * var(--ui)) calc(18px * var(--ui));
    font-weight:950;letter-spacing:.3px;color:var(--blue);
    box-shadow:var(--shadow);
    font-size:calc(18px * var(--ui));
    text-transform:uppercase;
  }
  .btnTop:active{transform:scale(.98);}

  #memoList{padding:calc(4px * var(--ui)) calc(10px * var(--ui)) 120px;}
  .memoCard{
    background:rgba(246,234,220,.92);
    border-radius:22px;
    padding:calc(12px * var(--ui));
    box-shadow:var(--shadow2);
    border:2px solid rgba(255,255,255,.35);
    margin:calc(10px * var(--ui)) auto;
    max-width:860px;
  }
  .memoInner{
    background:rgba(255,255,255,.20);
    border-radius:18px;
    padding:calc(10px * var(--ui));
    border:2px solid rgba(255,255,255,.35);
  }
  .memoRow{display:flex;align-items:flex-start;gap:calc(10px * var(--ui));}
  .memoChk{
    width:calc(26px * var(--ui));height:calc(26px * var(--ui));
    border-radius:8px;accent-color:#111;flex:0 0 auto;margin-top:2px;
  }
  .pillCol{display:flex;flex-direction:column;gap:calc(8px * var(--ui));width:74px;flex:0 0 auto;}
  .pill{
    background:#111;color:#fff;border-radius:999px;
    padding:calc(8px * var(--ui)) 0;text-align:center;
    font-weight:950;letter-spacing:.6px;font-size:calc(14px * var(--ui));
    text-transform:uppercase;
  }
  .linesCol{display:flex;flex-direction:column;gap:calc(8px * var(--ui));flex:1 1 auto;min-width:0;}
  .chip{
    background:rgba(0,0,0,.08);
    border-radius:999px;
    padding:calc(9px * var(--ui)) calc(12px * var(--ui));
    font-weight:950;
    font-size:calc(16px * var(--ui));
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    text-transform:uppercase;
  }
  .memoClick{cursor:pointer;}
  .flash{animation:flash .55s;}
  @keyframes flash{50%{transform:scale(1.01);filter:brightness(1.06);} }

  #equipBtn{
    position:fixed;left:14px;bottom:14px;z-index:50;
    border:0;border-radius:18px;background:#fff;
    padding:calc(12px * var(--ui)) calc(14px * var(--ui));
    font-weight:950;color:var(--blue);
    box-shadow:var(--shadow);
    font-size:calc(16px * var(--ui));
    text-transform:uppercase;
  }
  #equipBtn:active{transform:scale(.98);}
  #equipBadge{
    position:fixed;right:14px;bottom:14px;z-index:50;
    background:rgba(0,0,0,.86);color:#fff;border-radius:18px;
    padding:calc(12px * var(--ui)) calc(14px * var(--ui));
    font-weight:950;box-shadow:0 16px 40px rgba(0,0,0,.26);
    text-align:right;line-height:1.05;min-width:170px;
    display:none;text-transform:uppercase;
  }
  #equipBadge .b1{font-size:calc(22px * var(--ui));}
  #equipBadge .b2{font-size:calc(20px * var(--ui));opacity:.95;}

  .modal{
    position:fixed;inset:0;background:rgba(0,0,0,.45);
    display:none;justify-content:center;align-items:flex-end;z-index:80;
    overscroll-behavior:contain;
  }
  .sheet{
    width:100%;max-width:980px;background:#fff;
    border-radius:22px 22px 0 0;
    max-height:92vh;overflow:auto;
    box-shadow:0 -16px 48px rgba(0,0,0,.35);
    padding:calc(10px * var(--ui)) calc(12px * var(--ui)) calc(18px * var(--ui));
    transform:translateY(0);
    touch-action:pan-y;
    -webkit-overflow-scrolling:touch;
  }
  .handleWrap{display:flex;justify-content:center;padding:calc(6px * var(--ui)) 0 calc(8px * var(--ui));cursor:grab;}
  .handle{width:64px;height:7px;border-radius:999px;background:#d9d9d9;}

  .sheetTop{
    text-align:center;
    padding:calc(6px * var(--ui)) 0 calc(10px * var(--ui));
    user-select:none;cursor:pointer;
  }
  .sheetTop .mTitle{font-weight:950;font-size:calc(22px * var(--ui));letter-spacing:.2px;text-transform:uppercase;}
  .sheetTop .mHint{font-weight:950;font-size:calc(12px * var(--ui));color:#666;opacity:.7;margin-top:4px;text-transform:uppercase;}

  .checkLine{
    display:flex;justify-content:center;gap:calc(18px * var(--ui));align-items:center;
    padding:calc(6px * var(--ui)) 0 calc(8px * var(--ui));
    font-weight:950;font-size:calc(16px * var(--ui));white-space:nowrap;text-transform:uppercase;
  }
  .checkLine label{display:flex;gap:calc(8px * var(--ui));align-items:center;white-space:nowrap;}
  .checkLine input{width:calc(22px * var(--ui));height:calc(22px * var(--ui));accent-color:var(--blue);}

  .section{
    background:#f2f2f2;border-radius:16px;padding:calc(12px * var(--ui));
    margin:calc(10px * var(--ui)) 0;border:1px solid #e5e5e5;
  }
  .secHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:calc(10px * var(--ui));gap:12px;}
  .secTitle{font-size:calc(28px * var(--ui));font-weight:950;letter-spacing:.2px;text-transform:uppercase;}
  .timeArea{display:flex;align-items:baseline;gap:calc(10px * var(--ui));font-weight:950;white-space:nowrap;text-transform:uppercase;}
  .timeBtn{
    border:0;background:transparent;color:#111;
    font-weight:950;font-size:calc(20px * var(--ui));
    padding:calc(4px * var(--ui)) calc(6px * var(--ui));
    border-radius:10px;text-transform:uppercase;
  }
  .timeBtn:active{background:rgba(0,0,0,.06);}
  .timeValue{
    font-size:calc(30px * var(--ui));
    color:var(--red);
    letter-spacing:.6px;
    min-width:72px;
    text-align:right;
    font-variant-numeric:tabular-nums;
  }

  input,textarea,select,button{font-family:inherit;}
  input[type="text"],textarea{
    width:100%;
    border-radius:18px;border:2px solid var(--line);
    padding:calc(12px * var(--ui)) calc(12px * var(--ui));
    font-weight:950;
    font-size:calc(22px * var(--ui));
    outline:none;background:#fff;min-width:0;
    line-height:1.15;
    font-variant-numeric:tabular-nums;
    text-transform:uppercase;
  }
  textarea{
    height:calc(90px * var(--ui));
    resize:none;font-weight:900;font-size:calc(18px * var(--ui));
  }
  input::placeholder{color:#bdbdbd;font-weight:950;}
  .num{text-align:center;letter-spacing:.6px;}

  /* 7C HL # 한줄 (공유 HL/HASH) */
  .grid7{
    display:grid;
    grid-template-columns:46px minmax(0,1fr) 46px minmax(0,1fr) 22px minmax(0,.85fr);
    gap:calc(10px * var(--ui));
    align-items:center;
    margin-bottom:calc(12px * var(--ui));
  }
  .grid7 .lbl{font-weight:950;font-size:calc(22px * var(--ui));white-space:nowrap;text-transform:uppercase;}

  /* T D BB 한줄 */
  .gridTDBB{
    display:grid;
    grid-template-columns:26px minmax(0,1fr) 26px minmax(0,.85fr) 42px minmax(0,.85fr);
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0 calc(10px * var(--ui));
  }
  .gridTDBB .lbl{font-weight:950;font-size:calc(22px * var(--ui));white-space:nowrap;text-transform:uppercase;}

  /* ✅ T/T T/B 무조건 한줄 */
  .gridTTTB{
    display:grid;
    grid-template-columns:46px minmax(0,1fr) 46px minmax(0,1fr);
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0 calc(6px * var(--ui));
  }
  .gridTTTB .lbl{font-weight:950;font-size:calc(22px * var(--ui));white-space:nowrap;text-transform:uppercase;}

  .cmptRow{
    display:grid;
    grid-template-columns:110px 1fr;
    gap:calc(10px * var(--ui));
    align-items:center;
    margin:calc(10px * var(--ui)) 0;
  }
  .cmptLbl{font-size:calc(22px * var(--ui));font-weight:950;white-space:nowrap;text-transform:uppercase;}
  .cmptInput{font-size:calc(20px * var(--ui));text-align:left;letter-spacing:.2px;}

  .extraBox{
    background:#fff;border:2px solid #e7e7e7;border-radius:18px;
    padding:calc(12px * var(--ui));margin-top:calc(12px * var(--ui));
  }
  .extraHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:calc(10px * var(--ui));}
  .extraTitle{font-weight:950;font-size:calc(24px * var(--ui));text-transform:uppercase;}
  .extraPlus{
    width:calc(56px * var(--ui));height:calc(56px * var(--ui));
    border:0;border-radius:18px;background:#fff;
    box-shadow:0 8px 18px rgba(0,0,0,.10);
    color:var(--blue);font-weight:950;font-size:calc(32px * var(--ui));line-height:1;
  }
  .extraList{display:flex;flex-direction:column;gap:calc(10px * var(--ui));}
  .extraRow{
    display:grid;
    grid-template-columns:1fr minmax(0,1fr) 64px;
    gap:calc(10px * var(--ui));
    align-items:center;
  }
  select{
    width:100%;
    border-radius:18px;border:2px solid var(--line);
    padding:calc(12px * var(--ui)) calc(12px * var(--ui));
    font-weight:950;font-size:calc(20px * var(--ui));
    background:#f3f3f7;text-transform:uppercase;
  }
  .minusBtn{
    border:0;border-radius:18px;background:#eef0f6;color:var(--blue);
    font-weight:950;font-size:calc(26px * var(--ui));
    padding:calc(12px * var(--ui)) 0;
  }

  .sheetBtns{
    display:flex;gap:calc(24px * var(--ui));justify-content:flex-start;
    padding:calc(14px * var(--ui)) calc(6px * var(--ui)) 0;
  }
  .sheetBtn{
    border:0;background:transparent;color:var(--blue);
    font-weight:950;font-size:calc(24px * var(--ui));
    letter-spacing:.3px;padding:calc(10px * var(--ui)) calc(6px * var(--ui));
    text-transform:uppercase;
  }

  #photoLayer{
    position:fixed;inset:0;background:#000;display:none;
    justify-content:center;align-items:center;z-index:120;
  }
  #photoLayer img{max-width:100%;max-height:100%;}

  #equipModal{
    position:fixed;inset:0;background:rgba(0,0,0,.45);
    display:none;justify-content:center;align-items:flex-end;z-index:110;
  }
  #equipSheet{
    width:100%;max-width:640px;background:#fff;border-radius:22px 22px 0 0;
    padding:calc(12px * var(--ui)) calc(12px * var(--ui)) calc(16px * var(--ui));
    max-height:70vh;overflow:auto;-webkit-overflow-scrolling:touch;
  }
  .equipTitle{font-weight:950;font-size:calc(24px * var(--ui));padding:calc(8px * var(--ui)) calc(4px * var(--ui)) calc(12px * var(--ui));text-transform:uppercase;}
  .equipRow{
    display:grid;grid-template-columns:80px 1fr 1fr;
    gap:calc(10px * var(--ui));align-items:center;margin:calc(12px * var(--ui)) 0;white-space:nowrap;
  }
  .equipRow.single{grid-template-columns:80px 1fr;}
  .equipLbl{font-weight:950;font-size:calc(22px * var(--ui));text-transform:uppercase;}
</style>
</head>

<body>

<header onclick="openPhoto()" ondblclick="openPhoto()">
  <span class="titleLine">
    <span class="titleMain">JAS MEMO</span>
    <span class="titleVer">VER 4.2</span>
  </span>
</header>

<div class="controls">
  <button class="btnTop" type="button" onclick="newMemo()">ADD</button>
  <button class="btnTop" type="button" onclick="deleteSelected()">DELETE</button>
  <button class="btnTop" type="button" onclick="addPhoto()">PHOTO</button>
</div>

<div id="memoList"></div>
<input type="file" id="photoInput" accept="image/*" hidden />

<button id="equipBtn" type="button" onclick="openEquip()">EQUIPMENT</button>
<div id="equipBadge"></div>

<div class="modal" id="modal">
  <div class="sheet" id="sheet">
    <div class="handleWrap" id="handleWrap"><div class="handle"></div></div>

    <div class="sheetTop" onclick="openPhoto()">
      <div class="mTitle">JAS MEMO</div>
      <div class="mHint">TAP TO OPEN PHOTO</div>
    </div>

    <div class="checkLine">
      <label><input type="checkbox" id="inChk"> INBOUND</label>
      <label><input type="checkbox" id="outChk"> OUTBOUND</label>
    </div>

    <div id="sections"></div>

    <div class="sheetBtns">
      <button class="sheetBtn" type="button" onclick="saveMemo()">SAVE</button>
      <button class="sheetBtn" type="button" onclick="closeModal()">CLOSE</button>
    </div>
  </div>
</div>

<div id="photoLayer" ondblclick="closePhoto()" onclick="closePhoto()">
  <img id="photoImg" alt="photo" />
</div>

<div id="equipModal" ondblclick="closeEquip()" onclick="closeEquip()">
  <div id="equipSheet" onclick="event.stopPropagation()">
    <div class="handleWrap"><div class="handle"></div></div>
    <div class="equipTitle">EQUIPMENT</div>

    <div class="equipRow">
      <div class="equipLbl">TUG</div>
      <input id="tug1" class="num" type="text" inputmode="numeric" maxlength="2" placeholder="00">
      <input id="tug2" class="num" type="text" inputmode="numeric" maxlength="2" placeholder="00">
    </div>

    <div class="equipRow single">
      <div class="equipLbl">BELT</div>
      <input id="belt" class="num" type="text" inputmode="numeric" maxlength="2" placeholder="00">
    </div>

    <div class="sheetBtns">
      <button class="sheetBtn" type="button" onclick="saveEquip()">SAVE</button>
      <button class="sheetBtn" type="button" onclick="closeEquip()">CLOSE</button>
    </div>
  </div>
</div>

<script>
/* ===============================
   STORAGE KEYS
================================ */
const KEY_MEMOS = "jas_memos";
const KEY_MEMOS_BACKUP = "jas_memos_backup";
const KEY_PHOTO = "jas_photo";
const KEY_EQUIP = "jas_equipment";

/* ===============================
   DOM
================================ */
const memoList = document.getElementById("memoList");
const modal = document.getElementById("modal");
const sheet = document.getElementById("sheet");
const sections = document.getElementById("sections");
const inChk = document.getElementById("inChk");
const outChk = document.getElementById("outChk");

const photoInput = document.getElementById("photoInput");
const photoLayer = document.getElementById("photoLayer");
const photoImg = document.getElementById("photoImg");

const equipBtn = document.getElementById("equipBtn");
const equipBadge = document.getElementById("equipBadge");
const equipModal = document.getElementById("equipModal");
const tug1 = document.getElementById("tug1");
const tug2 = document.getElementById("tug2");
const belt = document.getElementById("belt");

let photo = localStorage.getItem(KEY_PHOTO) || null;

/* ===============================
   DATA
================================ */
let memos = loadMemosWithMigration();
let editId = null;

/* ===============================
   UTIL
================================ */
function onlyNum(v, len){ return (v || "").replace(/[^0-9]/g, "").slice(0, len); }
function pad(v, len){
  const s = onlyNum(v, len);
  return s ? s.padStart(len, "0") : "";
}
function nowTime(){
  const d = new Date();
  const hh = String(d.getHours()).padStart(2,"0");
  const mm = String(d.getMinutes()).padStart(2,"0");
  return `${hh}:${mm}`;
}
function deepClone(obj){ return JSON.parse(JSON.stringify(obj)); }
function escapeHtml(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;");
}
function safeWriteMemos(nextMemos){
  try{ localStorage.setItem(KEY_MEMOS_BACKUP, localStorage.getItem(KEY_MEMOS) || "[]"); }catch(e){}
  localStorage.setItem(KEY_MEMOS, JSON.stringify(nextMemos));
}
function tryRestoreFromBackup(){
  const bk = localStorage.getItem(KEY_MEMOS_BACKUP);
  if(!bk) return false;
  try{
    const arr = JSON.parse(bk);
    if(!Array.isArray(arr)) return false;
    localStorage.setItem(KEY_MEMOS, bk);
    memos = loadMemosWithMigration();
    renderList();
    return true;
  }catch(e){ return false; }
}

/* ===============================
   MIGRATION + NORMALIZE
================================ */
function loadMemosWithMigration(){
  let raw = [];
  try{
    raw = JSON.parse(localStorage.getItem(KEY_MEMOS) || "[]");
    if(!Array.isArray(raw)) raw = [];
  }catch(e){ raw = []; }

  const looksNew = raw.every(m => !m || typeof m !== "object" || ("dataVersion" in m) || ("in" in m) || ("out" in m));
  if(looksNew) return raw.map(normalizeMemo);

  const converted = raw.map(old => migrateOldMemo(old)).map(normalizeMemo);
  localStorage.setItem(KEY_MEMOS, JSON.stringify(converted));
  return converted;
}
function migrateOldMemo(old){
  const m = { id: old.id ?? Date.now(), dataVersion: 4.2 };

  const hasIn = !!old.hasIn || !!old["INBOUND-c7"] || !!old["INBOUND-HL"] || !!old["INBOUND-HASH"];
  const hasOut= !!old.hasOut|| !!old["OUTBOUND-c7"] || !!old["OUTBOUND-HL"] || !!old["OUTBOUND-HASH"];
  m.hasIn = hasIn;
  m.hasOut = hasOut;

  const hl = old.sharedHL ?? old.HL ?? old["INBOUND-HL"] ?? old["OUTBOUND-HL"] ?? "";
  const hash = old.sharedHASH ?? old.HASH ?? old["INBOUND-HASH"] ?? old["OUTBOUND-HASH"] ?? "";
  m.sharedHL = hl;
  m.sharedHASH = hash;

  m.in = {
    c7: old["INBOUND-c7"] ?? "",
    t:  old["INBOUND-t"]  ?? "",
    d:  old["INBOUND-d"]  ?? "",
    bb: old["INBOUND-bb"] ?? "",
    cmpt1: old["INBOUND-cmpt1"] ?? "F",
    cmpt2: old["INBOUND-cmpt2"] ?? "F",
    cmpt3: old["INBOUND-cmpt3"] ?? "",
    cmpt4: old["INBOUND-cmpt4"] ?? "",
    note: old["INBOUND-note"] ?? "",
    time: old["INBOUND-TIME"] ?? old["INBOUND-time"] ?? "",
    extras: old["INBOUND-EXTRAS"] ?? old["INBOUND-extras"] ?? []
  };

  m.out = {
    c7: old["OUTBOUND-c7"] ?? "",
    t:  old["OUTBOUND-t"]  ?? "",
    d:  old["OUTBOUND-d"]  ?? "",
    bb: old["OUTBOUND-bb"] ?? "",
    tt: old["OUTBOUND-tt"] ?? "",
    tb: old["OUTBOUND-tb"] ?? "",
    cmpt1: old["OUTBOUND-cmpt1"] ?? "F",
    cmpt2: old["OUTBOUND-cmpt2"] ?? "F",
    cmpt3: old["OUTBOUND-cmpt3"] ?? "",
    cmpt4: old["OUTBOUND-cmpt4"] ?? "",
    note: old["OUTBOUND-note"] ?? "",
    time: old["OUTBOUND-TIME"] ?? old["OUTBOUND-time"] ?? "",
    extras: old["OUTBOUND-EXTRAS"] ?? old["OUTBOUND-extras"] ?? []
  };

  return m;
}
function normalizeMemo(m){
  if(!m || typeof m !== "object") m = {};
  const base = {
    id: m.id ?? Date.now(),
    dataVersion: 4.2,
    hasIn: !!m.hasIn,
    hasOut: !!m.hasOut,

    /* ✅ 공유값: HL/HASH는 반드시 1개(인/아웃 동일) */
    sharedHL: m.sharedHL ?? "",
    sharedHASH: m.sharedHASH ?? "",

    in: m.in || {},
    out: m.out || {}
  };

  base.sharedHL = pad(base.sharedHL, 4);
  base.sharedHASH = pad(base.sharedHASH, 3);

  base.in = {
    c7: pad(base.in.c7 ?? "", 4),
    t:  pad(base.in.t  ?? "", 3),
    d:  pad(base.in.d  ?? "", 2),
    bb: pad(base.in.bb ?? "", 2),
    cmpt1: (base.in.cmpt1 ?? "F") || "F",
    cmpt2: (base.in.cmpt2 ?? "F") || "F",
    cmpt3: base.in.cmpt3 ?? "",
    cmpt4: base.in.cmpt4 ?? "",
    note: base.in.note ?? "",
    time: base.in.time ?? "",
    extras: Array.isArray(base.in.extras) ? base.in.extras : []
  };

  base.out = {
    c7: pad(base.out.c7 ?? "", 4),
    t:  pad(base.out.t  ?? "", 3),
    d:  pad(base.out.d  ?? "", 2),
    bb: pad(base.out.bb ?? "", 2),
    tt: pad(base.out.tt ?? "", 4),
    tb: pad(base.out.tb ?? "", 4),
    cmpt1: (base.out.cmpt1 ?? "F") || "F",
    cmpt2: (base.out.cmpt2 ?? "F") || "F",
    cmpt3: base.out.cmpt3 ?? "",
    cmpt4: base.out.cmpt4 ?? "",
    note: base.out.note ?? "",
    time: base.out.time ?? "",
    extras: Array.isArray(base.out.extras) ? base.out.extras : []
  };

  base.in.extras = base.in.extras
    .filter(x => x && typeof x === "object")
    .map(x => ({ key:String(x.key||"").toUpperCase(), val: pad(x.val||"", 3) }))
    .filter(x => x.key && x.val);

  base.out.extras = base.out.extras
    .filter(x => x && typeof x === "object")
    .map(x => ({ key:String(x.key||"").toUpperCase(), val: pad(x.val||"", 3) }))
    .filter(x => x.key && x.val);

  return base;
}

/* ===============================
   ✅ HL/HASH 강제 동기화(수정 가능)
   - 어디서 수정해도 양쪽(인/아웃) HL은 동일, #도 동일
   - 저장 시에도 "현재 포커스값"을 우선으로 가져와서 저장
================================ */
function syncSharedInputs(key, val){
  document.querySelectorAll(`input[data-k="${key}"]`).forEach(inp => {
    if(inp.value !== val) inp.value = val;
  });
}
function getSharedValueNow(key){
  const ae = document.activeElement;
  if(ae && ae instanceof HTMLInputElement && ae.dataset && ae.dataset.k === key){
    return ae.value || "";
  }
  const els = [...document.querySelectorAll(`input[data-k="${key}"]`)];
  const nonEmpty = els.find(x => (x.value || "").trim() !== "");
  return nonEmpty ? nonEmpty.value : (els[0]?.value || "");
}

document.addEventListener("input", (e) => {
  const el = e.target;
  if(!(el instanceof HTMLInputElement)) return;
  const k = el.dataset.k || "";

  if(k === "HL"){
    el.value = onlyNum(el.value, 4);
    syncSharedInputs("HL", el.value);
  }
  if(k === "HASH"){
    el.value = onlyNum(el.value, 3);
    syncSharedInputs("HASH", el.value);
  }

  if(k.endsWith(".c7")) el.value = onlyNum(el.value, 4);
  if(k.endsWith(".t"))  el.value = onlyNum(el.value, 3);
  if(k.endsWith(".d"))  el.value = onlyNum(el.value, 2);
  if(k.endsWith(".bb")) el.value = onlyNum(el.value, 2);
  if(k.endsWith(".tt")) el.value = onlyNum(el.value, 4);
  if(k.endsWith(".tb")) el.value = onlyNum(el.value, 4);

  if(k.startsWith("extra.val.")) el.value = onlyNum(el.value, 3);
});

/* ===============================
   SECTIONS UI
================================ */
const EXTRA_KEYS = ["W","C","COB","STRAP","GB","TS","EMS"];

function makeSection(type, memo){
  const isOut = (type === "OUTBOUND");
  const sec = document.createElement("div");
  sec.className = "section";

  const timeVal = memo ? ((isOut ? memo.out.time : memo.in.time) || "") : "";
  const sharedHL = memo ? memo.sharedHL : "";
  const sharedHASH = memo ? memo.sharedHASH : "";

  const c7 = memo ? (isOut ? memo.out.c7 : memo.in.c7) : "";
  const t  = memo ? (isOut ? memo.out.t  : memo.in.t ) : "";
  const d  = memo ? (isOut ? memo.out.d  : memo.in.d ) : "";
  const bb = memo ? (isOut ? memo.out.bb : memo.in.bb) : "";

  const cmpt1 = memo ? (isOut ? memo.out.cmpt1 : memo.in.cmpt1) : "F";
  const cmpt2 = memo ? (isOut ? memo.out.cmpt2 : memo.in.cmpt2) : "F";
  const cmpt3 = memo ? (isOut ? memo.out.cmpt3 : memo.in.cmpt3) : "";
  const cmpt4 = memo ? (isOut ? memo.out.cmpt4 : memo.in.cmpt4) : "";

  const tt = memo ? memo.out.tt : "";
  const tb = memo ? memo.out.tb : "";

  const note = memo ? (isOut ? memo.out.note : memo.in.note) : "";
  const extras = memo ? (isOut ? memo.out.extras : memo.in.extras) : [];

  sec.innerHTML = `
    <div class="secHead">
      <div class="secTitle">${type}</div>
      <div class="timeArea">
        <button class="timeBtn" type="button" data-timebtn="${type}">TIME</button>
        <div class="timeValue" id="${type}-timeValue">${timeVal}</div>
      </div>
    </div>

    <div class="grid7">
      <div class="lbl">7C</div>
      <input class="num" type="text" inputmode="numeric" maxlength="4" placeholder="0000" data-k="${type.toLowerCase()}.c7" value="${c7}">
      <div class="lbl">HL</div>
      <input class="num" type="text" inputmode="numeric" maxlength="4" placeholder="0000" data-k="HL" value="${sharedHL}">
      <div class="lbl">#</div>
      <input class="num" type="text" inputmode="numeric" maxlength="3" placeholder="000" data-k="HASH" value="${sharedHASH}">
    </div>

    <div class="cmptRow">
      <div class="cmptLbl">CMPT 1</div>
      <input class="cmptInput" type="text" placeholder="TEXT" data-k="${type.toLowerCase()}.cmpt1" value="${escapeHtml(cmpt1 || "F")}">
    </div>
    <div class="cmptRow">
      <div class="cmptLbl">CMPT 2</div>
      <input class="cmptInput" type="text" placeholder="TEXT" data-k="${type.toLowerCase()}.cmpt2" value="${escapeHtml(cmpt2 || "F")}">
    </div>
    <div class="cmptRow">
      <div class="cmptLbl">CMPT 3</div>
      <input class="cmptInput" type="text" placeholder="TEXT" data-k="${type.toLowerCase()}.cmpt3" value="${escapeHtml(cmpt3)}">
    </div>
    <div class="cmptRow">
      <div class="cmptLbl">CMPT 4</div>
      <input class="cmptInput" type="text" placeholder="TEXT" data-k="${type.toLowerCase()}.cmpt4" value="${escapeHtml(cmpt4)}">
    </div>

    <div class="gridTDBB">
      <div class="lbl">T</div>
      <input class="num" type="text" inputmode="numeric" maxlength="3" placeholder="000" data-k="${type.toLowerCase()}.t" value="${t}">
      <div class="lbl">D</div>
      <input class="num" type="text" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type.toLowerCase()}.d" value="${d}">
      <div class="lbl">BB</div>
      <input class="num" type="text" inputmode="numeric" maxlength="2" placeholder="00" data-k="${type.toLowerCase()}.bb" value="${bb}">
    </div>

    ${isOut ? `
      <div class="gridTTTB">
        <div class="lbl">T/T</div>
        <input class="num" type="text" inputmode="numeric" maxlength="4" placeholder="0000" data-k="outbound.tt" value="${tt}">
        <div class="lbl">T/B</div>
        <input class="num" type="text" inputmode="numeric" maxlength="4" placeholder="0000" data-k="outbound.tb" value="${tb}">
      </div>
    ` : ""}

    <div class="extraBox">
      <div class="extraHead">
        <div class="extraTitle">EXTRA</div>
        <button class="extraPlus" type="button" data-extra-plus="${type}">+</button>
      </div>
      <div class="extraList" id="${type}-extraList"></div>
    </div>

    <textarea placeholder="NOTE (${type})" data-k="${type.toLowerCase()}.note">${escapeHtml(음표)}</textarea>
  `;

  // TIME: 클릭=현재시간 / 더블클릭=수정
  const btn = sec.querySelector(`[data-timebtn="${type}"]`);
  const timeValue = sec.querySelector(`#${type}-timeValue`);
  btn.addEventListener("click", () => { timeValue.textContent = nowTime(); });
  btn.addEventListener("dblclick", () => {
    const cur = (timeValue.textContent || nowTime()).trim();
    const t2 = prompt("TIME (HH:MM 24H)", cur);
    if(t2) timeValue.textContent = t2;
  });

  // extras
  const list = sec.querySelector(`#${type}-extraList`);
  extras.forEach(x => list.appendChild(makeExtraRow(type, x.key, x.val)));
  const plus = sec.querySelector(`[data-extra-plus="${type}"]`);
  plus.addEventListener("click", () => { list.appendChild(makeExtraRow(type, "W", "")); });

  return sec;
}

function makeExtraRow(type, key, val){
  const row = document.createElement("div");
  row.className = "extraRow";
  row.innerHTML = `
    <select>
      ${EXTRA_KEYS.map(k => `<option value="${k}" ${k===key ? "selected":""}>${k}</option>`).join("")}
    </select>
    <input class="num" type="text" inputmode="numeric" maxlength="3" placeholder="000" value="${onlyNum(val,3)}" data-k="extra.val.${type}">
    <button class="minusBtn" type="button">-</button>
  `;
  row.querySelector("button").addEventListener("click", () => row.remove());
  return row;
}

/* ===============================
   CHECKBOX -> render
================================ */
inChk.onchange = outChk.onchange = () => renderSections(getEditMemo());

function getEditMemo(){
  if(!editId) return null;
  return memos.find(x => x.id === editId) || null;
}
function renderSections(memo){
  sections.innerHTML = "";
  if(inChk.checked) sections.appendChild(makeSection("INBOUND", memo));
  if(outChk.checked) sections.appendChild(makeSection("OUTBOUND", memo));

  const hl = memo ? (memo.sharedHL || "") : "";
  const hash = memo ? (memo.sharedHASH || "") : "";
  syncSharedInputs("HL", hl);
  syncSharedInputs("HASH", hash);
}

/* ===============================
   MODAL OPEN/CLOSE
================================ */
function newMemo(){
  editId = null;
  inChk.checked = false;
  outChk.checked = false;
  sections.innerHTML = "";
  openModal();
}
function openModal(){
  modal.style.display = "flex";
  setHomeUiVisible(false);
  setTimeout(() => {
    if((inChk.checked || outChk.checked) && sections.childElementCount === 0){
      renderSections(getEditMemo());
    }
  }, 0);
}
function closeModal(){
  modal.style.display = "none";
  editId = null;
  setHomeUiVisible(true);
}
function setHomeUiVisible(on){
  equipBtn.style.display = on ? "block" : "none";
  if(on) updateEquipBadge();
  else equipBadge.style.display = "none";
}

/* ===============================
   SAVE / EDIT
================================ */
function getInput(k){
  const el = document.querySelector(`input[data-k="${k}"]`);
  return el ? el.value : "";
}
function getText(k, def){
  const el = document.querySelector(`input[data-k="${k}"]`);
  if(!el) return def;
  const v = el.value ?? "";
  return v === "" ? def : v;
}
function getTextarea(k, def){
  const el = document.querySelector(`textarea[data-k="${k}"]`);
  if(!el) return def;
  return el.value ?? def;
}
function collectExtras(type){
  const list = document.getElementById(`${type}-extraList`);
  if(!list) return [];
  const rows = [...list.querySelectorAll(".extraRow")];
  const out = [];
  rows.forEach(r => {
    const key = (r.querySelector("select")?.value || "").toUpperCase();
    const val = pad(r.querySelector('input')?.value || "", 3);
    if(key && val) out.push({key, val});
  });
  return out;
}

function saveMemo(){
  if((inChk.checked || outChk.checked) && sections.childElementCount === 0){
    alert("입력칸이 표시되지 않았어요.\nCLOSE 후 새로고침 → 다시 열고 저장해주세요.");
    return;
  }

  const prev = editId ? deepClone(memos.find(x => x.id === editId)) : null;

  /* ✅ 여기 핵심:
     - HL/# 는 '현재 수정중(포커스)' 값을 우선으로 읽고,
     - 그리고 저장 직전에 양쪽 입력칸을 강제 동기화 */
  const rawHL = getSharedValueNow("HL");
  const rawHASH = getSharedValueNow("HASH");
  const sharedHL = pad(rawHL, 4);
  const sharedHASH = pad(rawHASH, 3);

  syncSharedInputs("HL", sharedHL);
  syncSharedInputs("HASH", sharedHASH);

  const memo = normalizeMemo({
    id: editId ?? Date.now(),
    dataVersion: 4.2,
    hasIn: inChk.checked,
    hasOut: outChk.checked,
    sharedHL,
    sharedHASH,
    in: {},
    out: {}
  });

  if(memo.hasIn){
    memo.in.c7 = pad(getInput("inbound.c7"), 4);
    memo.in.t  = pad(getInput("inbound.t"), 3);
    memo.in.d  = pad(getInput("inbound.d"), 2);
    memo.in.bb = pad(getInput("inbound.bb"), 2);

    memo.in.cmpt1 = (getText("inbound.cmpt1", "F") || "F");
    memo.in.cmpt2 = (getText("inbound.cmpt2", "F") || "F");
    memo.in.cmpt3 = getText("inbound.cmpt3", "");
    memo.in.cmpt4 = getText("inbound.cmpt4", "");

    memo.in.note = getTextarea("inbound.note", "");
    memo.in.time = (document.getElementById("INBOUND-timeValue")?.textContent || "").trim();
    memo.in.extras = collectExtras("INBOUND");
  }

  if(memo.hasOut){
    memo.out.c7 = pad(getInput("outbound.c7"), 4);
    memo.out.t  = pad(getInput("outbound.t"), 3);
    memo.out.d  = pad(getInput("outbound.d"), 2);
    memo.out.bb = pad(getInput("outbound.bb"), 2);

    memo.out.tt = pad(getInput("outbound.tt"), 4);
    memo.out.tb = pad(getInput("outbound.tb"), 4);

    memo.out.cmpt1 = (getText("outbound.cmpt1", "F") || "F");
    memo.out.cmpt2 = (getText("outbound.cmpt2", "F") || "F");
    memo.out.cmpt3 = getText("outbound.cmpt3", "");
    memo.out.cmpt4 = getText("outbound.cmpt4", "");

    memo.out.note = getTextarea("outbound.note", "");
    memo.out.time = (document.getElementById("OUTBOUND-timeValue")?.textContent || "").trim();
    memo.out.extras = collectExtras("OUTBOUND");
  }

  // ✅ 체크 꺼도 기존 데이터 유지
  if(prev){
    if(!memo.hasIn && prev.in) memo.in = prev.in;
    if(!memo.hasOut && prev.out) memo.out = prev.out;

    if(!memo.sharedHL && prev.sharedHL) memo.sharedHL = prev.sharedHL;
    if(!memo.sharedHASH && prev.sharedHASH) memo.sharedHASH = prev.sharedHASH;
  }

  if(editId){
    const idx = memos.findIndex(x => x.id === editId);
    if(idx >= 0) memos[idx] = memo;
  }else{
    memos.push(memo);
  }

  safeWriteMemos(memos);
  closeModal();
  renderList(memo.id);
}

function editMemo(id){
  const memo = memos.find(x => x.id === id);
  if(!memo) return;

  editId = id;
  inChk.checked = !!memo.hasIn;
  outChk.checked = !!memo.hasOut;

  openModal();
  renderSections(memo);

  // ✅ 들어가자마자 공유값 강제 동기화(양쪽 동일 + 수정 가능)
  syncSharedInputs("HL", memo.sharedHL || "");
  syncSharedInputs("HASH", memo.sharedHASH || "");
}

/* ===============================
   LIST RENDER
================================ */
function renderList(flashId){
  memoList.innerHTML = "";

  memos.forEach(m => {
    const card = document.createElement("div");
    card.className = "memoCard" + (m.id === flashId ? " flash" : "");
    const inner = document.createElement("div");
    inner.className = "memoInner";

    const inLine = `IN 7C[${m.in.c7 || ""}] HL[${m.sharedHL || ""}] #[${m.sharedHASH || ""}]`;
    const outLine = `OUT 7C[${m.out.c7 || ""}] HL[${m.sharedHL || ""}] #[${m.sharedHASH || ""}]`;

    const inChip = m.hasIn ? inLine : "IN";
    const outChip = m.hasOut ? outLine : "OUT";

    inner.innerHTML = `
      <div class="memoRow">
        <input class="memoChk" type="checkbox" data-id="${m.id}">
        <div class="pillCol">
          <div class="pill">IN</div>
          <div class="pill">OUT</div>
        </div>
        <div class="linesCol memoClick" data-open="${m.id}">
          <div class="chip">${inChip}</div>
          <div class="chip">${outChip}</div>
        </div>
      </div>
    `;

    card.appendChild(inner);
    memoList.appendChild(card);
  });

  memoList.querySelectorAll("[data-open]").forEach(el => {
    el.addEventListener("click", () => {
      const id = Number(el.getAttribute("data-open"));
      editMemo(id);
    });
  });
}

/* ===============================
   DELETE
================================ */
function deleteSelected(){
  const ids = [...document.querySelectorAll('.memoChk:checked')]
    .map(c => Number(c.dataset.id))
    .filter(Boolean);

  if(ids.length === 0) return;

  memos = memos.filter(m => !ids.includes(m.id));
  safeWriteMemos(memos);
  renderList();
}

/* ===============================
   PHOTO
================================ */
function addPhoto(){
  photoInput.value = "";
  photoInput.click();
}
photoInput.onchange = (e) => {
  const f = e.target.files?.[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = () => {
    photo = r.result;
    localStorage.setItem(KEY_PHOTO, photo);
  };
  r.readAsDataURL(f);
};
function openPhoto(){
  if(!photo) return;
  photoImg.src = photo;
  photoLayer.style.display = "flex";
}
function closePhoto(){
  photoLayer.style.display = "none";
}

/* ===============================
   EQUIPMENT
================================ */
function openEquip(){
  const eq = JSON.parse(localStorage.getItem(KEY_EQUIP) || "{}");
  tug1.value = pad(eq.tug1, 2) || "";
  tug2.value = pad(eq.tug2, 2) || "";
  belt.value = pad(eq.belt, 2) || "";
  equipModal.style.display = "flex";
}
function closeEquip(){ equipModal.style.display = "none"; }
function saveEquip(){
  const eq = { tug1: pad(tug1.value, 2), tug2: pad(tug2.value, 2), belt: pad(belt.value, 2) };
  localStorage.setItem(KEY_EQUIP, JSON.stringify(eq));
  updateEquipBadge();
  closeEquip();
}
function updateEquipBadge(){
  const eq = JSON.parse(localStorage.getItem(KEY_EQUIP) || "{}");
  const has = (eq.tug1 || eq.tug2 || eq.belt);
  if(!has){ equipBadge.style.display = "none"; return; }

  const t1 = eq.tug1 || "00";
  const t2 = eq.tug2 || "00";
  const b  = eq.belt || "00";
  equipBadge.innerHTML = `<div class="b1">TUG ${t1}/${t2}</div><div class="b2">BELT ${b}</div>`;
  equipBadge.style.display = "block";
}

/* ===============================
   BOTTOM SHEET DRAG TO CLOSE
================================ */
(function initSheetDrag(){
  const handleWrap = document.getElementById("handleWrap");
  let startY = 0;
  let currentY = 0;
  let dragging = false;

  function onStart(y){
    if(modal.style.display !== "flex") return;
    dragging = true;
    startY = y;
    currentY = y;
    sheet.style.transition = "none";
  }
  function onMove(y){
    if(!dragging) return;
    currentY = y;
    const dy = Math.max(0, currentY - startY);
    sheet.style.transform = `translateY(${dy}px)`;
  }
  function onEnd(){
    if(!dragging) return;
    dragging = false;
    const dy = Math.max(0, currentY - startY);
    sheet.style.transition = "transform .18s ease";
    sheet.style.transform = "translateY(0)";
    if(dy > 90) closeModal();
  }

  handleWrap.addEventListener("touchstart", (e) => onStart(e.touches[0].clientY), {passive:true});
  handleWrap.addEventListener("touchmove",  (e) => onMove(e.touches[0].clientY),  {passive:true});
  handleWrap.addEventListener("touchend",   () => onEnd());

  handleWrap.addEventListener("mousedown", (e) => { e.preventDefault(); onStart(e.clientY); });
  window.addEventListener("mousemove", (e) => onMove(e.clientY));
  window.addEventListener("mouseup", () => onEnd());
})();

/* ===============================
   INIT
================================ */
renderList();
updateEquipBadge();
setHomeUiVisible(true);

if(!Array.isArray(memos)){
  const ok = tryRestoreFromBackup();
  if(!ok) memos = [];
}
</script>
