<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>JAS MEMO VER.3</title>

<style>
:root{
  --bg:#ff6a00;
  --card:rgba(255,255,255,.92);
  --card2:rgba(255,255,255,.82);
  --text:#111;
  --shadow:0 10px 28px rgba(0,0,0,.18);
}

*{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body{
  margin:0;
  font-family:system-ui,-apple-system;
  background:var(--bg);
  color:var(--text);
  font-weight:650;
  padding-bottom:22px;
}

/* ===== 상단 타이틀 ===== */
header{
  text-align:center;
  padding:20px 14px 14px;
  font-size:2.2rem;
  font-weight:950;
  letter-spacing:.5px;
  color:#111;
}

/* ===== 사진 ===== */

#photoLayer{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  z-index:9999;
}

#photoLayer img{
  position:absolute;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:contain;   /* 화면 꽉 채움 */
  background:black;
  transform:scale(1);
  touch-action:none;
}

</style>
</head>

<body>

<header>JAS MEMO VER.3</header>

<!-- 기존 메모 UI 그대로 사용 -->

<div id="photoLayer">
  <img id="photoImg">
</div>

<script>

/* 기존 변수 유지 */
const photoLayer = document.getElementById("photoLayer");
const photoImg = document.getElementById("photoImg");

let photo = localStorage.getItem("jas_photo");
let scale=1;

/* ===== 사진 열기 ===== */
function openPhoto(){
  if(!photo) return;
  scale=1;
  photoImg.src=photo;
  photoImg.style.transform="scale(1)";
  photoLayer.style.display="block";
}

/* ===== 사진 닫기 (사진 더블탭) ===== */
photoImg.addEventListener("dblclick",()=>{
  closePhoto();
});

function closePhoto(){
  photoLayer.style.display="none";
  scale=1;
}

/* 확대 축소 */
photoLayer.onwheel=e=>{
  e.preventDefault();
  scale+=e.deltaY<0?0.1:-0.1;
  scale=Math.max(1,Math.min(scale,4));
  photoImg.style.transform=`scale(${scale})`;
};

/* ===== 여백 더블탭 → 사진 열기 ===== */
document.addEventListener("dblclick",(e)=>{
  if(!photo) return;
  if(photoLayer.style.display==="block") return;
  if(e.target.closest("#memoList")) return;
  if(e.target.closest(".controls")) return;
  openPhoto();
});

</script>

</body>
</html>
